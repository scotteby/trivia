  SUPABASE SETUP REQUIRED — run this SQL in your Supabase SQL Editor:

  CREATE TABLE game_rooms (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    room_code TEXT UNIQUE NOT NULL,
    status TEXT DEFAULT 'lobby',
    current_question_index INT DEFAULT 0,
    question_start_time TIMESTAMPTZ,
    config JSONB DEFAULT '{}',
    questions JSONB DEFAULT '[]',
    created_at TIMESTAMPTZ DEFAULT NOW()
  );

  CREATE TABLE players (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    room_id UUID REFERENCES game_rooms(id) ON DELETE CASCADE,
    name TEXT NOT NULL,
    score INT DEFAULT 0,
    answers JSONB DEFAULT '[]',
    joined_at TIMESTAMPTZ DEFAULT NOW()
  );

  ALTER TABLE game_rooms REPLICA IDENTITY FULL;
  ALTER TABLE players REPLICA IDENTITY FULL;

  -- Add game_rooms and players tables to the supabase_realtime publication

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5fa; color: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-blue { background: #eff6ff; color: #1d4ed8; }
.badge-green { background: #f0fdf4; color: #166534; }
.tag { display: inline-block; background: #f5f5fa; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #9090b8; margin: 2px; }
.tag-purple { background: #ede9fe; color: #6d28d9; }
.tag-blue { background: #eff6ff; color: #3b82f6; }
.tag-green { background: #f0fdf4; color: #166534; }
.tag-amber { background: #fefce8; color: #92400e; }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.btn-outline { background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #9090b8; cursor: pointer; transition: border-color .2s, color .2s; }
.btn-outline:hover { border-color: #7c3aed88; color: #7c3aed; }
.rt-btn { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #9090b8; text-align: center; cursor: pointer; transition: background .2s, border-color .2s, color .2s; }
.rt-btn.sel { background: #ede9fe; border-color: #7c3aed; color: #6d28d9; }
.divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
.divider-line { flex: 1; border-top: 1px solid #e4e4f0; }
.divider-text { font-size: 11px; color: #9090b8; }
.fade-in { animation: fadeUp .35s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.player-chip { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; }
.lb-row-first { background: #f0f0fa; }
.timer-badge { border-radius: 20px; padding: 4px 14px; font-size: 14px; font-weight: 500; display: inline-block; border: 1px solid #e4e4f0; }
.timer-ok { color: #6d28d9; border-color: #c4b5fd; background: #ede9fe; }
.timer-warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
.timer-danger { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
.option-btn-host { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 10px; padding: 14px 16px; font-size: 15px; color: #2a2a4a; text-align: left; line-height: 1.4; box-shadow: 0 1px 3px rgba(100,100,200,0.06); }
.option-btn-host.correct { background: #f0fdf4; border-color: #22c55e; color: #166534; }
.option-btn-host.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
.sub-label { font-size: 11px; color: #9090b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
hr { border: none; border-top: 1px solid #e4e4f0; margin: 14px 0; }

/* Preset grid */
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.preset-card { background: #ffffff; border: 2px solid #e4e4f0; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color .2s, background .2s; }
.preset-card:hover { border-color: #c4b5fd; }
.preset-card.selected { border-color: #7c3aed; background: #f5f3ff; }
.preset-card.music-card { border-color: #93c5fd; background: #eff6ff; }
.preset-card.music-card:hover, .preset-card.music-card.selected { border-color: #378add; background: #dbeafe; }

/* In-game layout */
.ingame-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
@media (max-width: 700px) { .ingame-layout { grid-template-columns: 1fr; } .ingame-sidebar { display: none; } }

/* Podium */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 20px; }
.podium-slot { text-align: center; }
.podium-bar { border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.wave-bar { width: 4px; border-radius: 2px; background: #7c3aed; transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
@keyframes wave { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
/* Custom categories */
.custom-suggestion { padding: 9px 12px; font-size: 13px; color: #1a1a2e; cursor: pointer; border-bottom: 1px solid #f0f0fa; transition: background .1s; }
.custom-suggestion:hover { background: #f0f0fa; }
.custom-suggestion:last-child { border-bottom: none; }

body.tv-mode .timer-danger { color: #ef4444; border-color: #ef444444; background: #1e1e35; }
body.tv-mode .lb-row { color: #e8e8f0; }
body.tv-mode .lb-row-first { background: #1e1e35; }
.ingame-question { color: #1a1a2e; }
.ingame-cat { color: #9090b8; }
body.tv-mode .ingame-question { font-size: 22px; color: #e8e8f0; }
body.tv-mode .ingame-cat { color: #888; }
body.tv-mode .ingame-sidebar-label { color: #555; }
body.tv-mode .ingame-resp { background: #16162a; border-color: #2a2a48; color: #a78bfa; }
body.tv-mode .ingame-resp-bar-track { background: #2a2a48; }

body.tv-mode .wave-bar { background: #7c3aed; }
body.tv-mode .clip-status { color: #7c3aed; }
</style>

const CUSTOM_CATS_KEY = 'trivia-custom-cats';
const SUGGESTIONS = ['Taylor Swift', 'Eagles trivia', 'Philly sports', 'Harry Potter', 'Lord of the Rings', 'Marvel movies', 'Seinfeld', 'The Office', 'Friends', 'Disney', 'Star Wars', 'Game of Thrones', '90s commercials', 'Christmas movies', 'Halloween trivia', 'Super Bowl history', 'World Cup soccer', 'NBA legends', 'Beatles songs', 'Elvis Presley'];

function animalBg(avatar) { return ANIMAL_COLORS[avatar] || '#f5f5fa'; }
function avatarHTML(player, size = 32) {
  const animal = player?.avatar || '🐸';
  const bg = animalBg(animal);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size * 0.55)}px;flex-shrink:0;">${animal}</div>`;
}
function assignAnimal(existingPlayers) {
  const taken = new Set((existingPlayers || []).map(p => p.avatar).filter(Boolean));
  const available = ANIMALS.filter(a => !taken.has(a));
  return available.length > 0
    ? available[Math.floor(Math.random() * available.length)]
    : ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
}

function getTimeLeft() {
  if (!state.room?.question_start_time) return state.room?.config?.timer || 15;
  const timer = state.room.config?.timer || 15;
  const elapsed = (Date.now() - new Date(state.room.question_start_time).getTime()) / 1000;
  return Math.max(0, timer - elapsed);
}

  if (state.tvMode) {
    document.body.classList.add('tv-mode');

    document.body.classList.remove('tv-mode');
  }

  if (state.view === 'ingame' || state.view === 'reveal') {

// ─── Custom categories ────────────────────────────────────────────────────────
function loadCustomCats() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_CATS_KEY) || '[]').filter(c => c.name && typeof c.music === 'boolean'); }
  catch { return []; }
}
function saveCustomCats() {
  localStorage.setItem(CUSTOM_CATS_KEY, JSON.stringify(state.customCats));
}
function addCustomCatHost(name, music) {
  const n = name.trim();
  if (n.length < 2 || state.customCats.length >= 10) return;
  if (state.customCats.find(c => c.name.toLowerCase() === n.toLowerCase())) return;
  state.customCats.push({ name: n, music, musicType: music ? _hostCustomMusicType : null });
  saveCustomCats();
  _hostCustomInput = '';
  _hostCustomMusicFlag = false;
  _hostCustomMusicType = 'genre';
  document.getElementById('cat-picker').innerHTML = pickerHTML();
  if (_hostCustomInput) onHostCustomInput(_hostCustomInput);
}
function removeCustomCatHost(name) {
  state.customCats = state.customCats.filter(c => c.name !== name);
  saveCustomCats();
  document.getElementById('cat-picker').innerHTML = pickerHTML();
  if (_hostCustomInput) onHostCustomInput(_hostCustomInput);
}
function onHostCustomInput(val) {
  _hostCustomInput = val;
  const len = val.trim().length;
  const addBtn = document.getElementById('hostCustomAddBtn');
  if (addBtn) { addBtn.style.opacity = len >= 2 ? '1' : '.4'; addBtn.style.pointerEvents = len >= 2 ? '' : 'none'; }
  const toggleRow = document.getElementById('hostMusicToggleRow');
  if (toggleRow) toggleRow.style.display = len >= 2 ? 'block' : 'none';
  if (len >= 2 && MUSIC_SUGGESTIONS.has(val.trim())) { _hostCustomMusicFlag = true; updateMusicToggleUIHost(); }
  updateMusicHintHost(val.trim());
  const el = document.getElementById('hostCustomSuggestions');
  if (!el) return;
  if (len === 0) { el.style.display = 'none'; return; }
  const lower = val.trim().toLowerCase();
  const filtered = SUGGESTIONS.filter(s => s.toLowerCase().includes(lower) && !state.customCats.find(c => c.name.toLowerCase() === s.toLowerCase())).slice(0, 6);
  if (!filtered.length) { el.style.display = 'none'; return; }
  el.innerHTML = filtered.map(s => `<div class="custom-suggestion" onclick="selectSuggestionHost('${s.replace(/'/g,"\\'")}');">${s}</div>`).join('');
  el.style.display = 'block';
}
function selectSuggestionHost(name) {
  _hostCustomInput = name;
  _hostCustomMusicFlag = MUSIC_SUGGESTIONS.has(name);
  const input = document.getElementById('hostCustomInput');
  if (input) input.value = name;
  const el = document.getElementById('hostCustomSuggestions');
  if (el) el.style.display = 'none';
  const toggleRow = document.getElementById('hostMusicToggleRow');
  if (toggleRow) toggleRow.style.display = 'block';
  updateMusicToggleUIHost();
  updateMusicHintHost(name);
  const addBtn = document.getElementById('hostCustomAddBtn');
  if (addBtn) { addBtn.style.opacity = '1'; addBtn.style.pointerEvents = ''; }
}
function tryAddCustomCatHost() {
  addCustomCatHost(_hostCustomInput, _hostCustomMusicFlag);
}
function toggleMusicFlagHost() {
  _hostCustomMusicFlag = !_hostCustomMusicFlag;
  if (!_hostCustomMusicFlag) _hostCustomMusicType = 'genre';
  updateMusicToggleUIHost();
  updateMusicHintHost(_hostCustomInput.trim());
  const typeRow = document.getElementById('hostMusicTypeRow');
  if (typeRow) typeRow.style.display = _hostCustomMusicFlag ? 'block' : 'none';
}
function updateMusicToggleUIHost() {
  const track = document.getElementById('hostMusicToggleTrack');
  const thumb = document.getElementById('hostMusicToggleThumb');
  if (track) track.style.background = _hostCustomMusicFlag ? '#378add' : '#e4e4f0';

function updateMusicHintHost(name) {
  const el = document.getElementById('hostMusicHint');

  _hostCustomMusicType = t;
  ['artist', 'genre', 'soundtrack'].forEach(type => {
    const el = document.getElementById('hostCustomType_' + type);
    if (!el) return;
    const sel = type === t;
    el.style.background = sel ? '#f5f3ff' : '#ffffff';
    el.style.borderColor = sel ? '#7c3aed' : '#e4e4f0';
    el.querySelector('.type-label').style.color = sel ? '#6d28d9' : '#9090b8';
  });
}

// ─── SETUP SCREEN ─────────────────────────────────────────────────────────────
function showSetup() {
  state.view = 'setup';
  const presetCards = Object.entries(PRESETS).map(([key, p]) => {
    const isSelected = state.preset === key;
    const isFull = key === 'musicmix';
    const borderColor = isSelected ? '#7c3aed' : p.isMusic ? '#93c5fd' : '#e4e4f0';
    const bg = isSelected ? '#f5f3ff' : p.isMusic ? '#eff6ff' : '#ffffff';
    const nameColor = isSelected ? '#5b21b6' : p.isMusic ? '#1d4ed8' : '#1a1a2e';
    const descColor = isSelected ? '#7c3aed' : p.isMusic ? '#378add' : '#9090b8';
    const check = isSelected ? `<div style="width:18px;height:18px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;">✓</div>` : '';
    const popularBadge = p.popular ? `<div style="display:inline-block;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:6px;">Most popular</div>` : '';

    if (isFull) {
      return `
        <div onclick="selectPreset('${key}')"
          style="grid-column:span 2;background:${bg};border:2px solid ${borderColor};border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;">
          <div style="display:flex;align-items:center;gap:14px;">
            <div style="font-size:28px;flex-shrink:0;">${p.icon}</div>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:500;color:${nameColor};">${p.name}</div>
              <div style="font-size:11px;color:${descColor};margin-top:2px;">${p.desc}</div>
              ${popularBadge}
            </div>
            ${check}
          </div>
        </div>`;
    }

    return `
      <div onclick="selectPreset('${key}')"
        style="background:${bg};border:2px solid ${borderColor};border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div style="font-size:22px;">${p.icon}</div>
          ${check}
        </div>
        <div style="font-size:13px;font-weight:500;color:${nameColor};">${p.name}</div>
        <div style="font-size:11px;color:${descColor};margin-top:2px;">${p.desc}</div>
      </div>`;
  }).join('');

  const roundBtns = [2, 3, 4].map(r =>
    `<div class="rt-btn${state.rounds === r ? ' sel' : ''}" onclick="setRounds(${r})">
      ${r} rounds<div style="font-size:10px;color:${state.rounds===r?'#7c3aed':'#9090b8'};"></div>
    </div>`
  ).join('');

  const timerBtns = [5, 10, 20, 30].map(t =>
    `<div class="rt-btn${state.timer === t ? ' sel' : ''}" onclick="setTimer(${t})" style="padding:8px 12px;">${t}s</div>`
  ).join('');

  const difficultyOpts = [
    { key: 'easy',  label: 'Easy',  sub: 'well-known facts' },
    { key: 'mixed', label: 'Mixed', sub: 'balanced' },
    { key: 'hard',  label: 'Hard',  sub: 'obscure details' },
  ];
  const diffBtns = difficultyOpts.map(d =>
    `<div class="rt-btn${state.difficulty === d.key ? ' sel' : ''}" onclick="setDifficulty('${d.key}')" style="flex:1;text-align:center;">
      ${d.label}<div style="font-size:10px;color:${state.difficulty===d.key?'#7c3aed':'#9090b8'};">${d.sub}</div>
    </div>`
  ).join('');

  const presetName = PRESETS[state.preset]?.name || 'Mixed bag';
  const total = state.rounds * 5;

  setHTML(`
    <div class="fade-in">
      <a href="index.html" style="font-size:12px;color:#9090b8;text-decoration:none;display:block;margin-bottom:6px;">← Home</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
        <div style="font-size:20px;font-weight:500;color:#1a1a2e;">Start a game</div>
        <div style="display:flex;gap:8px;">${roundBtns}</div>
      </div>

      <!-- Quick start -->
      <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:6px;cursor:pointer;" onclick="quickStart()">
        <div style="width:44px;height:44px;border-radius:10px;background:#7c3aed;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;">⚡</div>
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:500;color:#1a1a2e;">Quick start</div>
          <div style="font-size:12px;color:#6d28d9;margin-top:2px;">AI picks everything · room code in ~10 seconds</div>
        </div>
        <span class="badge badge-purple">One tap</span>
      </div>
      <div style="font-size:11px;color:#9090b8;text-align:center;margin-bottom:16px;">AI mixes categories and difficulty for a balanced game</div>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">or pick a vibe</div><div class="divider-line"></div></div>
      <div style="font-size:11px;color:#9090b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Preset game nights</div>
      <div class="preset-grid">${presetCards}</div>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">or build your own</div><div class="divider-line"></div></div>
      <div onclick="showCustomSetup()" style="background:#f5f5fa;border:${state.customMode ? '2px solid #7c3aed' : '1px dashed #e4e4f0'};border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:20px;cursor:pointer;transition:border-color .2s;">
        <div style="width:38px;height:38px;border-radius:50%;background:${state.customMode ? '#ede9fe' : '#f0f0fa'};display:flex;align-items:center;justify-content:center;font-size:20px;">🎯</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;color:${state.customMode ? '#6d28d9' : '#1a1a2e'};">Custom game</div>
          <div style="font-size:11px;color:#9090b8;margin-top:2px;">${state.customMode && state.customCategories.filter(Boolean).length > 0 ? state.customCategories.filter(Boolean).join(' · ') : 'Pick a specific category for each round'}</div>
        </div>
        <span style="font-size:12px;color:#7c3aed;">→</span>
      </div>

      <!-- Timer selector -->
      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">Timer per question</div>
        <div style="display:flex;gap:8px;">${timerBtns}</div>
        <div style="font-size:11px;color:#9090b8;margin-top:8px;">Longer timers give players more time to think</div>
      </div>

      <!-- Difficulty selector -->
      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">Difficulty</div>
        <div style="display:flex;gap:8px;">${diffBtns}</div>
      </div>

      <!-- Auto-advance toggle -->
      <div class="card" style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="setAutoAdvance(${!state.autoAdvance})">
        <div>
          <div style="font-size:13px;color:#1a1a2e;font-weight:500;">Auto-advance questions</div>
          <div style="font-size:11px;color:#9090b8;margin-top:2px;">Move to next question automatically when timer ends or all players answer</div>
        </div>
        <div style="width:44px;height:24px;border-radius:12px;background:${state.autoAdvance ? '#7c3aed' : '#e4e4f0'};position:relative;flex-shrink:0;transition:background .2s;">
          <div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:${state.autoAdvance ? '23px' : '3px'};transition:left .2s;"></div>
        </div>
      </div>

      <!-- Summary + create -->
      <div style="background:#f5f5fa;border:1px solid #e4e4f0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;margin-bottom:12px;">
        <div style="font-size:13px;color:#6b6b9a;font-weight:500;">${presetName} · ${state.rounds} rounds · ${total} questions · ${state.difficulty} · ~${state.rounds*10} min</div>
      </div>
      <button class="btn-primary" id="createBtn" onclick="createRoom()">Create room and get code</button>
      <div style="font-size:11px;color:#9090b8;text-align:center;margin-top:8px;">Questions are generated fresh when room is created</div>
    </div>
  `);
}

function selectPreset(key) { state.preset = key; showSetup(); }
function setRounds(r) { state.rounds = r; showSetup(); }
function setTimer(t) { state.timer = t; showSetup(); }
function setDifficulty(d) { state.difficulty = d; showSetup(); }
function setAutoAdvance(v) { state.autoAdvance = v; showSetup(); }
function quickStart() { state.preset = 'mixed'; state.rounds = 3; state.timer = 15; state.difficulty = 'mixed'; state.customMode = false; createRoom(); }

// ─── CUSTOM GAME SETUP ───────────────────────────────────────────────────────
function showCustomSetup() {
  state.view = 'custom';
  state.customMode = true;
  while (state.customCategories.length < state.rounds) state.customCategories.push(null);
  state.customCategories = state.customCategories.slice(0, state.rounds);

  const allFilled = state.customCategories.every(Boolean);

  const slots = state.customCategories.map((cat, i) => {
    const catData = cat ? CATEGORY_DATA.find(c => c.name === cat || (c.subs && c.subs.includes(cat))) : null;
    const color = catData?.color || '#9090b8';
    const icon = catData?.icon || '';
    const bg = catData ? catData.bg : '#ffffff';
    const border = cat ? `1px solid ${catData?.border || '#e4e4f0'}` : '1px dashed #e4e4f0';
    return `
      <div onclick="openCategoryPicker(${i})" style="background:${bg};border:${border};border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:border-color .2s;">
        <div style="width:32px;height:32px;border-radius:8px;background:#f5f5fa;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${icon || (i + 1)}</div>
        <div style="flex:1;">
          <div style="font-size:11px;color:#9090b8;text-transform:uppercase;letter-spacing:.06em;">Round ${i + 1}</div>
          <div style="font-size:14px;font-weight:500;color:${color};margin-top:2px;">${cat || '<span style="color:#9090b8;">Tap to pick category</span>'}</div>
        </div>
        <div style="font-size:12px;color:#9090b8;">→</div>
      </div>`;
  }).join('');

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <button onclick="state.customMode=false;showSetup()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:12px;color:#9090b8;cursor:pointer;">← Back</button>
        <div>
          <div style="font-size:18px;font-weight:500;color:#1a1a2e;">Custom game</div>
          <div style="font-size:12px;color:#9090b8;margin-top:2px;">${state.rounds} rounds · ${state.timer}s timer · ${state.difficulty}</div>
        </div>
      </div>

      <div style="font-size:11px;color:#9090b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Pick a category for each round</div>
      ${slots}

      <div style="font-size:11px;color:#9090b8;margin-bottom:16px;margin-top:4px;">Each round is 5 questions from that category</div>

      <button class="btn-primary" id="createBtn" ${allFilled ? '' : 'disabled'} onclick="createRoom()" style="${allFilled ? '' : 'opacity:.4;'}">
        ${allFilled ? 'Create game →' : 'Pick all ' + state.rounds + ' rounds to continue'}
      </button>
      <div style="font-size:11px;color:#9090b8;text-align:center;margin-top:8px;">Questions generated fresh by AI</div>
    </div>
  `);
}

function openCategoryPicker(roundIdx) {
  document.getElementById('cat-picker')?.remove();
  state.pickerRound = roundIdx;
  state.pickerCat = null;
  const overlay = document.createElement('div');
  overlay.id = 'cat-picker';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(245,245,250,0.97);z-index:200;display:flex;flex-direction:column;overflow:hidden;';
  overlay.innerHTML = pickerHTML();
  document.body.appendChild(overlay);
}

function closePicker() {
  document.getElementById('cat-picker')?.remove();
  state.pickerRound = null;
  state.pickerCat = null;
}

function pickerHTML() {
  const roundIdx = state.pickerRound;
  if (state.pickerCat === null) {
    const grid = CATEGORY_DATA.map(c => `
      <div onclick="selectPickerCat('${c.name}')"
        style="background:#ffffff;border:1px solid #e4e4f0;border-radius:12px;padding:16px 14px;cursor:pointer;transition:border-color .15s;align-self:start;"
        onmouseover="this.style.borderColor='#c4b5fd'"
        onmouseout="this.style.borderColor='#e4e4f0'">
        <div style="font-size:24px;margin-bottom:6px;">${c.icon}</div>
        <div style="font-size:13px;font-weight:500;color:#1a1a2e;">${c.name}</div>
        <div style="font-size:11px;color:#9090b8;margin-top:3px;">${c.subs ? c.subs.length + ' options' : 'Tap to pick'}</div>
      </div>`).join('');

    const TYPE_ICONS_HOST = { artist: '🎤', genre: '🎵', soundtrack: '🎬' };
    const customCards = state.customCats.map(c => {
      const en = c.name.replace(/'/g, "\\'");
      const icon = c.music ? (TYPE_ICONS_HOST[c.musicType] || '🎵') : '💬';
      return `<div style="position:relative;">
        <div onclick="applyCategory(${roundIdx},'${en}',event)"
          style="background:#ffffff;border:1px solid #e4e4f0;border-radius:12px;padding:14px 12px;cursor:pointer;transition:border-color .15s;"
          onmouseover="this.style.borderColor='#c4b5fd'"
          onmouseout="this.style.borderColor='#e4e4f0'">
          <div style="font-size:22px;margin-bottom:6px;">${icon}</div>
          <div style="font-size:13px;font-weight:500;color:#1a1a2e;">${c.name}</div>
          <div style="font-size:11px;color:#9090b8;margin-top:3px;">${c.music ? '🎵 Music clip' : '💬 Custom'}</div>
        </div>
        <button onclick="event.stopPropagation();removeCustomCatHost('${en}')"
          style="position:absolute;top:6px;right:6px;background:#f5f5fa;border:1px solid #e4e4f0;border-radius:50%;width:20px;height:20px;font-size:10px;color:#9090b8;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>`;
    }).join('');

    const addBtnActive = _hostCustomInput.trim().length >= 2;
    const showToggle = _hostCustomInput.trim().length >= 2;
    const hintText = _hostCustomMusicFlag && _hostCustomInput.trim() ? `iTunes will search for "${_hostCustomInput.trim()}" clips` : '';
    const escapedVal = _hostCustomInput.replace(/"/g, '&quot;');

    const customSection = `
      <div style="margin-top:20px;">
        <div style="font-size:11px;color:#9090b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Custom categories</div>
        ${state.customCats.length > 0
          ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start;margin-bottom:12px;">${customCards}</div>`
          : `<div style="font-size:12px;color:#9090b8;margin-bottom:12px;">No custom categories yet — add one below</div>`}
        ${state.customCats.length < 10 ? `
          <div style="position:relative;">
            <div style="display:flex;gap:8px;">
              <input id="hostCustomInput" type="text" value="${escapedVal}" placeholder="Add a custom category…"
                style="flex:1;background:#ffffff;border:1px solid #e4e4f0;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a1a2e;outline:none;"
                oninput="onHostCustomInput(this.value)" onkeydown="if(event.key==='Enter')tryAddCustomCatHost()" maxlength="50">
              <button id="hostCustomAddBtn" onclick="tryAddCustomCatHost()"
                style="background:#ffffff;border:1px solid #c4b5fd;border-radius:8px;padding:9px 14px;font-size:13px;color:#7c3aed;white-space:nowrap;${addBtnActive ? 'cursor:pointer;' : 'cursor:default;opacity:.4;pointer-events:none;'}">+ Add</button>
            </div>
            <div id="hostCustomSuggestions" style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:72px;background:#ffffff;border:1px solid #e4e4f0;border-radius:8px;z-index:10;overflow:hidden;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.1);"></div>
          </div>
          <div id="hostMusicToggleRow" style="display:${showToggle ? 'block' : 'none'};margin-top:6px;">
            <div style="display:flex;align-items:center;gap:12px;background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:10px 12px;">
              <div style="flex:1;">
                <div style="font-size:12px;color:#1d4ed8;">🎵 Music category — find a clip and identify the artist or song</div>
                <div id="hostMusicHint" style="font-size:11px;color:#378add;margin-top:3px;">${hintText}</div>
              </div>
              <div onclick="toggleMusicFlagHost()" id="hostMusicToggleTrack"
                style="width:44px;height:24px;border-radius:12px;position:relative;flex-shrink:0;cursor:pointer;transition:background .2s;background:${_hostCustomMusicFlag ? '#378add' : '#e4e4f0'};">
                <div id="hostMusicToggleThumb" style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:${_hostCustomMusicFlag ? '23px' : '3px'};transition:left .2s;"></div>
              </div>
            </div>
            <div id="hostMusicTypeRow" style="display:${_hostCustomMusicFlag ? 'block' : 'none'};margin-top:6px;">
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
                ${[['artist','🎤','Artist','e.g. Taylor Swift'],['genre','🎵','Genre','e.g. 80s pop'],['soundtrack','🎬','Soundtrack','e.g. Grease']].map(([type,icon,label,ex]) => `
                  <div id="hostCustomType_${type}" onclick="setHostCustomMusicType('${type}')"
                    style="background:${_hostCustomMusicType===type?'#f5f3ff':'#ffffff'};border:1px solid ${_hostCustomMusicType===type?'#7c3aed':'#e4e4f0'};border-radius:8px;padding:8px 6px;cursor:pointer;text-align:center;">
                    <div style="font-size:16px;">${icon}</div>
                    <div class="type-label" style="font-size:11px;font-weight:500;color:${_hostCustomMusicType===type?'#6d28d9':'#9090b8'};margin-top:2px;">${label}</div>
                    <div style="font-size:10px;color:#9090b8;margin-top:1px;">${ex}</div>
                  </div>`).join('')}
              </div>
            </div>
          </div>
        ` : `<div style="font-size:11px;color:#9090b8;text-align:center;padding:8px 0;">Maximum 10 custom categories saved</div>`}
      </div>`;

    return `
      <div style="padding:16px 20px;background:#ffffff;border-bottom:1px solid #e4e4f0;display:flex;align-items:center;gap:12px;flex-shrink:0;">
        <button onclick="closePicker()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:13px;color:#9090b8;cursor:pointer;">✕</button>
        <div style="font-size:15px;font-weight:500;color:#1a1a2e;">Round ${roundIdx + 1} — Pick a category</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px;background:#f5f5fa;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start;">${grid}</div>
        ${customSection}
      </div>`;
  } else {
    const cat = CATEGORY_DATA.find(c => c.name === state.pickerCat);
    const subBtns = cat.subs.map(sub => `
      <div onclick="applyCategory(${roundIdx},'${sub.replace(/'/g,"\\'")}',event)"
        style="background:#ffffff;border:1px solid #e4e4f0;border-radius:10px;padding:14px 16px;cursor:pointer;font-size:14px;color:#1a1a2e;transition:border-color .15s;"
        onmouseover="this.style.borderColor='#c4b5fd'"
        onmouseout="this.style.borderColor='#e4e4f0'">
        ${sub}
      </div>`).join('');
    return `
      <div style="padding:16px 20px;background:#ffffff;border-bottom:1px solid #e4e4f0;display:flex;align-items:center;gap:12px;flex-shrink:0;">
        <button onclick="backToCats()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:13px;color:#9090b8;cursor:pointer;">← Back</button>
        <div>
          <div style="font-size:15px;font-weight:500;color:#1a1a2e;">${cat.icon} ${cat.name}</div>
          <div style="font-size:11px;color:#9090b8;">Round ${roundIdx + 1}</div>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px;background:#f5f5fa;">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div onclick="applyCategory(${roundIdx},'${cat.name}',event)"
            style="background:#ffffff;border:1px solid #e4e4f0;border-radius:10px;padding:14px 16px;cursor:pointer;font-size:14px;color:#9090b8;transition:border-color .15s;"
            onmouseover="this.style.borderColor='#c4b5fd'"
            onmouseout="this.style.borderColor='#e4e4f0'">
            All ${cat.name.toLowerCase()} (mixed)
          </div>
          ${subBtns}
        </div>
      </div>`;
  }
}

function selectPickerCat(catName) {
  const cat = CATEGORY_DATA.find(c => c.name === catName);
  if (!cat.subs) {
    applyCategory(state.pickerRound, catName, null);
  } else {
    state.pickerCat = catName;
    document.getElementById('cat-picker').innerHTML = pickerHTML();
  }
}

function backToCats() {
  state.pickerCat = null;
  document.getElementById('cat-picker').innerHTML = pickerHTML();
}

function applyCategory(roundIdx, categoryStr, e) {
  if (e) e.stopPropagation();
  state.customCategories[roundIdx] = categoryStr;
  closePicker();
  showCustomSetup();
}

async function createRoom() {
  if (window.location.protocol === 'file:') {
    showDevError();
    return;
  }
  const btn = document.getElementById('createBtn');
  if (btn) btn.disabled = true;

  setHTML(`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px;text-align:center;">
      <div style="font-size:32px;margin-bottom:24px;">🧠</div>
      <div style="font-size:20px;font-weight:500;color:#1a1a2e;margin-bottom:8px;">Building your quiz…</div>
      <div style="font-size:14px;color:#9090b8;margin-bottom:32px;" id="loadingMsg">Generating questions…</div>
      <div style="width:100%;max-width:280px;height:4px;background:#e4e4f0;border-radius:4px;overflow:hidden;margin-bottom:32px;">
        <div id="loadingBar" style="height:100%;background:#7c3aed;border-radius:4px;width:0%;transition:width .6s ease;"></div>
      </div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s 0s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .4s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .8s infinite;"></div>
      </div>
      <style>@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
    </div>
  `);
  window.scrollTo({ top: 0, behavior: 'instant' });

  const createMessages = [
    'Generating questions…',
    'Searching for music clips…',
    'Picking categories…',
    'Tuning difficulty…',
    'Almost ready…',
  ];
  let msgIdx = 0;
  let progress = 0;
  const loadingInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % createMessages.length;
    progress = Math.min(progress + Math.random() * 18 + 8, 90);
    const msgEl = document.getElementById('loadingMsg');
    const barEl = document.getElementById('loadingBar');
    if (msgEl) msgEl.textContent = createMessages[msgIdx];
    if (barEl) barEl.style.width = progress + '%';
  }, 2000);

  try {
    const customMusicCatObjs = state.customCats.filter(c => c.music);
    const customMusicCats = customMusicCatObjs.map(c => c.name);
    const customCatsMeta = {};
    customMusicCatObjs.forEach(c => { customCatsMeta[c.name] = { musicType: c.musicType || 'genre' }; });
    const savedCode = localStorage.getItem(HOST_ROOM_CODE_KEY);
    const basePayload = {
      rounds: state.rounds,
      timer: state.timer,
      difficulty: state.difficulty,
      ...(savedCode ? { preferredCode: savedCode } : {}),
      ...(customMusicCats.length ? { customMusicCats, customCatsMeta } : {}),
    };
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.customMode && state.customCategories.length === state.rounds
        ? { ...basePayload, categories: state.customCategories }
        : { ...basePayload, preset: state.preset })
    });
    const data = await res.json();
    if (!res.ok) {
      if (data.error?.includes('529') || data.error?.includes('Overloaded')) {
        throw new Error('The AI is a bit busy right now — please try again in a few seconds.');
      }
      throw new Error(data.error || 'Failed to create room');
    }
    clearInterval(loadingInterval);
    const barEl = document.getElementById('loadingBar');
    if (barEl) barEl.style.width = '100%';
    await new Promise(r => setTimeout(r, 400));

    state.room = data;
    localStorage.setItem(HOST_ROOM_CODE_KEY, data.room_code);
    state.players = [];
    subscribeToRoom();
    showLobby();
  } catch(e) {
    clearInterval(loadingInterval);
    showSetup();
    showSetupError(e.message);
  }
}

async function refreshHostRevealLeaderboard() {
  try {
    const qi = state.room?.current_question_index;
    if (qi === null || qi === undefined) return;
    const { data: updatedPlayers } = await sb.from('players')
      .select('id,name,score,answers,avatar')
      .eq('room_id', state.room.id)
      .order('score', { ascending: false });
    if (!updatedPlayers) return;
    const total = updatedPlayers.length;
    const gotRight = updatedPlayers.filter(p =>
      p.answers?.some(a => a.question_index === qi && a.correct === true)
    ).length;
    const pct = total > 0 ? Math.round((gotRight / total) * 100) : 0;
    const barColor = pct >= 50 ? '#22c55e' : '#ef4444';
    const top3 = updatedPlayers.slice(0, 3);
    const hostInTop3 = top3.some(p => p.id === state.hostPlayer?.id);
    const myRank = updatedPlayers.findIndex(p => p.id === state.hostPlayer?.id) + 1;
    const myRow = !hostInTop3 ? updatedPlayers.find(p => p.id === state.hostPlayer?.id) : null;
    const updatedLbHTML = [
      ...top3.map((p, i) => hostLbRowHTML(p, i+1, p.id === state.hostPlayer?.id)),
      ...(myRow ? [hostLbRowHTML(myRow, myRank, true)] : [])
    ].join('');
    const countEl = document.getElementById('revealGotRight');
    const barEl = document.getElementById('revealBar');
    const lbEl = document.getElementById('revealLeaderboard');
    if (countEl) countEl.textContent = `${gotRight} of ${total}`;
    if (barEl) { barEl.style.width = pct + '%'; barEl.style.background = barColor; }
    if (lbEl) lbEl.innerHTML = updatedLbHTML;
  } catch(e) {}
}

function subscribeToRoom() {
  if (state.subscription) state.subscription.unsubscribe();
  const roomId = state.room.id;

  sb.from('players').select('*').eq('room_id', roomId).order('joined_at')
    .then(({ data }) => { if (data) { state.players = data; renderLobbyPlayers(); } });

  state.subscription = sb.channel('host_room_' + roomId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` }, payload => {
      if (payload.eventType === 'INSERT') {
        state.players = [...state.players.filter(p => p.id !== payload.new.id), payload.new];
      } else if (payload.eventType === 'UPDATE') {
        state.players = state.players.map(p => p.id === payload.new.id ? payload.new : p);
        if (state.view === 'ingame' || state.view === 'reveal') {
          renderIngameSidebar();
        }
        if (state.view === 'ingame' && state.hostAnswered) {
          refreshHostRevealLeaderboard();
        }
      } else if (payload.eventType === 'DELETE') {
        state.players = state.players.filter(p => p.id !== payload.old.id);
      }
      if (state.view === 'lobby') renderLobbyPlayers();
    })
    .subscribe();
}

async function joinAsHost() {
  if (state.hostPlayer) {
    const statusEl = document.getElementById('hostJoinStatus');
    if (statusEl) statusEl.textContent = `✓ Already joined as "${state.hostPlayer.name}"`;
    return;
  }
  const name = document.getElementById('hostNameInput')?.value.trim();
  if (!name) return;
  const statusEl = document.getElementById('hostJoinStatus');

  try {
    const { data: existingForAvatar } = await sb.from('players').select('avatar').eq('room_id', state.room.id);
    const avatar = assignAnimal(existingForAvatar);
    const { data: playerData, error } = await sb.from('players').insert({
      room_id: state.room.id,
      name,
      score: 0,
      answers: [],
      avatar,
    }).select().single();

    if (error || !playerData) throw new Error('Failed to join');

    state.hostPlayer = playerData;
    state.hostScore = 0;
    state.hostAnswers = [];

    localStorage.setItem(HOST_PLAYER_NAME_KEY, name);
    localStorage.setItem(HOST_PLAYER_ID_KEY, playerData.id);

    if (statusEl) statusEl.textContent = `✓ Joined as "${name}" — you'll answer questions on this screen`;

    const input = document.getElementById('hostNameInput');
    const btn = input?.nextElementSibling;
    if (input) input.disabled = true;
    if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }

  } catch(e) {
    if (statusEl) statusEl.textContent = 'Failed to join — try again';
  }
}

function shareJoinLink(url) {

      if (btn) { const t = btn.textContent; btn.textContent = '✓ Link copied!'; setTimeout(() => btn.textContent = t, 2000); }

  };
  if (navigator.share) {
    navigator.share({
      title: 'Join our Quizzli game!',
      text: `Join room ${state.room.room_code} on Quizzli`,
      url,
    }).catch(fallback);
  } else {
    fallback();
  }
}

function stopClip() {
  clearTimeout(state.clipStartTimeout);
  state.clipStartTimeout = null;
  clearTimeout(state.clipTimeout);
  state.clipTimeout = null;
  if (state.audio) {
    state.audio.pause();
    state.audio.src = '';
    // Don't null state.audio — preserve the unlocked element for reuse
  }
}

function playClip(url) {
  stopClip();
  if (!url) return;
  const cs = document.getElementById('clipStatus');
  if (state.audio) {
    state.audio.src = url;
    state.audio.volume = 1;
    state.audio.play().catch(() => {
      if (cs) cs.innerHTML = `<button onclick="forcePlayClip('${url}')"
        style="background:#7c3aed;border:none;border-radius:8px;padding:6px 14px;font-size:12px;color:#fff;cursor:pointer;">
        ▶ Tap to play clip
      </button>`;
    });
  } else {
    state.audio = new Audio(url);
    state.audio.volume = 1;
    state.audio.play().catch(() => {
      if (cs) cs.innerHTML = `<button onclick="forcePlayClip('${url}')"
        style="background:#7c3aed;border:none;border-radius:8px;padding:6px 14px;font-size:12px;color:#fff;cursor:pointer;">
        ▶ Tap to play clip
      </button>`;
    });
  }
  state.clipTimeout = setTimeout(() => stopClip(), CLIP_DURATION * 1000);
}

function playVictoryFanfare() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;

    function playNote(freq, startTime, duration, gain = 0.28, type = 'triangle') {
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      gainNode.gain.setValueAtTime(0, startTime);
      gainNode.gain.linearRampToValueAtTime(gain, startTime + 0.02);
      gainNode.gain.setValueAtTime(gain, startTime + duration - 0.05);
      gainNode.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.05);
    }

    // C E G C — ascending then held chord
    playNote(261.6, t + 0.0,  0.18);
    playNote(329.6, t + 0.18, 0.18);
    playNote(392.0, t + 0.36, 0.18);
    playNote(523.2, t + 0.54, 0.6, 0.32);
    // harmony on the final note
    playNote(392.0, t + 0.54, 0.6, 0.18, 'sine');
    playNote(329.6, t + 0.54, 0.6, 0.12, 'sine');
  } catch(e) {}
}

function forcePlayClip(url) {
  if (state.audio) {
    state.audio.src = url;
    state.audio.volume = 1;
    state.audio.play().catch(() => {});
  } else {
    state.audio = new Audio(url);
    state.audio.volume = 1;
    state.audio.play().catch(() => {});
  }
  state.clipTimeout = setTimeout(() => stopClip(), CLIP_DURATION * 1000);
  const cs = document.getElementById('clipStatus');
  if (cs) cs.textContent = 'Playing clip…';
}

function renderIngameSidebar() {
  const qi = state.room.current_question_index;
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const top5 = sorted.slice(0, 5);
  const lbEl = document.getElementById('leaderboard');
  if (lbEl) {
    lbEl.innerHTML = top5.map((p, i) => {
      return `
        <div class="lb-row${i===0?' lb-row-first':''}">
          <div style="font-size:13px;color:#9090b8;width:16px;">${i+1}</div>
          ${avatarHTML(p, 28)}
          <div style="flex:1;font-size:13px;">${p.name}</div>
          <div style="font-size:13px;color:#a78bfa;font-weight:500;">${p.score}</div>
        </div>
      `;
    }).join('');
  }
  const answered = state.players.filter(p => p.answers?.some(a => a.question_index === qi)).length;
  const total = state.players.length;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  const rcEl = document.getElementById('responseCount');
  const rbEl = document.getElementById('responseBar');
  const rsEl = document.getElementById('responseStatus');
  if (rcEl) rcEl.textContent = `${answered} / ${total}`;
  if (rbEl) rbEl.style.width = pct + '%';
  const allAnswered = answered === total && total > 0;
  if (rsEl) rsEl.textContent = allAnswered ? 'All players answered!' : `${answered} of ${total} answered`;
  if (allAnswered && !state.revealed) revealAnswer();

  const hprsEl = document.getElementById('hostPlayerResponseStatus');
  if (hprsEl) {
    hprsEl.textContent = allAnswered
      ? 'All players answered!'
      : `${answered} of ${total} answered`;
  }
}

function startIngameTimer(duration, isMusic = false) {
  clearInterval(state.timerInterval);
  const startTime = new Date(state.room.question_start_time).getTime();

  state.timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const clipPhase = isMusic && elapsed < CLIP_DURATION;
    const revealPhase = !isMusic && elapsed < QUESTION_REVEAL_SECS;
    const countdownElapsed = isMusic
      ? Math.max(0, elapsed - CLIP_DURATION)
      : Math.max(0, elapsed - QUESTION_REVEAL_SECS);
    const left = Math.max(0, duration - countdownElapsed);
    const badge = document.getElementById('timerBadge');

    if (clipPhase) {
      if (badge) { badge.textContent = '♫'; badge.className = 'timer-badge timer-ok'; }
    } else if (revealPhase) {
      if (badge) { badge.textContent = ''; badge.style.display = 'none'; }
    } else {
      if (badge) badge.style.display = '';
      const grid = document.getElementById('optionGrid');
      if (grid) grid.style.visibility = 'visible';
      const playerGrid = document.getElementById('hostPlayerOptionGrid');
      if (playerGrid) { playerGrid.style.visibility = 'visible'; playerGrid.style.pointerEvents = 'auto'; }
      const clipStatus = document.getElementById('clipStatus');
      if (clipStatus) clipStatus.textContent = '';
      if (badge) {
        badge.textContent = Math.ceil(left) + 's';
        badge.className = 'timer-badge ' + (left > 8 ? 'timer-ok' : left > 4 ? 'timer-warn' : 'timer-danger');
      }
      if (left <= 0) {
        clearInterval(state.timerInterval);
        if (!state.revealed) revealAnswer();
      }
    }
  }, 250);
}

async function submitHostAnswer(idx) {
  if (state.hostAnswered || !state.hostPlayer) return;
  const isMusic = !!(state.room.questions[state.room.current_question_index]?.preview_url);
  const answerStartTime = new Date(state.room.question_start_time).getTime();
  if (!isNaN(answerStartTime)) {
    const elapsed = (Date.now() - answerStartTime) / 1000;
    if (!isMusic && elapsed < QUESTION_REVEAL_SECS) return;
  }

  state.hostAnswered = true;
  state.hostAnswer = idx;

  const qi = state.room.current_question_index;
  const q = state.room.questions[qi];
  const timerDuration = state.room.config?.timer || 15;
  const totalElapsed = (Date.now() - answerStartTime) / 1000;
  const countElapsed = isMusic
    ? Math.max(0, totalElapsed - CLIP_DURATION)
    : Math.max(0, totalElapsed - QUESTION_REVEAL_SECS);
  const correct = idx === q.ans;

  const questionsPerRound = 5;
  const roundNum = Math.floor(qi / questionsPerRound) + 1;
  const basePoints = 100 * roundNum;
  const maxBonus = 50 * roundNum;

  let pts = 0;
  if (correct) {
    const bonus = Math.round(maxBonus * Math.max(0, (timerDuration - countElapsed) / timerDuration));
    pts = basePoints + bonus;
    state.hostScore += pts;
  }

  const answerEntry = { question_index: qi, answer_index: idx, correct, pts, time_taken: countElapsed };
  state.hostAnswers = [...state.hostAnswers, answerEntry];

  document.querySelectorAll('#hostPlayerOptionGrid button').forEach(b => b.disabled = true);
  const selectedEl = document.getElementById('hostOpt' + idx);
  if (selectedEl) {
    selectedEl.style.borderColor = '#7c3aed';
    selectedEl.style.background = '#f5f3ff';
    selectedEl.style.color = '#5b21b6';
  }

  const statusEl = document.getElementById('hostPlayerStatus');
  if (statusEl) { statusEl.style.display = 'block'; statusEl.style.color = '#a78bfa'; statusEl.textContent = 'Locked in — waiting for others…'; }

  const scoreEl = document.getElementById('hostScoreDisplay');
  if (scoreEl) scoreEl.textContent = state.hostScore + ' pts';

  try {
    await sb.from('players').update({
      score: state.hostScore,
      answers: state.hostAnswers,
    }).eq('id', state.hostPlayer.id);
  } catch(e) { console.warn('Failed to save host answer:', e); }

  setTimeout(() => revealAnswerAsPlayer(false), 600);
}

function revealAnswer() {
  if (state.revealed) return;
  clearInterval(state.timerInterval);
  state.revealed = true;
  stopClip();
  const qi = state.room.current_question_index;
  const q = state.room.questions[qi];
  const totalQ = state.room.questions.length;
  const isLast = qi + 1 >= totalQ;

  q.opts.forEach((_, i) => {
    const el = document.getElementById('opt' + i);
    if (el) el.classList.add(i === q.ans ? 'correct' : 'wrong');
  });

  if (q.artist && q.song) state.playedSongs.push(`${q.artist} - ${q.song}`);

  const correctCount = state.players.filter(p => p.answers?.some(a => a.question_index === qi && a.correct)).length;
  const rsEl = document.getElementById('responseStatus');
  if (rsEl) rsEl.textContent = `${correctCount} of ${state.players.length} correct`;

  flashLeaderboardResults(qi);

  if (state.hostPlayer) {
    revealAnswerAsPlayer(false);
    const hprsEl = document.getElementById('hostPlayerResponseStatus');
    if (hprsEl) hprsEl.textContent = `${correctCount} of ${state.players.length} correct`;
    state.autoAdvanceTimeout = setTimeout(() => {
      advanceQuestion();
    }, 3000);
    return;
  }

  const advanceBtn = document.getElementById('advanceBtn');
  if (advanceBtn) {
    const label = isLast ? 'Show results' : 'Next question';
    if (state.autoAdvance) {
      let secs = 3;
      advanceBtn.innerHTML = `<button class="btn-outline" onclick="unlockAudio();clearInterval(state.autoAdvanceTimeout);advanceQuestion()" style="padding:8px 18px;">${label} (${secs}s)</button>`;
      state.autoAdvanceTimeout = setInterval(() => {
        secs--;
        if (secs <= 0) {
          clearInterval(state.autoAdvanceTimeout);
          advanceQuestion();
        } else {
          const btn = advanceBtn.querySelector('button');
          if (btn) btn.textContent = `${label} (${secs}s)`;
        }
      }, 1000);
    } else {
      advanceBtn.innerHTML = `<button class="btn-outline" onclick="unlockAudio();advanceQuestion()" style="padding:8px 18px;">${label} →</button>`;
    }
  }

}

async function revealAnswerAsPlayer(timedOut) {
  const q = state.room.questions?.[state.room.current_question_index];
  if (!q) return;
  const qi = state.room.current_question_index;

  document.querySelectorAll('#hostPlayerOptionGrid button').forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) {
      b.style.borderColor = '#22c55e';
      b.style.background = '#f0fdf4';
      b.style.color = '#166634';
    } else if (i === state.hostAnswer && i !== q.ans) {
      b.style.borderColor = '#ef4444';
      b.style.background = '#fef2f2';
      b.style.color = '#991b1b';
    }
  });

  const correct = state.hostAnswer === q.ans;
  const timedOutNoAnswer = timedOut && !state.hostAnswered;
  const pts = correct ? (state.hostAnswers[state.hostAnswers.length - 1]?.pts || 0) : 0;

  const { data: allPlayers } = await sb.from('players')
    .select('id,name,score,answers,avatar')
    .eq('room_id', state.room.id)
    .order('score', { ascending: false });

  const sorted = allPlayers || [];
  const total = sorted.length;
  const gotRight = sorted.filter(p =>
    p.answers?.some(a => a.question_index === qi && a.correct === true)
  ).length;
  const pct = total > 0 ? Math.round((gotRight / total) * 100) : 0;
  const barColor = pct >= 50 ? '#22c55e' : '#ef4444';

  const hostInSorted = sorted.find(p => p.id === state.hostPlayer?.id);
  const myRank = hostInSorted ? sorted.findIndex(p => p.id === state.hostPlayer?.id) + 1 : null;
  const top3 = sorted.slice(0, 3);
  const hostInTop3 = top3.some(p => p.id === state.hostPlayer?.id);
  const myRow = hostInSorted && !hostInTop3 ? hostInSorted : null;

  const lbHTML = [
    ...top3.map((p, i) => hostLbRowHTML(p, i+1, p.id === state.hostPlayer?.id)),
    ...(myRow ? [hostLbRowHTML(myRow, myRank, true)] : [])
  ].join('');

  const panelBg = timedOutNoAnswer ? '#f8f8ff' : correct ? '#f0fdf4' : '#fef2f2';
  const panelBorder = timedOutNoAnswer ? '#a78bfa' : correct ? '#22c55e' : '#ef4444';
  const verdictText = timedOutNoAnswer ? "Time's up!" : correct ? 'Correct!' : `Wrong — it was: ${q.opts[q.ans]}`;
  const verdictColor = timedOutNoAnswer ? '#6d28d9' : correct ? '#166834' : '#991b1b';

  const statusEl = document.getElementById('hostPlayerStatus');
  if (statusEl) {
    statusEl.style.display = 'block';
    statusEl.style.background = 'transparent';
    statusEl.style.padding = '0';
    statusEl.innerHTML = `
      <div style="background:${panelBg};border:1.5px solid ${panelBorder};border-radius:14px;padding:12px 14px;margin-top:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:15px;font-weight:500;color:${verdictColor};">${verdictText}</div>
          ${pts > 0 ? `<div style="font-size:13px;font-weight:600;background:${correct?'#dcfce7':'#fee2e2'};color:${verdictColor};padding:4px 12px;border-radius:20px;">+${pts} pts</div>` : ''}
        </div>
        <div style="font-size:13px;color:#6b7280;margin-bottom:3px;"><span id="revealGotRight" style="font-weight:500;color:#1a1a2e;">${gotRight} of ${total}</span> players got it right</div>
        <div style="height:4px;background:#e4e4f0;border-radius:4px;overflow:hidden;margin-bottom:10px;">
          <div id="revealBar" style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width .6s ease;"></div>
        </div>
        <div style="font-size:10px;color:#9090b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Leaderboard</div>
        <div id="revealLeaderboard" style="display:flex;flex-direction:column;gap:1px;">${lbHTML}</div>
      </div>`;
  }

  // No auto-advance — game flow is controlled by startIngameTimer() and renderIngameSidebar()
}

async function advanceQuestion() {
  unlockAudio();
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  state.autoAdvanceTimeout = null;
  const qi = state.room.current_question_index;
  const totalQ = state.room.questions.length;

  if (qi + 1 >= totalQ) {
    await sb.from('game_rooms').update({ status: 'finished' }).eq('id', state.room.id);
    state.room.status = 'finished';
    showGameOver();
    return;
  }

  const newIdx = qi + 1;
  const crossedRound = newIdx > 0 && newIdx % 5 === 0;
  const newStart = new Date().toISOString();

  await sb.from('game_rooms').update({
    current_question_index: newIdx,
    question_start_time: newStart,
  }).eq('id', state.room.id);
  state.room.current_question_index = newIdx;
  state.room.question_start_time = newStart;
  state.revealed = false;

  if (crossedRound) {
    const completedRound = Math.floor(newIdx / 5);
    showRoundLeaderboard(completedRound);
  } else {
    showIngame();
  }
}

function flashLeaderboardResults(qi) {
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const top5 = sorted.slice(0, 5);
  const lbEl = document.getElementById('leaderboard');
  if (!lbEl) return;

  lbEl.innerHTML = top5.map((p, i) => {
    const answer = p.answers?.find(a => a.question_index === qi);
    const gotIt = answer?.correct === true;
    const answered = answer !== undefined && answer.answer_index !== undefined;
    const flashBg = !answered ? '' : gotIt ? '#f0fdf4' : '#fef2f2';
    const flashBorder = !answered ? 'transparent' : gotIt ? '#22c55e' : '#ef4444';
    const scoreColor = !answered ? '#9090b8' : gotIt ? '#16a34a' : '#ef4444';
    const indicator = !answered ? '' : gotIt ? ' ✓' : ' ✗';
    return `
      <div class="lb-row${i === 0 ? ' lb-row-first' : ''}" style="background:${flashBg};border:1px solid ${flashBorder};border-radius:8px;transition:background .3s;">
        <div style="font-size:13px;color:#9090b8;width:16px;">${i + 1}</div>
        ${avatarHTML(p, 28)}
        <div style="flex:1;font-size:13px;color:#1a1a2e;">${p.name}</div>
        <div style="font-size:13px;font-weight:600;color:${scoreColor};">${p.score}${indicator}</div>
      </div>`;
  }).join('');

  setTimeout(() => {
    renderIngameSidebar();
  }, 2500);
}

function showRoundLeaderboard(completedRound) {
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  stopClip();
  state.view = 'roundleaderboard';

  const nextRound = completedRound + 1;
  const nextRoundFirstQIdx = completedRound * 5;
  const nextRoundCat = state.room.questions?.[nextRoundFirstQIdx]?.cat || `Round ${nextRound}`;
  const sorted = [...state.players].sort((a, b) => b.score - a.score);

  const lbRows = sorted.map((p, i) => {
    return `<div class="lb-row${i === 0 ? ' lb-row-first' : ''}">
      <div style="font-size:14px;color:${i < 3 ? '#7c3aed' : '#9090b8'};width:24px;font-weight:${i < 3 ? 600 : 400};">${i + 1}</div>
      ${avatarHTML(p, 32)}
      <div style="flex:1;font-size:15px;color:#1a1a2e;">${p.name}</div>
      <div style="font-size:15px;color:#7c3aed;font-weight:600;">${p.score} pts</div>
    </div>`;
  }).join('');

  document.body.classList.remove('tv-mode');

  if (state.hostPlayer) {
    sb.from('players').select('id,name,score,avatar').eq('room_id', state.room.id).order('score', { ascending: false })
      .then(({ data: allPlayers }) => {
        const sorted = allPlayers || [];
        const myRank = sorted.findIndex(p => p.id === state.hostPlayer?.id) + 1;
        const lbRows = sorted.map((p, i) => {
          const isMe = p.id === state.hostPlayer?.id;
          return `<div style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;${isMe ? 'background:#f5f3ff;' : ''}margin-bottom:4px;">
            <div style="font-size:13px;color:${i < 3 ? '#a78bfa' : '#9090b8'};width:20px;font-weight:${i < 3 ? 600 : 400};">${i + 1}</div>
            ${avatarHTML(p, 30)}
            <div style="flex:1;font-size:14px;color:${isMe ? '#6d28d9' : '#1a1a2e'};font-weight:${isMe ? 500 : 400};">${isMe ? p.name + ' (you)' : p.name}</div>
            <div style="font-size:14px;color:#a78bfa;font-weight:600;">${p.score}</div>
          </div>`;
        }).join('');
        setHTML(`
          <div class="fade-in">
            <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
              <button onclick="newGame()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:12px;color:#9090b8;cursor:pointer;">✕ End game</button>
            </div>
            <div style="text-align:center;margin-bottom:20px;margin-top:16px;">
              <div style="font-size:11px;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;">Round ${completedRound} complete</div>
              <div style="font-size:22px;font-weight:500;color:#1a1a2e;">Leaderboard</div>
              ${myRank > 0 ? `<div style="font-size:13px;color:#9090b8;margin-top:4px;">You're #${myRank}</div>` : ''}
            </div>
            <div class="card" style="margin-bottom:16px;">${lbRows}</div>
            <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:10px;padding:10px 16px;text-align:center;margin-bottom:16px;">
              <div style="font-size:13px;color:#6d28d9;font-weight:500;">Round ${nextRound} is worth ${nextRound}× points</div>
              <div style="font-size:11px;color:#9090b8;margin-top:2px;">Time to catch up — or pull ahead</div>
            </div>
            <button class="btn-primary" style="font-size:16px;padding:14px;" onclick="startNextRound(${nextRound})">
              Start round ${nextRound} — ${nextRoundCat} →
            </button>
          </div>
        `);
      });
    return;
  }

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button onclick="newGame()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:12px;color:#9090b8;cursor:pointer;">✕ End game</button>
      </div>
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:12px;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">Round ${completedRound} complete</div>
        <div style="font-size:24px;font-weight:500;color:#1a1a2e;">Leaderboard</div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">Standings after round ${completedRound}</div>
        ${lbRows || '<div style="color:#9090b8;font-size:13px;">No players</div>'}
      </div>

      <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:10px;padding:10px 16px;text-align:center;margin-bottom:16px;">
        <div style="font-size:13px;color:#6d28d9;font-weight:500;">Round ${nextRound} is worth ${nextRound}× points</div>
        <div style="font-size:11px;color:#9090b8;margin-top:2px;">Time to catch up — or pull ahead</div>
      </div>

      <button class="btn-primary" style="font-size:16px;padding:14px;" onclick="startNextRound(${nextRound})">
        Start round ${nextRound} — ${nextRoundCat} →
      </button>
      <div style="font-size:12px;color:#9090b8;text-align:center;margin-top:8px;">Players are waiting on the leaderboard screen</div>
    </div>
  `);
}

async function startNextRound(roundNum) {
  unlockAudio();
  state.revealed = false;
  const qi = state.room.current_question_index;

  // Set question_start_time 3 seconds in the future so join screens
  // can show their countdown and still have a fresh reveal window
  const futureStart = new Date(Date.now() + 3000).toISOString();
  await sb.from('game_rooms').update({
    question_start_time: futureStart,
    current_question_index: qi,
  }).eq('id', state.room.id);
  state.room.question_start_time = futureStart;
  if (state.tvMode) document.body.classList.add('tv-mode');

  if (state.hostPlayer) {
    const q = state.room.questions?.[qi];
    setHTML(`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:40px 20px;">
        <div style="font-size:13px;color:#9090b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;">Get ready</div>
        <div style="font-size:32px;font-weight:500;color:#1a1a2e;margin-bottom:6px;">Round ${roundNum}</div>
        <div style="font-size:15px;color:#7c3aed;margin-bottom:40px;">${q?.cat || ''}</div>
        <div style="position:relative;width:80px;height:80px;margin-bottom:32px;">
          <svg viewBox="0 0 80 80" style="width:80px;height:80px;transform:rotate(-90deg);">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#e4e4f0" stroke-width="6"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="#7c3aed" stroke-width="6"
              stroke-dasharray="213" stroke-dashoffset="0"
              id="countdownCircle" style="transition:stroke-dashoffset 1s linear;"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:500;color:#7c3aed;" id="countdownNum">3</div>
        </div>
        <style>@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
      </div>
    `);
    const circle = document.getElementById('countdownCircle');
    const numEl = document.getElementById('countdownNum');
    const circumference = 213;
    for (let i = 3; i >= 1; i--) {
      if (numEl) numEl.textContent = i;
      if (circle) circle.style.strokeDashoffset = circumference * (1 - i/3);
      await new Promise(r => setTimeout(r, 1000));
    }
  }

  showIngame();
}

// ─── GAME OVER SCREEN ────────────────────────────────────────────────────────
async function incrementGamesPlayed() {
  try {
    const { data } = await sb.from('game_stats').select('count').eq('id', 'total_games').single();
    if (data) await sb.from('game_stats').update({ count: (data.count || 0) + 1 }).eq('id', 'total_games');
  } catch(e) {}
}

function showGameOver() {
  incrementGamesPlayed();
  playVictoryFanfare();
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  stopClip();
  document.body.classList.remove('tv-mode');
  state.view = 'gameover';

  setHTML(`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:40px 20px;">
      <div style="font-size:96px;margin-bottom:24px;animation:trophy 0.6s ease-out forwards;">🏆</div>
      <div style="font-size:28px;font-weight:500;color:#1a1a2e;margin-bottom:8px;">Game over!</div>
      <div style="font-size:15px;color:#9090b8;margin-bottom:32px;">Calculating final scores…</div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s 0s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .4s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .8s infinite;"></div>
      </div>
      <style>
        @keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
        @keyframes trophy{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
      </style>
    </div>
  `);

  setTimeout(() => showResults(), 3000);
}

// ─── RESULTS SCREEN ───────────────────────────────────────────────────────────
function showResults() {
  clearInterval(state.timerInterval);
  if (state.subscription) state.subscription.unsubscribe();
  state.view = 'results';

  // Remove TV mode when showing results
  document.body.classList.remove('tv-mode');

  const sorted = [...state.players].sort((a, b) => b.score - a.score);

  const podiumHTML = (() => {
    const top3 = sorted.slice(0, 3);
    if (top3.length === 0) return '<div style="text-align:center;color:#9090b8;">No players</div>';
    const order = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : [top3[0]];
    const heights = [70, 90, 55];
    const labels = top3.length >= 2 ? ['2nd', '1st', '3rd'] : ['1st'];
    const bgColors = ['#dcfce7', '#ede9fe', '#fee2e2'];
    return `<div class="podium">${order.map((p, i) => {
      const h = top3.length >= 2 ? heights[i] : 90;
      const label = top3.length >= 2 ? labels[i] : '1st 🥇';
      const podBg = top3.length >= 2 ? bgColors[i] : '#ede9fe';
      return `<div class="podium-slot">
        <div style="font-size:${(i === 1 || top3.length < 2) ? '36px' : '22px'};line-height:1;margin-bottom:6px;">${(i === 1 || top3.length < 2) ? '🏆' : i === 0 ? '🥈' : '🥉'}</div>
        <div style="margin:0 auto 6px;width:fit-content;">${avatarHTML(p, i===1||top3.length<2?44:36)}</div>
        <div style="font-size:${i===1||top3.length<2?13:12}px;color:${i===1||top3.length<2?'#1a1a2e':'#6b6b9a'};margin-bottom:6px;font-weight:${i===1||top3.length<2?500:400};">${p.name}</div>
        <div class="podium-bar" style="background:${podBg};border:1px solid #e4e4f0;height:${h}px;width:80px;flex-direction:column;">
          <div style="font-size:${i===1||top3.length<2?18:14}px;color:#a78bfa;font-weight:500;">${p.score}</div>
        </div>
        <div style="font-size:${i===1||top3.length<2?14:12}px;color:${i===1||top3.length<2?'#7c3aed':'#6b6b9a'};font-weight:${i===1||top3.length<2?500:400};margin-top:4px;">${label}</div>
      </div>`;
    }).join('')}</div>`;
  })();

  const lbRows = sorted.map((p, i) => {
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e4e4f0;">
      <div style="font-size:13px;color:${i<3?'#7c3aed':'#9090b8'};width:20px;">${i+1}</div>
      ${avatarHTML(p, 28)}
      <div style="flex:1;font-size:13px;color:#1a1a2e;">${p.name}</div>
      <div style="font-size:13px;color:#a78bfa;font-weight:500;">${p.score} pts</div>
    </div>`;
  }).join('');

  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:13px;color:#9090b8;margin-bottom:6px;">Game over · ${PRESETS[state.room?.config?.preset]?.name || 'Quizzli'}</div>
        <div style="font-size:22px;font-weight:500;color:#1a1a2e;">Final leaderboard</div>
      </div>

      ${podiumHTML}

      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">All players</div>
        ${lbRows || '<div style="color:#9090b8;font-size:13px;">No players</div>'}
      </div>

      <button class="btn-primary" onclick="playAgain()">Play again</button>
      <div style="text-align:center;margin-top:10px;"><a href="index.html" style="font-size:12px;color:#9090b8;text-decoration:none;">← Back to home</a></div>
    </div>
  `);
}

async function playAgain() {
  stopClip();
  clearInterval(state.timerInterval);
  if (!state.room) { showSetup(); return; }

  setHTML(`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px;text-align:center;">
      <div style="font-size:32px;margin-bottom:24px;">🧠</div>
      <div style="font-size:20px;font-weight:500;color:#1a1a2e;margin-bottom:8px;">Building your quiz…</div>
      <div style="font-size:14px;color:#9090b8;margin-bottom:32px;" id="loadingMsg">Generating new questions…</div>
      <div style="width:100%;max-width:280px;height:4px;background:#e4e4f0;border-radius:4px;overflow:hidden;margin-bottom:32px;">
        <div id="loadingBar" style="height:100%;background:#7c3aed;border-radius:4px;width:0%;transition:width .6s ease;"></div>
      </div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s 0s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .4s infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .8s infinite;"></div>
      </div>
      <style>@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
    </div>
  `);
  window.scrollTo({ top: 0, behavior: 'instant' });

  const playAgainMessages = [
    'Generating new questions…',
    'Finding fresh music clips…',
    'Mixing up the categories…',
    'Making it harder this time…',
    'Almost ready…',
  ];
  let paIdx = 0;
  let paProgress = 0;
  const playAgainInterval = setInterval(() => {
    paIdx = (paIdx + 1) % playAgainMessages.length;
    paProgress = Math.min(paProgress + Math.random() * 18 + 8, 90);
    const msgEl = document.getElementById('loadingMsg');
    const barEl = document.getElementById('loadingBar');
    if (msgEl) msgEl.textContent = playAgainMessages[paIdx];
    if (barEl) barEl.style.width = paProgress + '%';
  }, 2000);

  const cfg = state.room.config || {};
  const payload = { rounds: cfg.rounds || 3, timer: cfg.timer || 15, difficulty: cfg.difficulty || 'mixed' };
  if (Array.isArray(cfg.categories) && cfg.categories.length) payload.categories = cfg.categories;
  else payload.preset = cfg.preset || 'mixed';
  const customMusicCatObjs = state.customCats.filter(c => c.music);
  const customMusicCats = customMusicCatObjs.map(c => c.name);
  if (customMusicCats.length) {
    payload.customMusicCats = customMusicCats;
    const customCatsMeta = {};
    customMusicCatObjs.forEach(c => { customCatsMeta[c.name] = { musicType: c.musicType || 'genre' }; });
    payload.customCatsMeta = customCatsMeta;
  }
  if (state.playedSongs.length) payload.avoidSongs = state.playedSongs.join('||');

  let newQuestions = null;
  try {
    const res = await fetch('/api/rooms?questionsOnly=true', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok && data.questions) newQuestions = data.questions;
  } catch(e) { /* fall through */ }

  const patch = { status: 'lobby', current_question_index: 0, question_start_time: null };
  if (newQuestions) patch.questions = newQuestions;
  await sb.from('game_rooms').update(patch).eq('id', state.room.id);
  await sb.from('players').delete().eq('room_id', state.room.id);

  const prevHostPlayer = state.hostPlayer;
  state.room = { ...state.room, ...patch };
  state.players = [];
  state.revealed = false;
  state.hostPlayer = null;
  state.hostAnswered = false;
  state.hostAnswer = null;
  state.hostScore = 0;
  state.hostAnswers = [];
  localStorage.removeItem(HOST_PLAYER_ID_KEY);

  if (prevHostPlayer) {
    try {
      const { data: existingForAvatar } = await sb.from('players').select('avatar').eq('room_id', state.room.id);
      const avatar = assignAnimal(existingForAvatar);
      const { data: newHostPlayer, error } = await sb.from('players').insert({
        room_id: state.room.id,
        name: prevHostPlayer.name,
        score: 0,
        answers: [],
        avatar,
      }).select().single();
      if (!error && newHostPlayer) {
        state.hostPlayer = newHostPlayer;
        localStorage.setItem(HOST_PLAYER_ID_KEY, newHostPlayer.id);
      }
    } catch(e) {
      console.warn('Failed to re-create host player:', e);
    }
  }

  clearInterval(playAgainInterval);
  const paBarEl = document.getElementById('loadingBar');
  if (paBarEl) paBarEl.style.width = '100%';
  await new Promise(r => setTimeout(r, 400));

  subscribeToRoom();
  showLobby();
}

async function newGame() {
  if (!confirm('End this game and start a new one?')) return;
  stopClip();
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  if (state.subscription) state.subscription.unsubscribe();
  if (state.room) {
    await sb.from('game_rooms').update({ status: 'finished' }).eq('id', state.room.id);
  }
  state.room = null;
  state.players = [];
  state.revealed = false;
  state.autoAdvanceTimeout = null;
  state.subscription = null;
  state.playedSongs = [];
  state.hostPlayer = null;
  state.hostAnswered = false;
  state.hostAnswer = null;
  state.hostScore = 0;
  state.hostAnswers = [];
  state.preset = 'mixed';
  state.rounds = 3;
  state.timer = 10;
  state.difficulty = 'mixed';
  localStorage.removeItem(HOST_PLAYER_ID_KEY);
  localStorage.removeItem(HOST_PLAYER_NAME_KEY);
  document.body.classList.remove('tv-mode');
  showSetup();
}

// ─── Init ────────────────────────────────────────────────────────────────────
state.customCats = loadCustomCats();
state.tvMode = localStorage.getItem('trivia-tv-mode') === 'true';

async function init() {
  const savedCode = localStorage.getItem(HOST_ROOM_CODE_KEY);
  if (savedCode) {
    try {
      const res = await fetch(`/api/rooms?code=${savedCode}`);
      if (res.ok) {
        const room = await res.json();
        if (room && (room.status === 'lobby' || room.status === 'active')) {
          state.room = room;
          state.players = [];

          const savedPlayerId = localStorage.getItem(HOST_PLAYER_ID_KEY);
          if (savedPlayerId) {
            const { data: playerData } = await sb.from('players')
              .select('*').eq('id', savedPlayerId).maybeSingle();
            if (playerData && playerData.room_id === room.id) {
              state.hostPlayer = playerData;
              state.hostScore = playerData.score || 0;
              state.hostAnswers = playerData.answers || [];
            }
          }

          subscribeToRoom();
          if (room.status === 'active') {
            showIngame();
          } else {
            showLobby();
          }
          return;
        }
      }
    } catch(e) {}
  }
  showSetup();
}
init();
</script>
</body>
</html>
