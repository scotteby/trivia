<!--
  SUPABASE SETUP REQUIRED — run this SQL in your Supabase SQL Editor:

  CREATE TABLE game_rooms (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    room_code TEXT UNIQUE NOT NULL,
    status TEXT DEFAULT 'lobby',
    current_question_index INT DEFAULT 0,
    question_start_time TIMESTAMPTZ,
    config JSONB DEFAULT '{}',
    questions JSONB DEFAULT '[]',
    created_at TIMESTAMPTZ DEFAULT NOW()
  );

  CREATE TABLE players (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    room_id UUID REFERENCES game_rooms(id) ON DELETE CASCADE,
    name TEXT NOT NULL,
    score INT DEFAULT 0,
    answers JSONB DEFAULT '[]',
    joined_at TIMESTAMPTZ DEFAULT NOW()
  );

  ALTER TABLE game_rooms REPLICA IDENTITY FULL;
  ALTER TABLE players REPLICA IDENTITY FULL;

  -- Enable Realtime in Supabase Dashboard → Database → Replication
  -- Add game_rooms and players tables to the supabase_realtime publication

  -- Allow anon access (for development):
  ALTER TABLE game_rooms DISABLE ROW LEVEL SECURITY;

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5fa; color: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

.card { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(100,100,200,0.06); }
.card.featured { border-color: #c4b5fd; background: #f5f3ff; }
.card.music { border-color: #93c5fd; background: #eff6ff; }
.badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; }
.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-blue { background: #eff6ff; color: #1d4ed8; }
.badge-green { background: #f0fdf4; color: #166534; }
.tag { display: inline-block; background: #f5f5fa; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #9090b8; margin: 2px; }
.tag-purple { background: #ede9fe; color: #6d28d9; }
.tag-blue { background: #eff6ff; color: #3b82f6; }
.tag-green { background: #f0fdf4; color: #166534; }
.tag-amber { background: #fefce8; color: #92400e; }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.btn-outline { background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #9090b8; cursor: pointer; transition: border-color .2s, color .2s; }
.btn-outline:hover { border-color: #7c3aed88; color: #7c3aed; }
.rt-btn { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #9090b8; text-align: center; cursor: pointer; transition: background .2s, border-color .2s, color .2s; }
.rt-btn.sel { background: #ede9fe; border-color: #7c3aed; color: #6d28d9; }
.divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
.divider-line { flex: 1; border-top: 1px solid #e4e4f0; }
.divider-text { font-size: 11px; color: #9090b8; }
.fade-in { animation: fadeUp .35s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.player-chip { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; }
.lb-row-first { background: #f0f0fa; }
.timer-badge { border-radius: 20px; padding: 4px 14px; font-size: 14px; font-weight: 500; display: inline-block; border: 1px solid #e4e4f0; }
.timer-ok { color: #6d28d9; border-color: #c4b5fd; background: #ede9fe; }
.timer-warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
.timer-danger { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
.option-btn-host { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 10px; padding: 14px 16px; font-size: 15px; color: #2a2a4a; text-align: left; line-height: 1.4; box-shadow: 0 1px 3px rgba(100,100,200,0.06); }
.option-btn-host.correct { background: #f0fdf4; border-color: #22c55e; color: #166534; }
.option-btn-host.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
.sub-label { font-size: 11px; color: #9090b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
hr { border: none; border-top: 1px solid #e4e4f0; margin: 14px 0; }

/* Preset grid */
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.preset-card { background: #ffffff; border: 2px solid #e4e4f0; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color .2s, background .2s; }
.preset-card:hover { border-color: #c4b5fd; }
.preset-card.selected { border-color: #7c3aed; background: #f5f3ff; }
.preset-card.music-card { border-color: #93c5fd; background: #eff6ff; }
.preset-card.music-card:hover, .preset-card.music-card.selected { border-color: #378add; background: #dbeafe; }

/* In-game layout */
.ingame-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
@media (max-width: 700px) { .ingame-layout { grid-template-columns: 1fr; } .ingame-sidebar { display: none; } }

/* Podium */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 20px; }
.podium-slot { text-align: center; }
.podium-bar { border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.wave-bar { width: 4px; border-radius: 2px; background: #7c3aed; transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
@keyframes wave { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
/* Custom categories */
.custom-suggestion { padding: 9px 12px; font-size: 13px; color: #1a1a2e; cursor: pointer; border-bottom: 1px solid #f0f0fa; transition: background .1s; }
.custom-suggestion:hover { background: #f0f0fa; }
.custom-suggestion:last-child { border-bottom: none; }

/* TV mode overrides — all scoped to body.tv-mode */
body.tv-mode { background: #0f0f1a; color: #e8e8f0; }
body.tv-mode .card,
body.tv-mode #app > div { background: transparent; }
body.tv-mode .ingame-card { background: #16162a; border-color: #2a2a48; }
body.tv-mode .option-btn-host { background: #16162a; border-color: #2a2a48; color: #c8c8e0; font-size: 18px; }
body.tv-mode .option-btn-host.correct { background: #0f2d1f; border-color: #22c55e; color: #86efac; }
body.tv-mode .option-btn-host.wrong { background: #2d0f0f; border-color: #ef4444; color: #fca5a5; }
body.tv-mode .timer-badge { background: #1e1e35; }
body.tv-mode .timer-ok { color: #a78bfa; border-color: #7c3aed44; }
body.tv-mode .timer-warn { color: #f59e0b; border-color: #f59e0b44; background: #1e1e35; }
body.tv-mode .timer-danger { color: #ef4444; border-color: #ef444444; background: #1e1e35; }
body.tv-mode .lb-row { color: #e8e8f0; }
body.tv-mode .lb-row-first { background: #1e1e35; }
.ingame-question { color: #1a1a2e; }
.ingame-cat { color: #9090b8; }
body.tv-mode .ingame-question { font-size: 22px; color: #e8e8f0; }
body.tv-mode .ingame-cat { color: #888; }
body.tv-mode .ingame-sidebar-label { color: #555; }
body.tv-mode .ingame-resp { background: #16162a; border-color: #2a2a48; color: #a78bfa; }
body.tv-mode .ingame-resp-bar-track { background: #2a2a48; }
body.tv-mode .ingame-room-code { background: #1e1e35; border-color: #2a2a48; color: #a78bfa; }
body.tv-mode .ingame-room-code span { color: #fff; }
body.tv-mode .wave-bar { background: #7c3aed; }
body.tv-mode .clip-status { color: #7c3aed; }
</style>

const AVATAR_COLORS = [
  ['#2d1a4e','#c4b5fd'], ['#1a2d1e','#86efac'], ['#2d1a1a','#fca5a5'],

];

const CUSTOM_CATS_KEY = 'trivia-custom-cats';
const SUGGESTIONS = ['Taylor Swift', 'Eagles trivia', 'Philly sports', 'Harry Potter', 'Lord of the Rings', 'Marvel movies', 'Seinfeld', 'The Office', 'Friends', 'Disney', 'Star Wars', 'Game of Thrones', '90s commercials', 'Christmas movies', 'Halloween trivia', 'Super Bowl history', 'World Cup soccer', 'NBA legends', 'Beatles songs', 'Elvis Presley'];
const MUSIC_SUGGESTIONS = new Set(['Taylor Swift', 'Beatles songs', 'Elvis Presley', 'Beyoncé', 'Michael Jackson']);
let _hostCustomInput = '';
let _hostCustomMusicFlag = false;
let _hostCustomMusicType = 'genre';

function avatarColor(i) { return AVATAR_COLORS[i % AVATAR_COLORS.length]; }

function avatarHTML(name, idx, size = 32) {
  const [bg, fg] = avatarColor(idx);
  const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*.35}px;background:${bg};color:${fg};">${initials}</div>`;
}

function getTimeLeft() {
  if (!state.room?.question_start_time) return state.room?.config?.timer || 15;
  const timer = state.room.config?.timer || 15;
  const elapsed = (Date.now() - new Date(state.room.question_start_time).getTime()) / 1000;
  return Math.max(0, timer - elapsed);
}

// ─── TV mode ──────────────────────────────────────────────────────────────────
function toggleTvMode() {
  state.tvMode = !state.tvMode;
  localStorage.setItem('trivia-tv-mode', state.tvMode);

  if (state.tvMode) {
    document.body.classList.add('tv-mode');
  } else {
    document.body.classList.remove('tv-mode');
  }

  // Only patch the UI elements that change — do NOT call showIngame()
  // which would restart the timer and cause double-advancing
  if (state.view === 'ingame' || state.view === 'reveal') {
    const topBar = document.querySelector('.fade-in > div:first-child');
    if (topBar) {
      const exitBtn = topBar.querySelector('button:first-child');
      if (exitBtn) {
        if (state.tvMode) {
          exitBtn.textContent = '← Exit TV mode';
          exitBtn.style.cssText = 'background:#1e1e35;border:1px solid #2a2a48;border-radius:8px;padding:6px 12px;font-size:11px;color:#555;cursor:pointer;';
          exitBtn.onclick = () => toggleTvMode();
        } else {
          exitBtn.textContent = '✕ New game';
          exitBtn.style.cssText = 'background:transparent;border:1.5px solid #d0d0e8;border-radius:8px;padding:6px 12px;font-size:12px;color:#6b6b9a;cursor:pointer;';
          exitBtn.onclick = () => newGame();
        }
      }
    }

    const tvBannerEl = document.getElementById('tv-banner');
    if (tvBannerEl) tvBannerEl.style.display = state.tvMode ? 'none' : 'flex';

    const tvHintEl = document.getElementById('tv-hint');
    if (tvHintEl) tvHintEl.style.display = state.tvMode ? 'block' : 'none';

    const questionEl = document.querySelector('.ingame-question');
    if (questionEl) questionEl.style.fontSize = state.tvMode ? '22px' : '18px';
    document.querySelectorAll('.option-btn-host').forEach(el => {
      el.style.fontSize = state.tvMode ? '18px' : '15px';
    });
  }
}

// ─── Custom categories ────────────────────────────────────────────────────────
function loadCustomCats() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_CATS_KEY) || '[]').filter(c => c.name && typeof c.music === 'boolean'); }
  catch { return []; }
}
function saveCustomCats() {
  localStorage.setItem(CUSTOM_CATS_KEY, JSON.stringify(state.customCats));
}
function addCustomCatHost(name, music) {
  const n = name.trim();
  if (n.length < 2 || state.customCats.length >= 10) return;
  if (state.customCats.find(c => c.name.toLowerCase() === n.toLowerCase())) return;
  state.customCats.push({ name: n, music, musicType: music ? _hostCustomMusicType : null });
  saveCustomCats();
  _hostCustomInput = '';
  _hostCustomMusicFlag = false;
  _hostCustomMusicType = 'genre';
  document.getElementById('cat-picker').innerHTML = pickerHTML();
  if (_hostCustomInput) onHostCustomInput(_hostCustomInput);
}
function removeCustomCatHost(name) {
  state.customCats = state.customCats.filter(c => c.name !== name);
  saveCustomCats();
  document.getElementById('cat-picker').innerHTML = pickerHTML();
  if (_hostCustomInput) onHostCustomInput(_hostCustomInput);
}
function onHostCustomInput(val) {
  _hostCustomInput = val;
  const len = val.trim().length;
  const addBtn = document.getElementById('hostCustomAddBtn');
  if (addBtn) { addBtn.style.opacity = len >= 2 ? '1' : '.4'; addBtn.style.pointerEvents = len >= 2 ? '' : 'none'; }
  const toggleRow = document.getElementById('hostMusicToggleRow');
  if (toggleRow) toggleRow.style.display = len >= 2 ? 'block' : 'none';
  if (len >= 2 && MUSIC_SUGGESTIONS.has(val.trim())) { _hostCustomMusicFlag = true; updateMusicToggleUIHost(); }
  updateMusicHintHost(val.trim());
  const el = document.getElementById('hostCustomSuggestions');
  if (!el) return;
  if (len === 0) { el.style.display = 'none'; return; }
  const lower = val.trim().toLowerCase();
  const filtered = SUGGESTIONS.filter(s => s.toLowerCase().includes(lower) && !state.customCats.find(c => c.name.toLowerCase() === s.toLowerCase())).slice(0, 6);
  if (!filtered.length) { el.style.display = 'none'; return; }
  el.innerHTML = filtered.map(s => `<div class="custom-suggestion" onclick="selectSuggestionHost('${s.replace(/'/g,"\\'")}');">${s}</div>`).join('');
  el.style.display = 'block';
}
function selectSuggestionHost(name) {
  _hostCustomInput = name;
  _hostCustomMusicFlag = MUSIC_SUGGESTIONS.has(name);
  const input = document.getElementById('hostCustomInput');
  if (input) input.value = name;
  const el = document.getElementById('hostCustomSuggestions');
  if (el) el.style.display = 'none';
  const toggleRow = document.getElementById('hostMusicToggleRow');
  if (toggleRow) toggleRow.style.display = 'block';
  updateMusicToggleUIHost();
  updateMusicHintHost(name);
  const addBtn = document.getElementById('hostCustomAddBtn');
  if (addBtn) { addBtn.style.opacity = '1'; addBtn.style.pointerEvents = ''; }
}
function tryAddCustomCatHost() {
  addCustomCatHost(_hostCustomInput, _hostCustomMusicFlag);
}
function toggleMusicFlagHost() {
  _hostCustomMusicFlag = !_hostCustomMusicFlag;
  if (!_hostCustomMusicFlag) _hostCustomMusicType = 'genre';
  updateMusicToggleUIHost();
  updateMusicHintHost(_hostCustomInput.trim());
  const typeRow = document.getElementById('hostMusicTypeRow');
  if (typeRow) typeRow.style.display = _hostCustomMusicFlag ? 'block' : 'none';
}
function updateMusicToggleUIHost() {
  const track = document.getElementById('hostMusicToggleTrack');
  const thumb = document.getElementById('hostMusicToggleThumb');
  if (track) track.style.background = _hostCustomMusicFlag ? '#378add' : '#e4e4f0';
  if (thumb) thumb.style.left = _hostCustomMusicFlag ? '23px' : '3px';
}
function updateMusicHintHost(name) {
  const el = document.getElementById('hostMusicHint');
  if (el) el.textContent = _hostCustomMusicFlag && name ? `iTunes will search for "${name}" clips` : '';
}
function setHostCustomMusicType(t) {
  _hostCustomMusicType = t;
  ['artist', 'genre', 'soundtrack'].forEach(type => {
    const el = document.getElementById('hostCustomType_' + type);
    if (!el) return;
    const sel = type === t;
    el.style.background = sel ? '#f5f3ff' : '#ffffff';
    el.style.borderColor = sel ? '#7c3aed' : '#e4e4f0';
    el.querySelector('.type-label').style.color = sel ? '#6d28d9' : '#9090b8';
  });
}

// ─── SETUP SCREEN ─────────────────────────────────────────────────────────────
function showSetup() {
  state.view = 'setup';
  const presetCards = Object.entries(PRESETS).map(([key, p]) => {
    const isSelected = state.preset === key;
    const cardClass = p.isMusic ? `preset-card music-card${isSelected ? ' selected' : ''}` : `preset-card${isSelected ? ' selected' : ''}`;
    const tags = p.tags.map(([t, c]) => `<span class="tag tag-${c}">${t}</span>`).join('');
    const check = isSelected ? `<div style="width:18px;height:18px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;">✓</div>` : '';
    const popularBadge = p.popular ? `<span class="badge badge-blue" style="font-size:10px;">Most popular</span>` : '';
    return `
      <div class="${cardClass}" onclick="selectPreset('${key}')" style="${key === 'musicmix' ? 'grid-column:span 2;' : ''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:${p.isMusic ? '#1d4ed8' : '#1a1a2e'};">${p.name}</div>
            <div style="font-size:11px;color:${p.isMusic ? '#378add' : '#9090b8'};">${p.desc}</div>
          </div>
          ${check}${popularBadge}
        </div>
        <div>${tags}</div>
      </div>
    `;
  }).join('');

  const roundBtns = [2, 3, 4].map(r =>

function selectPickerCat(catName) {
  const cat = CATEGORY_DATA.find(c => c.name === catName);
  if (!cat.subs) {
    applyCategory(state.pickerRound, catName, null);
  } else {
    state.pickerCat = catName;
    document.getElementById('cat-picker').innerHTML = pickerHTML();
  }
}

function backToCats() {
  state.pickerCat = null;
  document.getElementById('cat-picker').innerHTML = pickerHTML();
}

function applyCategory(roundIdx, categoryStr, e) {
  if (e) e.stopPropagation();
  state.customCategories[roundIdx] = categoryStr;
  closePicker();
  showCustomSetup();
}

async function createRoom() {
  if (window.location.protocol === 'file:') {
    showDevError();
    return;
  }
  const btn = document.getElementById('createBtn');
  const setStatus = t => { if (btn) btn.textContent = t; };
  if (btn) btn.disabled = true;
  setStatus('Generating questions…');

  try {
    const customMusicCatObjs = state.customCats.filter(c => c.music);
    const customMusicCats = customMusicCatObjs.map(c => c.name);
    const customCatsMeta = {};
    customMusicCatObjs.forEach(c => { customCatsMeta[c.name] = { musicType: c.musicType || 'genre' }; });
    const basePayload = { rounds: state.rounds, timer: state.timer, difficulty: state.difficulty, ...(customMusicCats.length ? { customMusicCats, customCatsMeta } : {}) };
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.customMode && state.customCategories.length === state.rounds
        ? { ...basePayload, categories: state.customCategories }
        : { ...basePayload, preset: state.preset })
    });
    const data = await res.json();
    if (!res.ok) {
      if (data.error?.includes('529') || data.error?.includes('Overloaded')) {
        throw new Error('The AI is a bit busy right now — please try again in a few seconds.');
      }
      throw new Error(data.error || 'Failed to create room');
    }
    state.room = data;
    state.players = [];
    subscribeToRoom();
    showLobby();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Create room and get code'; }
    showSetupError(e.message);
  }
}

function showSetupError(msg) {
  const existing = document.getElementById('setupError');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'setupError';
  el.style.cssText = 'background:#fef2f2;border:1px solid #ef4444;border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:#991b1b;';
  el.textContent = 'Error: ' + msg;
  document.getElementById('root').appendChild(el);
}

function subscribeToRoom() {
  if (state.subscription) state.subscription.unsubscribe();
  const roomId = state.room.id;

  sb.from('players').select('*').eq('room_id', roomId).order('joined_at')
    .then(({ data }) => { if (data) { state.players = data; renderLobbyPlayers(); } });

  state.subscription = sb.channel('host_room_' + roomId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` }, payload => {
      if (payload.eventType === 'INSERT') {
        state.players = [...state.players.filter(p => p.id !== payload.new.id), payload.new];
      } else if (payload.eventType === 'UPDATE') {
        state.players = state.players.map(p => p.id === payload.new.id ? payload.new : p);
        if (state.view === 'ingame' || state.view === 'reveal') {
          renderIngameSidebar();
        }
      } else if (payload.eventType === 'DELETE') {
        state.players = state.players.filter(p => p.id !== payload.old.id);
      }
      if (state.view === 'lobby') renderLobbyPlayers();
    })
    .subscribe();
}

function showLobby() {
  state.view = 'lobby';
  const room = state.room;
  const joinUrl = `${window.location.origin}/join.html`;

  setHTML(`
    <div class="fade-in">

      </div>
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:13px;color:#9090b8;margin-bottom:6px;">Players join at</div>

        <div style="font-size:14px;color:#9090b8;margin-bottom:10px;">Room code</div>
        <div style="font-size:80px;font-weight:700;color:#7c3aed;letter-spacing:.15em;line-height:1;">${room.room_code}</div>
        <div style="font-size:12px;color:#9090b8;margin-top:8px;">Type this code on your phone</div>

function renderLobbyPlayers() {
  const count = state.players.length;
  const el = document.getElementById('playerCount');
  const list = document.getElementById('playerList');
  const btn = document.getElementById('startBtn');
  if (el) el.textContent = count;
  if (list) {
    list.innerHTML = state.players.map((p, i) =>
      `<div class="player-chip" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          ${avatarHTML(p.name, i, 26)}

          onmouseout="this.style.color='#d0d0e8'">✕</button>
      </div>`
    ).join('');
  }
  if (btn) {
    btn.disabled = count < 1;
    btn.textContent = count >= 1 ? `Start game (${count} player${count>1?'s':''})` : 'Start game (waiting for players…)';
  }
}

async function removePlayer(playerId) {
  try {
    await sb.from('players').delete().eq('id', playerId);
    state.players = state.players.filter(p => p.id !== playerId);
    renderLobbyPlayers();
  } catch(e) {
    console.warn('Failed to remove player:', e);
  }
}

function copyJoinLink(url) {
  navigator.clipboard.writeText(url).then(() => alert('Join link copied!'));
}

// ─── IN-GAME SCREEN ───────────────────────────────────────────────────────────

// 1-frame silent WAV — playing this before any await unlocks browser audio autoplay
const SILENT_AUDIO = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
function unlockAudio() {
  try { const a = new Audio(SILENT_AUDIO); a.volume = 0; a.play().catch(() => {}); } catch(e) {}
}

async function startGame() {
  // Unlock audio within the user gesture before the async DB call expires the gesture context
  unlockAudio();
  const startTime = new Date().toISOString();
  await sb.from('game_rooms').update({
    status: 'active',
    current_question_index: 0,
    question_start_time: startTime,
  }).eq('id', state.room.id);
  state.room.status = 'active';
  state.room.current_question_index = 0;
  state.room.question_start_time = startTime;
  state.revealed = false;
  showIngame();
}

const CLIP_DURATION = 10;
const ROUND_LEADERBOARD_SECS = 5;

function waveformHTML(color = '#7c3aed') {
  const heights = [8, 18, 12, 24, 10, 20, 14, 22, 8, 16];
  return `<div style="display:flex;align-items:center;gap:3px;height:28px;">
    ${heights.map((h, i) => `<div class="wave-bar" style="height:${h}px;animation-delay:${(i * 0.12).toFixed(2)}s;background:${color};"></div>`).join('')}
  </div>`;
}

function showIngame() {
  if (state.tvMode) {
    document.body.classList.add('tv-mode');
  } else {
    document.body.classList.remove('tv-mode');
  }

  state.view = 'ingame';
  state.revealed = false;
  const room = state.room;
  const qi = room.current_question_index;
  const q = room.questions[qi];
  const totalQ = room.questions.length;
  const questionsPerRound = 5;
  const roundNum = Math.floor(qi / questionsPerRound) + 1;
  const qInRound = (qi % questionsPerRound) + 1;
  const timerDuration = room.config?.timer || 15;
  const isMusic = !!(q.preview_url);

  const questionSize = state.tvMode ? '22px' : '18px';
  const optionSize = state.tvMode ? '18px' : '15px';

  const musicBanner = isMusic ? `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0 6px;">
      ${waveformHTML()}
      <div class="clip-status" style="font-size:12px;color:#7c3aed;" id="clipStatus">Playing 10s clip…</div>
    </div>` : '';

  const tvBanner = `
    <div id="tv-banner" style="display:${state.tvMode ? 'none' : 'flex'};background:#f5f3ff;border:1px solid #c4b5fd;border-radius:10px;padding:10px 16px;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <div style="font-size:13px;color:#1a1a2e;font-weight:500;">Connected to a TV?</div>
        <div style="font-size:12px;color:#9090b8;margin-top:2px;">Switch to full-screen dark mode for casting</div>
      </div>
      <button onclick="toggleTvMode()" style="display:inline-flex;align-items:center;gap:7px;background:#1a1a2e;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;color:#a78bfa;cursor:pointer;">
        📺 TV mode
      </button>
    </div>`;

  const exitTvBtn = state.tvMode ? `
    <button onclick="toggleTvMode()" style="background:#1e1e35;border:1px solid #2a2a48;border-radius:8px;padding:6px 12px;font-size:11px;color:#555;cursor:pointer;">← Exit TV mode</button>` : `
    <button onclick="newGame()" style="background:transparent;border:1.5px solid #d0d0e8;border-radius:8px;padding:6px 12px;font-size:12px;color:#6b6b9a;cursor:pointer;">✕ New game</button>`;

  const tvHint = `<div id="tv-hint" style="display:${state.tvMode ? 'block' : 'none'};font-size:11px;color:#555;text-align:center;margin-bottom:10px;">Press F11 for fullscreen · best for TV casting</div>`;

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        ${exitTvBtn}
        <div style="font-size:12px;color:#9090b8;">Round ${roundNum} · Question ${qInRound} of ${questionsPerRound}</div>
        <div class="ingame-room-code" style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:20px;padding:4px 14px;font-size:13px;color:#6d28d9;font-weight:500;">Join: <span style="color:#1a1a2e;letter-spacing:.1em;">${room.room_code}</span></div>
      </div>

      ${tvBanner}
      ${tvHint}

      <div class="ingame-layout">
        <div>
          <div class="card ingame-card" style="margin-bottom:14px;">
            <div class="ingame-cat" style="font-size:11px;margin-bottom:8px;">${q.cat}</div>
            ${musicBanner}
            <div class="ingame-question" style="font-size:${questionSize};font-weight:500;line-height:1.4;margin-bottom:14px;">${q.q}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div style="font-size:12px;color:#9090b8;">${state.players.length} players</div>
              <span class="timer-badge timer-ok" id="timerBadge">${isMusic ? '♫' : timerDuration + 's'}</span>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;" id="optionGrid">
            ${q.opts.map((o,i) => `<div class="option-btn-host" id="opt${i}" style="font-size:${optionSize};">${String.fromCharCode(65+i)} &nbsp; ${o}</div>`).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="ingame-sidebar-label" style="font-size:12px;" id="responseStatus">Waiting for answers...</div>
            ${state.revealed
              ? `<button class="btn-outline" onclick="advanceQuestion()" style="padding:8px 18px;">${qi + 1 < totalQ ? 'Next question →' : 'Show results →'}</button>`
              : `<button class="btn-outline" onclick="revealAnswer()" style="padding:8px 18px;">Reveal answer</button>`
            }
          </div>
        </div>

        <div class="ingame-sidebar">
          <div class="sub-label ingame-sidebar-label">Live leaderboard</div>
          <div id="leaderboard"></div>
          <hr>
          <div class="sub-label ingame-sidebar-label">Responses</div>
          <div class="card ingame-resp" style="text-align:center;" id="responseCard">
            <div style="font-size:28px;font-weight:500;color:#a78bfa;" id="responseCount">0 / ${state.players.length}</div>
            <div style="font-size:12px;color:#9090b8;margin-top:4px;">players answered</div>
            <div class="ingame-resp-bar-track" style="background:#e4e4f0;border-radius:4px;height:4px;margin-top:10px;overflow:hidden;"><div id="responseBar" style="background:#7c3aed;height:100%;width:0%;border-radius:4px;transition:width .3s;"></div></div>
          </div>
        </div>
      </div>
    </div>
  `);

  renderIngameSidebar();
  if (isMusic) {
    const isRoundStart = qi > 0 && qi % 5 === 0;
    const delay = isRoundStart ? ROUND_LEADERBOARD_SECS * 1000 : 0;
    state.clipStartTimeout = delay > 0
      ? setTimeout(() => playClip(q.preview_url), delay)
      : (playClip(q.preview_url), null);
  }
  startIngameTimer(timerDuration, isMusic);
}

function stopClip() {
  clearTimeout(state.clipStartTimeout);
  state.clipStartTimeout = null;
  clearTimeout(state.clipTimeout);
  state.clipTimeout = null;
  if (state.audio) {
    state.audio.pause();
    state.audio.src = '';
    state.audio = null;
  }
}

function playClip(url) {
  stopClip();
  if (!url) return;
  state.audio = new Audio(url);
  state.audio.volume = 1;
  state.audio.play().catch(() => {
    const cs = document.getElementById('clipStatus');
    if (cs) cs.textContent = 'Autoplay blocked — click to play';
  });
  state.clipTimeout = setTimeout(() => stopClip(), CLIP_DURATION * 1000);
}

function renderIngameSidebar() {
  const qi = state.room.current_question_index;
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const top5 = sorted.slice(0, 5);
  const lbEl = document.getElementById('leaderboard');
  if (lbEl) {
    lbEl.innerHTML = top5.map((p, i) => {
      const [bg, fg] = avatarColor(state.players.indexOf(p));
      return `
        <div class="lb-row${i===0?' lb-row-first':''}">
          <div style="font-size:13px;color:#9090b8;width:16px;">${i+1}</div>
          <div class="avatar" style="width:28px;height:28px;font-size:10px;background:${bg};color:${fg};">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
          <div style="flex:1;font-size:13px;">${p.name}</div>
          <div style="font-size:13px;color:#a78bfa;font-weight:500;">${p.score}</div>
        </div>
      `;
    }).join('');
  }
  const answered = state.players.filter(p => p.answers?.some(a => a.question_index === qi)).length;
  const total = state.players.length;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  const rcEl = document.getElementById('responseCount');
  const rbEl = document.getElementById('responseBar');
  const rsEl = document.getElementById('responseStatus');
  if (rcEl) rcEl.textContent = `${answered} / ${total}`;
  if (rbEl) rbEl.style.width = pct + '%';
  const allAnswered = answered === total && total > 0;
  if (rsEl) rsEl.textContent = allAnswered ? 'All players answered!' : `${answered} of ${total} answered`;
  if (allAnswered && !state.revealed) revealAnswer();
}

function startIngameTimer(duration, isMusic = false) {
  clearInterval(state.timerInterval);
  const startTime = new Date(state.room.question_start_time).getTime();

  state.timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const clipPhase = isMusic && elapsed < CLIP_DURATION;
    const countdownElapsed = isMusic ? Math.max(0, elapsed - CLIP_DURATION) : elapsed;
    const left = Math.max(0, duration - countdownElapsed);
    const badge = document.getElementById('timerBadge');

    if (clipPhase) {
      if (badge) { badge.textContent = '♫'; badge.className = 'timer-badge timer-ok'; }
    } else {
      const clipStatus = document.getElementById('clipStatus');
      if (clipStatus) clipStatus.textContent = '';
      if (badge) {
        badge.textContent = Math.ceil(left) + 's';
        badge.className = 'timer-badge ' + (left > 8 ? 'timer-ok' : left > 4 ? 'timer-warn' : 'timer-danger');
      }
      if (left <= 0) {
        clearInterval(state.timerInterval);
        if (!state.revealed) revealAnswer();
      }
    }
  }, 250);
}

function revealAnswer() {
  if (state.revealed) return;
  clearInterval(state.timerInterval);
  state.revealed = true;
  stopClip();
  const qi = state.room.current_question_index;
  const q = state.room.questions[qi];
  const totalQ = state.room.questions.length;
  const isLast = qi + 1 >= totalQ;

  q.opts.forEach((_, i) => {
    const el = document.getElementById('opt' + i);
    if (el) el.classList.add(i === q.ans ? 'correct' : 'wrong');
  });

  if (q.artist && q.song) state.playedSongs.push(`${q.artist} - ${q.song}`);

  const correctCount = state.players.filter(p => p.answers?.some(a => a.question_index === qi && a.correct)).length;
  const rsEl = document.getElementById('responseStatus');
  if (rsEl) rsEl.textContent = `${correctCount} of ${state.players.length} correct`;

  const btnArea = document.querySelector('.ingame-layout > div > div:last-child');
  if (btnArea) {
    const btn = btnArea.querySelector('button');
    if (btn) {
      btn.onclick = () => { clearTimeout(state.autoAdvanceTimeout); advanceQuestion(); };
      if (state.autoAdvance) {
        let secs = 3;
        const label = isLast ? 'Show results' : 'Next question';
        btn.textContent = `${label} (${secs}s)`;
        state.autoAdvanceTimeout = setInterval(() => {
          secs--;
          if (secs <= 0) {
            clearInterval(state.autoAdvanceTimeout);
            advanceQuestion();
          } else {
            btn.textContent = `${label} (${secs}s)`;
          }
        }, 1000);
      } else {
        btn.textContent = isLast ? 'Show results →' : 'Next question →';
      }
    }
  }
}

async function advanceQuestion() {
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  state.autoAdvanceTimeout = null;
  const qi = state.room.current_question_index;
  const totalQ = state.room.questions.length;

  if (qi + 1 >= totalQ) {
    await sb.from('game_rooms').update({ status: 'finished' }).eq('id', state.room.id);
    state.room.status = 'finished';
    showResults();
    return;
  }

  const newStart = new Date().toISOString();
  const newIdx = qi + 1;
  await sb.from('game_rooms').update({
    current_question_index: newIdx,
    question_start_time: newStart,
  }).eq('id', state.room.id);
  state.room.current_question_index = newIdx;
  state.room.question_start_time = newStart;
  state.revealed = false;
  showIngame();
}

// ─── RESULTS SCREEN ───────────────────────────────────────────────────────────
function showResults() {
  clearInterval(state.timerInterval);
  if (state.subscription) state.subscription.unsubscribe();
  state.view = 'results';

  // Remove TV mode when showing results
  document.body.classList.remove('tv-mode');

  const sorted = [...state.players].sort((a, b) => b.score - a.score);

  const podiumHTML = (() => {
    const top3 = sorted.slice(0, 3);
    if (top3.length === 0) return '<div style="text-align:center;color:#9090b8;">No players</div>';
    const order = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : [top3[0]];
    const heights = [70, 90, 55];
    const labels = top3.length >= 2 ? ['2nd', '1st 🥇', '3rd'] : ['1st 🥇'];
    const bgColors = ['#dcfce7', '#ede9fe', '#fee2e2'];
    return `<div class="podium">${order.map((p, i) => {
      const origIdx = sorted.indexOf(p);
      const [bg, fg] = avatarColor(origIdx);
      const h = top3.length >= 2 ? heights[i] : 90;
      const label = top3.length >= 2 ? labels[i] : '1st 🥇';
      const podBg = top3.length >= 2 ? bgColors[i] : '#ede9fe';
      return `<div class="podium-slot">
        ${i === 1 || top3.length < 2 ? '<div style="font-size:20px;margin-bottom:4px;">🏆</div>' : ''}
        <div class="avatar" style="margin:0 auto 6px;background:${bg};color:${fg};width:${i===1||top3.length<2?44:36}px;height:${i===1||top3.length<2?44:36}px;font-size:${i===1||top3.length<2?15:12}px;">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div style="font-size:${i===1||top3.length<2?13:12}px;color:${i===1||top3.length<2?'#1a1a2e':'#6b6b9a'};margin-bottom:6px;font-weight:${i===1||top3.length<2?500:400};">${p.name}</div>
        <div class="podium-bar" style="background:${podBg};border:1px solid #e4e4f0;height:${h}px;width:80px;flex-direction:column;">
          <div style="font-size:${i===1||top3.length<2?18:14}px;color:#a78bfa;font-weight:500;">${p.score}</div>
        </div>
        <div style="font-size:${i===1||top3.length<2?14:12}px;color:${i===1||top3.length<2?'#7c3aed':'#6b6b9a'};font-weight:${i===1||top3.length<2?500:400};margin-top:4px;">${label}</div>
      </div>`;
    }).join('')}</div>`;
  })();

  const lbRows = sorted.map((p, i) => {
    const [bg, fg] = avatarColor(i);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e4e4f0;">
      <div style="font-size:13px;color:${i<3?'#7c3aed':'#9090b8'};width:20px;">${i+1}</div>
      <div class="avatar" style="width:28px;height:28px;font-size:10px;background:${bg};color:${fg};">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
      <div style="flex:1;font-size:13px;color:#1a1a2e;">${p.name}</div>
      <div style="font-size:13px;color:#a78bfa;font-weight:500;">${p.score} pts</div>
    </div>`;
  }).join('');

  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:13px;color:#9090b8;margin-bottom:6px;">Game over · ${PRESETS[state.room?.config?.preset]?.name || 'Quizzli'}</div>
        <div style="font-size:22px;font-weight:500;color:#1a1a2e;">Final leaderboard</div>
      </div>

      ${podiumHTML}

      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">All players</div>
        ${lbRows || '<div style="color:#9090b8;font-size:13px;">No players</div>'}
      </div>

      <button class="btn-primary" onclick="playAgain()">Play again</button>
      <div style="text-align:center;margin-top:10px;"><a href="index.html" style="font-size:12px;color:#9090b8;text-decoration:none;">← Back to home</a></div>
    </div>
  `);
}

async function playAgain() {
  stopClip();
  clearInterval(state.timerInterval);
  if (!state.room) { showSetup(); return; }

  setHTML(`<div style="text-align:center;padding:100px 20px;">
    <div style="font-size:16px;font-weight:500;color:#a78bfa;margin-bottom:8px;">Generating new questions…</div>
    <div style="font-size:12px;color:#9090b8;">Same room code · fresh questions · ~10 seconds</div>
  </div>`);

  const cfg = state.room.config || {};
  const payload = { rounds: cfg.rounds || 3, timer: cfg.timer || 15, difficulty: cfg.difficulty || 'mixed' };
  if (Array.isArray(cfg.categories) && cfg.categories.length) payload.categories = cfg.categories;
  else payload.preset = cfg.preset || 'mixed';
  const customMusicCatObjs = state.customCats.filter(c => c.music);
  const customMusicCats = customMusicCatObjs.map(c => c.name);
  if (customMusicCats.length) {
    payload.customMusicCats = customMusicCats;
    const customCatsMeta = {};
    customMusicCatObjs.forEach(c => { customCatsMeta[c.name] = { musicType: c.musicType || 'genre' }; });
    payload.customCatsMeta = customCatsMeta;
  }
  if (state.playedSongs.length) payload.avoidSongs = state.playedSongs.join('||');

  let newQuestions = null;
  try {
    const res = await fetch('/api/rooms?questionsOnly=true', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok && data.questions) newQuestions = data.questions;
  } catch(e) { /* fall through */ }

  const patch = { status: 'lobby', current_question_index: 0, question_start_time: null };
  if (newQuestions) patch.questions = newQuestions;
  await sb.from('game_rooms').update(patch).eq('id', state.room.id);
  await sb.from('players').delete().eq('room_id', state.room.id);

  state.room = { ...state.room, ...patch };
  state.players = [];
  state.revealed = false;

  subscribeToRoom();
  showLobby();
}

async function newGame() {
  if (!confirm('End this game and start a new one?')) return;
  stopClip();
  clearInterval(state.timerInterval);
  clearInterval(state.autoAdvanceTimeout);
  if (state.subscription) state.subscription.unsubscribe();
  if (state.room) {
    await sb.from('game_rooms').update({ status: 'finished' }).eq('id', state.room.id);
  }
  state.room = null;
  state.players = [];
  state.revealed = false;
  state.autoAdvanceTimeout = null;
  state.subscription = null;
  state.playedSongs = [];
  document.body.classList.remove('tv-mode');
  showSetup();
}

// ─── Init ────────────────────────────────────────────────────────────────────
state.customCats = loadCustomCats();
state.tvMode = localStorage.getItem('trivia-tv-mode') === 'true';
showSetup();
</script>
