<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5fa; color: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem; }

/* Cards & layout */
.card { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(100,100,200,0.06); }
.card.featured { border-color: #c4b5fd; background: #f5f3ff; }
.badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; }
.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-green { background: #f0fdf4; color: #166534; }
.badge-dark { background: #f5f5fa; color: #9090b8; border: 1px solid #e4e4f0; }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 11px 16px; font-size: 14px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; display: block; text-align: center; }
.btn-primary:hover { background: #6d28d9; }
.btn-outline { background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #9090b8; width: 100%; cursor: pointer; transition: border-color .2s, color .2s; display: block; text-align: center; }
.btn-outline:hover { border-color: #7c3aed88; color: #7c3aed; }
.btn-green { background: transparent; border: 1px solid #86efac; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #166534; width: 100%; cursor: pointer; display: block; text-align: center; transition: background .2s; }
.btn-green:hover { background: #f0fdf4; }
.fade-in { animation: fadeUp .35s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Solo game styles */
.progress-bar-track { height: 4px; background: #e4e4f0; border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 100%; background: #7c3aed; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; font-size: 13px; color: #9090b8; }
.q-label { color: #7c3aed; font-weight: 500; }
.timer-badge { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 20px; padding: 3px 12px; font-size: 13px; font-weight: 500; }
.timer-badge.warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
.timer-badge.danger { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
.timer-badge.ok { color: #6d28d9; border-color: #c4b5fd; background: #ede9fe; }
.question-card { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 14px; padding: 1.5rem 1.25rem; margin-bottom: 1.25rem; min-height: 90px; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(100,100,200,0.06); }
.question-text { font-size: 17px; font-weight: 500; line-height: 1.5; color: #1a1a2e; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
@media (max-width: 400px) { .options-grid { grid-template-columns: 1fr; } }
.option-btn { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 10px; padding: .85rem 1rem; font-size: 14px; color: #2a2a4a; cursor: pointer; text-align: left; line-height: 1.4; transition: background .15s, border-color .15s, transform .1s; box-shadow: 0 1px 3px rgba(100,100,200,0.06); }
.option-btn:hover:not([disabled]) { background: #f5f3ff; border-color: #7c3aed88; color: #1a1a2e; }
.option-btn:active:not([disabled]) { transform: scale(.98); }
.option-btn[disabled] { cursor: default; }
.option-btn.correct { background: #f0fdf4; border-color: #22c55e; color: #166534; }
.option-btn.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
.score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.score-chip { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 20px; padding: 4px 14px; font-size: 13px; color: #a78bfa; font-weight: 500; }
.feedback-msg { min-height: 24px; font-size: 13px; color: #9090b8; text-align: center; margin-bottom: .5rem; }
.feedback-msg.bonus { color: #7c3aed; }
.big-score { font-size: 52px; font-weight: 500; color: #a78bfa; line-height: 1; margin-bottom: .25rem; }
.max-score { font-size: 15px; color: #9090b8; margin-bottom: 1.5rem; }
.result-rows { margin-bottom: 1.5rem; text-align: left; }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e4e4f0; font-size: 13px; }
.result-row:last-child { border-bottom: none; }
.result-q { color: #6b6b9a; flex: 1; margin-right: 8px; }
.result-badge { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
.badge-correct { background: #f0fdf4; color: #166534; }
.badge-wrong { background: #fef2f2; color: #991b1b; }
.share-btn { width: 100%; padding: .85rem; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; margin-bottom: .75rem; }
.share-btn:hover { background: #6d28d9; }
.play-again-btn { width: 100%; padding: .75rem; background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; color: #9090b8; font-size: 14px; cursor: pointer; transition: border-color .2s, color .2s; }
.play-again-btn:hover { border-color: #7c3aed88; color: #7c3aed; }
.start-title { font-size: 28px; font-weight: 500; color: #a78bfa; margin-bottom: .5rem; }
.rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2rem; text-align: left; }
.rule-card { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 10px; padding: .85rem 1rem; font-size: 13px; color: #6b6b9a; }
.rule-card strong { display: block; color: #6d28d9; font-weight: 500; font-size: 14px; margin-bottom: 3px; }
.start-btn { width: 100%; max-width: 260px; padding: .9rem; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: background .2s; }
.start-btn:hover { background: #6d28d9; }
.hs-banner { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.hs-label { font-size: 12px; color: #9090b8; margin-bottom: 2px; }
.hs-value { font-size: 20px; font-weight: 500; color: #a78bfa; }
.hs-date { font-size: 11px; color: #9090b8; margin-top: 2px; }
.new-record-badge { background: #ede9fe; border: 1px solid #c4b5fd; border-radius: 20px; padding: 4px 14px; font-size: 12px; color: #6d28d9; font-weight: 500; }
.crown { font-size: 28px; }
.hs-block { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
.hs-block-title { font-size: 12px; color: #9090b8; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; }
.hs-row { display: flex; justify-content: space-between; align-items: center; }
.hs-score-big { font-size: 32px; font-weight: 500; color: #a78bfa; }
.hs-meta { font-size: 12px; color: #9090b8; margin-top: 2px; }
.hs-compare { font-size: 13px; color: #9090b8; }
.hs-compare span { color: #a78bfa; font-weight: 500; }
/* Music clip */
.music-banner { background: #eff6ff; border: 1px solid #93c5fd; border-radius: 12px; padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
.wave-bar { width: 4px; border-radius: 2px; background: #7c3aed; transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
@keyframes wave { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
.timer-badge.music { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; animation: musicPulse 1.4s ease-in-out infinite; }
@keyframes musicPulse { 0%,100% { opacity:1; } 50% { opacity:.55; } }
</style>
</head>
<body>
<div id="app">
  <div id="root"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hfyanydnihumfcsgsxzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmeWFueWRuaWh1bWZjc2dzeHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDI5MTIsImV4cCI6MjA5MjExODkxMn0.LimVOp7XksHiCSxAA_Bil7ruw8Vm0YRdOvuOQy03Gdc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const root = document.getElementById('root');
function setHTML(h) { root.innerHTML = h; }

// ─── Date helpers ───────────────────────────────────────────────────────────
const now = new Date();
const TODAY = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
const DATE_STR = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

// ─── Solo game state ─────────────────────────────────────────────────────────
let QUESTIONS = [];
const MAX_TIME = 15, BASE = 10, MAX_BONUS = 5, CLIP_DURATION = 10;
let TOTAL_MAX = 75;
let qi = 0, score = 0, timeLeft = MAX_TIME;
let answered = false, results = [], timerInterval = null;
let audio = null, clipTimeout = null, clipPhaseTimeout = null;
let todayHS = null;
let currentView = 'home';

// ─── HOME SCREEN ─────────────────────────────────────────────────────────────
async function showHome() {
  currentView = 'home';
  const { data } = await sb.from('highscores').select('score,set_at').eq('date', TODAY).maybeSingle();
  if (data) todayHS = data.score ? { score: data.score, setAt: data.set_at } : null;

  const hsLine = todayHS
    ? `<div style="font-size:12px;color:#a78bfa;font-weight:500;">${todayHS.score} / ${TOTAL_MAX} pts</div>`
    : `<div style="font-size:12px;color:#9090b8;">No games played yet</div>`;

  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:26px;font-weight:500;color:#a78bfa;margin-bottom:4px;">Trivia Night</div>
        <div style="font-size:12px;color:#9090b8;">${DATE_STR}</div>
      </div>

      <!-- Daily challenge -->
      <div class="card featured" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:#1a1a2e;">Daily challenge</div>
            <div style="font-size:11px;color:#7c3aed;">5 questions · resets midnight</div>
          </div>
        </div>
        <div style="background:#f5f5fa;border-radius:8px;padding:7px 12px;display:flex;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:11px;color:#9090b8;">Today's best</div>
          ${hsLine}
        </div>
        <button class="btn-primary" style="font-size:13px;padding:9px;" onclick="startSoloFlow()">Play today's quiz</button>
      </div>

      <!-- Practice mode -->
      <div class="card" style="margin-bottom:10px;cursor:pointer;" onclick="window.location.href='practice.html'">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:#1a1a2e;">Practice mode</div>
            <div style="font-size:11px;color:#9090b8;">Solo · pick your categories · with explanations</div>
          </div>
          <div style="background:#ede9fe;color:#6d28d9;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;white-space:nowrap;">Practice →</div>
        </div>
      </div>

      <!-- Host a game -->
      <div class="card" style="margin-bottom:10px;cursor:pointer;" onclick="window.location.href='host.html'">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:#1a1a2e;">Host a game</div>
            <div style="font-size:11px;color:#9090b8;">Multiplayer · up to 75 players</div>
          </div>
          <div style="background:#f0fdf4;color:#166534;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;white-space:nowrap;">Start game →</div>
        </div>
      </div>

      <!-- Join a game -->
      <div class="card" style="margin-bottom:14px;">
        <div style="font-size:13px;font-weight:500;color:#1a1a2e;margin-bottom:10px;">Join a game</div>
        <input id="joinCode" type="text" maxlength="5" placeholder="Enter room code..."
          style="background:#ffffff;border:1px solid #e4e4f0;border-radius:8px;padding:10px 14px;font-size:16px;color:#1a1a2e;width:100%;text-align:center;letter-spacing:.15em;font-weight:500;text-transform:uppercase;outline:none;margin-bottom:8px;"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')joinRoom()" />
        <button class="btn-primary" style="font-size:13px;padding:9px;" onclick="joinRoom()">Join room</button>
      </div>

      <!-- Leaderboard -->
      <div style="text-align:center;">
        <div style="font-size:11px;color:#9090b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">Today's best score</div>
        ${todayHS
          ? `<div style="display:inline-block;background:#f5f5fa;border:1px solid #e4e4f0;border-radius:20px;padding:4px 16px;font-size:13px;color:#9090b8;">Best: <span style="color:#a78bfa;font-weight:500;">${todayHS.score}</span> pts · Set at ${todayHS.setAt}</div>`
          : `<div style="font-size:12px;color:#9090b8;">No scores yet today</div>`
        }
      </div>
    </div>
  `);
}

function joinRoom() {
  const code = (document.getElementById('joinCode')?.value || '').trim().toUpperCase();
  if (!code || code.length < 3) return;
  window.location.href = `join.html?code=${code}`;
}

// ─── SOLO GAME ───────────────────────────────────────────────────────────────
async function startSoloFlow() {
  currentView = 'solo';
  setHTML(`<div style="text-align:center;padding:3rem 1rem;"><div style="font-size:14px;color:#7c3aed;">Loading today's questions...</div></div>`);
  try {
    QUESTIONS = await loadOrGenerateQuestions();
    TOTAL_MAX = QUESTIONS.length * (BASE + MAX_BONUS);
    showSoloStart();
  } catch(e) {
    setHTML(`<div style="text-align:center;padding:3rem 1rem;"><div style="color:#ef4444;margin-bottom:1rem;">Failed to load questions.</div><button class="btn-outline" onclick="showHome()">← Back</button></div>`);
  }
}

async function loadOrGenerateQuestions() {
  const { data } = await sb.from('highscores').select('*').eq('date', TODAY).maybeSingle();
  if (data?.questions) {
    if (data.score) todayHS = { score: data.score, setAt: data.set_at };
    return data.questions;
  }
  const res = await fetch(`/api/questions?t=${Date.now()}`);
  const { questions } = await res.json();
  await sb.from('highscores').upsert(
    { date: TODAY, score: 0, set_at: '', questions, updated_at: new Date().toISOString() },
    { onConflict: 'date' }
  );
  todayHS = null;
  return questions;
}

function hsBannerHTML() {
  if (!todayHS) return `<div class="hs-banner"><div><div class="hs-label">Today's high score</div><div class="hs-value">—</div><div class="hs-date">No games played yet</div></div><div class="crown">🏆</div></div>`;
  return `<div class="hs-banner"><div><div class="hs-label">Today's high score</div><div class="hs-value">${todayHS.score} / ${TOTAL_MAX}</div><div class="hs-date">Set at ${todayHS.setAt}</div></div><div class="crown">🏆</div></div>`;
}

function showSoloStart() {
  setHTML(`
    <div style="text-align:center;padding:1.5rem 1rem 1rem;" class="fade-in">
      <button class="btn-outline" style="width:auto;padding:6px 14px;font-size:12px;margin-bottom:1.5rem;" onclick="showHome()">← Home</button>
      <div class="start-title">Daily Trivia</div>
      <div style="font-size:14px;color:#9090b8;margin-bottom:.35rem;">5 questions · Speed bonus · Daily challenge</div>
      <div style="font-size:13px;color:#7c3aed;margin-bottom:1.5rem;">${DATE_STR}</div>
      ${hsBannerHTML()}
      <div class="rules-grid">
        <div class="rule-card"><strong>10 pts</strong>Correct answer</div>
        <div class="rule-card"><strong>+5 bonus</strong>Answer fast!</div>
        <div class="rule-card"><strong>15 sec</strong>Per question</div>
        <div class="rule-card"><strong>${TOTAL_MAX} pts</strong>Max score</div>
      </div>
      <button class="start-btn" onclick="startGame()">Start Quiz</button>
    </div>
  `);
}

function stopClip() {
  if (audio) { audio.pause(); audio = null; }
  clearTimeout(clipTimeout); clearTimeout(clipPhaseTimeout);
  clipTimeout = null; clipPhaseTimeout = null;
}

function playClip(url) {
  try {
    audio = new Audio(url);
    audio.volume = 0.85;
    audio.play().catch(() => {});
    clipTimeout = setTimeout(() => stopClip(), (CLIP_DURATION + 30) * 1000);
  } catch {}
}

function waveformHTML() {
  return [0,0.15,0.3,0.45,0.6].map((d, i) => {
    const h = [14,20,26,20,14][i];
    return `<div class="wave-bar" style="height:${h}px;animation-delay:${d}s;"></div>`;
  }).join('');
}

function showQuestion() {
  answered = false;
  const q = QUESTIONS[qi];
  const isMusic = q.type === 'music' && !!(q.preview_url);
  const pct = (qi / QUESTIONS.length) * 100;
  const musicBanner = isMusic ? `
    <div class="music-banner">
      <div style="display:flex;align-items:center;gap:3px;">${waveformHTML()}</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#1d4ed8;">Playing audio clip…</div>
        <div style="font-size:11px;color:#3b82f6;margin-top:2px;">Listen and pick your answer</div>
      </div>
    </div>` : '';
  setHTML(`
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="meta-row">
      <span class="q-label">Question ${qi+1} / ${QUESTIONS.length}</span>
      <span style="color:#9090b8;font-size:12px;">${q.cat}</span>
      <span class="timer-badge ${isMusic ? 'music' : 'ok'}" id="timerBadge">${isMusic ? '♫' : timeLeft+'s'}</span>
    </div>
    ${musicBanner}
    <div class="question-card fade-in"><div class="question-text">${q.q}</div></div>
    <div class="options-grid fade-in">
      ${q.opts.map((o,i) => `<button class="option-btn" data-i="${i}">${o}</button>`).join('')}
    </div>
    <div class="score-bar">
      <span class="score-chip">Score: ${score}</span>
      <span style="font-size:12px;color:#9090b8;">Max: ${TOTAL_MAX} pts</span>
    </div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  `);
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.onclick = () => handleAnswer(parseInt(btn.dataset.i));
  });
}

function updateTimerDisplay() {
  const el = document.getElementById('timerBadge');
  if (!el) return;
  el.textContent = timeLeft + 's';
  el.className = 'timer-badge ' + (timeLeft > 8 ? 'ok' : timeLeft > 4 ? 'warn' : 'danger');
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = MAX_TIME;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); timeUp(); }
  }, 1000);
}

function lockButtons(chosenIdx) {
  const q = QUESTIONS[qi];
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.i);
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosenIdx && i !== q.ans) btn.classList.add('wrong');
  });
}

function setFeedback(text, bonus) {
  const el = document.getElementById('feedbackMsg');
  if (!el) return;
  el.textContent = text;
  el.className = 'feedback-msg' + (bonus ? ' bonus' : '');
}

function beginQuestion() {
  clearInterval(timerInterval);
  timeLeft = MAX_TIME;
  showQuestion();
  const q = QUESTIONS[qi];
  if (q.type === 'music' && q.preview_url) {
    playClip(q.preview_url);
    clipPhaseTimeout = setTimeout(() => {
      clipPhaseTimeout = null;
      if (!answered) startTimer();
    }, CLIP_DURATION * 1000);
  } else {
    startTimer();
  }
}

function handleAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  clearTimeout(clipPhaseTimeout); clipPhaseTimeout = null;
  const q = QUESTIONS[qi];
  const correct = idx === q.ans;
  const elapsed = MAX_TIME - timeLeft;
  let pts = 0;
  if (correct) {
    const bonus = Math.max(0, Math.round(MAX_BONUS * Math.max(0, (10 - elapsed) / 10)));
    pts = BASE + bonus;
    score += pts;
    setFeedback(bonus > 0 ? `Correct! +${pts} pts (includes +${bonus} speed bonus)` : `Correct! +${pts} pts`, true);
  } else {
    setFeedback(`Wrong. The correct answer was: ${q.opts[q.ans]}`, false);
  }
  results.push({ correct, pts });
  lockButtons(idx);
  setTimeout(advance, 1700);
}

function timeUp() {
  if (answered) return;
  answered = true;
  clearTimeout(clipPhaseTimeout); clipPhaseTimeout = null;
  const q = QUESTIONS[qi];
  setFeedback(`Time's up! The answer was: ${q.opts[q.ans]}`, false);
  results.push({ correct: false, pts: 0 });
  lockButtons(-1);
  setTimeout(advance, 1700);
}

function advance() {
  stopClip();
  qi++;
  if (qi >= QUESTIONS.length) showSummary();
  else beginQuestion();
}

async function saveHighScore(finalScore) {
  const currentHS = todayHS ? todayHS.score : 0;
  if (finalScore > currentHS) {
    const setAtTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    await sb.from('highscores').upsert(
      { date: TODAY, score: finalScore, set_at: setAtTime, questions: QUESTIONS, updated_at: new Date().toISOString() },
      { onConflict: 'date' }
    );
    todayHS = { score: finalScore, setAt: setAtTime };
    return true;
  }
  return false;
}

async function showSummary() {
  clearInterval(timerInterval);
  stopClip();
  const isNewRecord = await saveHighScore(score);
  const pct = Math.round((score / TOTAL_MAX) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '👍' : '💡';
  const msg = pct >= 80 ? 'Outstanding!' : pct >= 60 ? 'Great work!' : pct >= 40 ? 'Good effort!' : 'Keep practising!';
  const rowsHtml = results.map((r, i) => {
    const short = QUESTIONS[i].q.length > 45 ? QUESTIONS[i].q.slice(0, 45) + '…' : QUESTIONS[i].q;
    return `<div class="result-row"><span class="result-q">${short}</span><span class="result-badge ${r.correct ? 'badge-correct' : 'badge-wrong'}">${r.correct ? '+'+r.pts+' pts' : '0 pts'}</span></div>`;
  }).join('');
  const recordScore = todayHS ? todayHS.score : 0;
  const comparisonHtml = isNewRecord
    ? `<div><div class="new-record-badge">New record!</div></div>`
    : `<div class="hs-compare">Your score: <span>${score}</span><br>Best today: <span>${recordScore}</span></div>`;
  const moreHint = todayHS && !isNewRecord && score < todayHS.score
    ? `<div style="font-size:12px;color:#9090b8;margin-top:8px;">You need ${todayHS.score - score + 1} more pts to beat today's record.</div>` : '';

  setHTML(`
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:100%"></div></div>
    <div style="text-align:center;margin-bottom:1.5rem;" class="fade-in">
      <div style="font-size:28px;margin-bottom:.5rem;">${emoji}</div>
      <div style="font-size:22px;font-weight:500;color:#1a1a2e;margin-bottom:.5rem;">${msg}</div>
      <div style="font-size:14px;color:#9090b8;margin-bottom:1.5rem;">${DATE_STR}</div>
      <div class="big-score">${score}</div>
      <div class="max-score">out of ${TOTAL_MAX} points</div>
    </div>
    <div class="hs-block fade-in">
      <div class="hs-block-title">Today's high score</div>
      <div class="hs-row">
        <div>
          <div class="hs-score-big">${recordScore} <span style="font-size:16px;color:#9090b8;">/ ${TOTAL_MAX}</span></div>
          <div class="hs-meta">Set at ${todayHS?.setAt || '—'}</div>
        </div>
        ${comparisonHtml}
      </div>
      ${moreHint}
    </div>
    <div class="result-rows fade-in">${rowsHtml}</div>
    <button class="share-btn" id="shareBtn">Share on X (Twitter)</button>
    <button class="play-again-btn" onclick="showHome()" style="margin-top:.5rem;">← Back to Home</button>
  `);
  const shareText = encodeURIComponent(`I just scored ${score}/${TOTAL_MAX} on Daily Trivia! ${emoji} Today's record is ${recordScore}. Can you beat it? #DailyTrivia`);
  document.getElementById('shareBtn').onclick = () => window.open(`https://twitter.com/intent/tweet?text=${shareText}`, '_blank');
}

function startGame() {
  stopClip();
  qi = 0; score = 0; results = []; answered = false;
  beginQuestion();
}

// ─── Init ────────────────────────────────────────────────────────────────────
showHome();
</script>
</body>
</html>
