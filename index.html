
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    min-height: 500px;
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: var(--font-sans, system-ui, sans-serif);
    padding: 1.5rem 1rem;
    border-radius: 12px;
  }
  .progress-bar-track {
    height: 4px;
    background: #1e1e35;
    border-radius: 4px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #7c3aed;
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    font-size: 13px;
    color: #888;
  }
  .q-label { color: #7c3aed; font-weight: 500; }
  .timer-badge {
    background: #1e1e35;
    border: 1px solid #2a2a48;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.3s;
  }
  .timer-badge.warn { color: #f59e0b; border-color: #f59e0b44; }
  .timer-badge.danger { color: #ef4444; border-color: #ef444444; }
  .timer-badge.ok { color: #7c3aed; }
  .question-card {
    background: #16162a;
    border: 1px solid #2a2a48;
    border-radius: 14px;
    padding: 1.5rem 1.25rem;
    margin-bottom: 1.25rem;
    min-height: 90px;
    display: flex;
    align-items: center;
    transition: opacity 0.3s, transform 0.3s;
  }
  .question-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    color: #e8e8f0;
  }
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
    transition: opacity 0.3s;
  }
  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
  }
  .option-btn {
    background: #16162a;
    border: 1px solid #2a2a48;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 14px;
    color: #c8c8e0;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .option-btn:hover:not(:disabled) {
    background: #1e1e38;
    border-color: #7c3aed88;
    color: #e8e8f0;
  }
  .option-btn:active:not(:disabled) { transform: scale(0.98); }
  .option-btn.correct { background: #0f2d1f; border-color: #22c55e; color: #86efac; }
  .option-btn.wrong { background: #2d0f0f; border-color: #ef4444; color: #fca5a5; }
  .option-btn.selected-correct { background: #14532d; border-color: #4ade80; color: #bbf7d0; }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .score-chip {
    background: #1e1e35;
    border: 1px solid #2a2a48;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    color: #a78bfa;
    font-weight: 500;
  }
  .feedback-msg {
    min-height: 24px;
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-bottom: 0.5rem;
    transition: opacity 0.3s;
  }
  .feedback-msg.bonus { color: #a78bfa; }
  .fade-enter { opacity: 0; transform: translateY(18px); }
  .fade-in { opacity: 1; transform: translateY(0); transition: opacity 0.35s, transform 0.35s; }
  .fade-out { opacity: 0; transform: translateY(-18px); transition: opacity 0.25s, transform 0.25s; }
  .summary-card {
    background: #16162a;
    border: 1px solid #2a2a48;
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .summary-title { font-size: 22px; font-weight: 500; color: #e8e8f0; margin-bottom: 0.5rem; }
  .summary-sub { font-size: 14px; color: #888; margin-bottom: 2rem; }
  .big-score { font-size: 52px; font-weight: 500; color: #a78bfa; line-height: 1; margin-bottom: 0.25rem; }
  .max-score { font-size: 15px; color: #555; margin-bottom: 2rem; }
  .result-rows { margin-bottom: 2rem; text-align: left; }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1e1e35;
    font-size: 13px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-q { color: #aaa; flex: 1; margin-right: 8px; }
  .result-badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-correct { background: #0f2d1f; color: #86efac; }
  .badge-wrong { background: #2d0f0f; color: #fca5a5; }
  .share-btn {
    width: 100%;
    padding: 0.85rem;
    background: #7c3aed;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 0.75rem;
  }
  .share-btn:hover { background: #6d28d9; }
  .share-btn:active { transform: scale(0.98); }
  .play-again-btn {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 1px solid #2a2a48;
    border-radius: 10px;
    color: #888;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .play-again-btn:hover { border-color: #7c3aed88; color: #c4b5fd; }
  .start-card {
    text-align: center;
    padding: 2rem 1rem;
  }
  .start-title { font-size: 28px; font-weight: 500; color: #a78bfa; margin-bottom: 0.5rem; }
  .start-sub { font-size: 14px; color: #666; margin-bottom: 0.35rem; }
  .start-date { font-size: 13px; color: #7c3aed; margin-bottom: 2rem; }
  .rules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 2rem;
    text-align: left;
  }
  .rule-card {
    background: #1a1a2e;
    border: 1px solid #2a2a48;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 13px;
    color: #aaa;
  }
  .rule-card strong { display: block; color: #c4b5fd; font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .start-btn {
    width: 100%;
    max-width: 260px;
    padding: 0.9rem;
    background: #7c3aed;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #6d28d9; }
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">Daily Trivia — Answer 5 questions, earn up to 75 points</h2>
  <div id="root"></div>
</div>

<script>
const QUESTIONS = [
  {
    q: "Which planet has the most moons in our solar system?",
    opts: ["Jupiter", "Saturn", "Uranus", "Neptune"],
    ans: 1,
    cat: "Science"
  },
  {
    q: "What year did the Berlin Wall fall?",
    opts: ["1987", "1989", "1991", "1993"],
    ans: 1,
    cat: "History"
  },
  {
    q: "Which element has the chemical symbol 'Au'?",
    opts: ["Silver", "Copper", "Gold", "Aluminum"],
    ans: 2,
    cat: "Chemistry"
  },
  {
    q: "Who painted the Sistine Chapel ceiling?",
    opts: ["Leonardo da Vinci", "Raphael", "Donatello", "Michelangelo"],
    ans: 3,
    cat: "Art"
  },
  {
    q: "What is the largest ocean on Earth?",
    opts: ["Atlantic", "Indian", "Arctic", "Pacific"],
    ans: 3,
    cat: "Geography"
  }
];

const MAX_TIME = 15;
const BASE = 10;
const MAX_BONUS = 5;
const TOTAL_MAX = QUESTIONS.length * (BASE + MAX_BONUS);
const DATE_STR = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

let state = {
  screen: 'start',
  qi: 0,
  score: 0,
  timeLeft: MAX_TIME,
  answered: false,
  chosen: -1,
  results: [],
  fadeClass: 'fade-in',
  feedbackText: '',
  feedbackClass: ''
};

let timerInterval = null;

function render() {
  const root = document.getElementById('root');
  if (state.screen === 'start') {
    root.innerHTML = renderStart();
  } else if (state.screen === 'game') {
    root.innerHTML = renderGame();
  } else {
    root.innerHTML = renderSummary();
  }
  attachHandlers();
}

function renderStart() {
  return `
    <div class="start-card">
      <div class="start-title">Daily Trivia</div>
      <div class="start-sub">5 questions · Speed bonus · Daily challenge</div>
      <div class="start-date">${DATE_STR}</div>
      <div class="rules-grid">
        <div class="rule-card"><strong>10 pts</strong>Correct answer</div>
        <div class="rule-card"><strong>+5 bonus</strong>Answer fast!</div>
        <div class="rule-card"><strong>15 sec</strong>Per question</div>
        <div class="rule-card"><strong>75 pts</strong>Max score</div>
      </div>
      <button class="start-btn" id="start-btn">Start Quiz</button>
    </div>
  `;
}

function renderGame() {
  const q = QUESTIONS[state.qi];
  const pct = ((state.qi) / QUESTIONS.length) * 100;
  const timerClass = state.timeLeft > 8 ? 'ok' : state.timeLeft > 4 ? 'warn' : 'danger';

  let optHtml = q.opts.map((o, i) => {
    let cls = 'option-btn';
    if (state.answered) {
      if (i === q.ans) cls += ' correct';
      else if (i === state.chosen && i !== q.ans) cls += ' wrong';
    }
    return `<button class="${cls}" data-idx="${i}" ${state.answered ? 'disabled' : ''}>${o}</button>`;
  }).join('');

  return `
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="meta-row">
      <span class="q-label">Question ${state.qi + 1} / ${QUESTIONS.length}</span>
      <span style="color:#666;font-size:12px;">${q.cat}</span>
      <span class="timer-badge ${timerClass}" id="timer">${state.timeLeft}s</span>
    </div>
    <div class="question-card ${state.fadeClass}">
      <div class="question-text">${q.q}</div>
    </div>
    <div class="options-grid ${state.fadeClass}">${optHtml}</div>
    <div class="score-bar">
      <span class="score-chip">Score: ${state.score}</span>
      <span style="font-size:12px;color:#555;">Max: ${TOTAL_MAX} pts</span>
    </div>
    <div class="feedback-msg ${state.feedbackClass}" id="feedback">${state.feedbackText}</div>
  `;
}

function renderSummary() {
  const pct = Math.round((state.score / TOTAL_MAX) * 100);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '👍' : '💡';
  let msg = pct >= 80 ? 'Outstanding!' : pct >= 60 ? 'Great work!' : pct >= 40 ? 'Good effort!' : 'Keep practising!';

  const rowsHtml = state.results.map((r, i) => {
    const short = QUESTIONS[i].q.length > 45 ? QUESTIONS[i].q.slice(0, 45) + '…' : QUESTIONS[i].q;
    const bClass = r.correct ? 'badge-correct' : 'badge-wrong';
    const bText = r.correct ? `+${r.pts} pts` : '0 pts';
    return `<div class="result-row"><span class="result-q">${short}</span><span class="result-badge ${bClass}">${bText}</span></div>`;
  }).join('');

  const shareText = encodeURIComponent(`I just scored ${state.score}/${TOTAL_MAX} on Daily Trivia! ${emoji} Can you beat me? #DailyTrivia`);
  const shareUrl = `https://twitter.com/intent/tweet?text=${shareText}`;

  return `
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:100%"></div></div>
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:28px;margin-bottom:0.5rem;">${emoji}</div>
      <div class="summary-title">${msg}</div>
      <div class="summary-sub">${DATE_STR}</div>
      <div class="big-score">${state.score}</div>
      <div class="max-score">out of ${TOTAL_MAX} points</div>
    </div>
    <div class="result-rows">${rowsHtml}</div>
    <button class="share-btn" id="share-btn">Share on X (Twitter)</button>
    <button class="play-again-btn" id="replay-btn">Play again</button>
  `;
}

function attachHandlers() {
  const startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.onclick = () => startGame();

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.onclick = () => {
      if (!state.answered) handleAnswer(parseInt(btn.dataset.idx));
    };
  });

  const shareBtn = document.getElementById('share-btn');
  if (shareBtn) {
    const shareText = encodeURIComponent(`I just scored ${state.score}/${TOTAL_MAX} on Daily Trivia! Can you beat me? #DailyTrivia`);
    shareBtn.onclick = () => window.open(`https://twitter.com/intent/tweet?text=${shareText}`, '_blank');
  }

  const replayBtn = document.getElementById('replay-btn');
  if (replayBtn) replayBtn.onclick = () => resetGame();
}

function startGame() {
  state.screen = 'game';
  state.qi = 0;
  state.score = 0;
  state.results = [];
  state.fadeClass = 'fade-in';
  startTimer();
  render();
}

function resetGame() {
  clearInterval(timerInterval);
  state = {
    screen: 'start',
    qi: 0, score: 0, timeLeft: MAX_TIME,
    answered: false, chosen: -1, results: [],
    fadeClass: 'fade-in', feedbackText: '', feedbackClass: ''
  };
  render();
}

function startTimer() {
  clearInterval(timerInterval);
  state.timeLeft = MAX_TIME;
  state.answered = false;
  state.chosen = -1;
  state.feedbackText = '';
  state.feedbackClass = '';
  timerInterval = setInterval(() => {
    state.timeLeft--;
    const timerEl = document.getElementById('timer');
    if (timerEl) {
      timerEl.textContent = state.timeLeft + 's';
      timerEl.className = 'timer-badge ' + (state.timeLeft > 8 ? 'ok' : state.timeLeft > 4 ? 'warn' : 'danger');
    }
    if (state.timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
}

function handleAnswer(idx) {
  clearInterval(timerInterval);
  state.answered = true;
  state.chosen = idx;
  const q = QUESTIONS[state.qi];
  const correct = idx === q.ans;
  const elapsed = MAX_TIME - state.timeLeft;
  let pts = 0;

  if (correct) {
    const bonus = Math.max(0, Math.round(MAX_BONUS * Math.max(0, (10 - elapsed) / 10)));
    pts = BASE + bonus;
    state.score += pts;
    state.feedbackText = bonus > 0 ? `Correct! +${pts} pts (includes +${bonus} speed bonus)` : `Correct! +${pts} pts`;
    state.feedbackClass = 'bonus';
  } else {
    state.feedbackText = `Wrong. The correct answer was: ${q.opts[q.ans]}`;
    state.feedbackClass = '';
  }

  state.results.push({ correct, pts });
  render();

  setTimeout(() => advanceQuestion(), 1700);
}

function timeUp() {
  const q = QUESTIONS[state.qi];
  state.answered = true;
  state.chosen = -1;
  state.feedbackText = `Time's up! The answer was: ${q.opts[q.ans]}`;
  state.feedbackClass = '';
  state.results.push({ correct: false, pts: 0 });
  render();
  setTimeout(() => advanceQuestion(), 1700);
}

function advanceQuestion() {
  if (state.qi + 1 >= QUESTIONS.length) {
    clearInterval(timerInterval);
    state.screen = 'summary';
    render();
    return;
  }
  state.qi++;
  state.fadeClass = 'fade-enter';
  render();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      state.fadeClass = 'fade-in';
      const cards = document.querySelectorAll('.question-card, .options-grid');
      cards.forEach(c => { c.className = c.className.replace('fade-enter', 'fade-in'); });
    });
  });
  startTimer();
}

render();
</script>
