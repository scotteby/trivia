
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    min-height: 500px;
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: var(--font-sans, system-ui, sans-serif);
    padding: 1.5rem 1rem;
    border-radius: 12px;
  }
  .progress-bar-track { height: 4px; background: #1e1e35; border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #7c3aed; border-radius: 4px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; font-size: 13px; color: #888; }
  .q-label { color: #7c3aed; font-weight: 500; }
  .timer-badge { background: #1e1e35; border: 1px solid #2a2a48; border-radius: 20px; padding: 3px 12px; font-size: 13px; font-weight: 500; }
  .timer-badge.warn { color: #f59e0b; border-color: #f59e0b44; }
  .timer-badge.danger { color: #ef4444; border-color: #ef444444; }
  .timer-badge.ok { color: #7c3aed; }
  .question-card { background: #16162a; border: 1px solid #2a2a48; border-radius: 14px; padding: 1.5rem 1.25rem; margin-bottom: 1.25rem; min-height: 90px; display: flex; align-items: center; }
  .question-text { font-size: 17px; font-weight: 500; line-height: 1.5; color: #e8e8f0; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }
  .option-btn { background: #16162a; border: 1px solid #2a2a48; border-radius: 10px; padding: 0.85rem 1rem; font-size: 14px; color: #c8c8e0; cursor: pointer; text-align: left; line-height: 1.4; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .option-btn:hover:not([disabled]) { background: #1e1e38; border-color: #7c3aed88; color: #e8e8f0; }
  .option-btn:active:not([disabled]) { transform: scale(0.98); }
  .option-btn[disabled] { cursor: default; }
  .option-btn.correct { background: #0f2d1f; border-color: #22c55e; color: #86efac; }
  .option-btn.wrong { background: #2d0f0f; border-color: #ef4444; color: #fca5a5; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .score-chip { background: #1e1e35; border: 1px solid #2a2a48; border-radius: 20px; padding: 4px 14px; font-size: 13px; color: #a78bfa; font-weight: 500; }
  .feedback-msg { min-height: 24px; font-size: 13px; color: #888; text-align: center; margin-bottom: 0.5rem; }
  .feedback-msg.bonus { color: #a78bfa; }
  .big-score { font-size: 52px; font-weight: 500; color: #a78bfa; line-height: 1; margin-bottom: 0.25rem; }
  .max-score { font-size: 15px; color: #555; margin-bottom: 1.5rem; }
  .result-rows { margin-bottom: 1.5rem; text-align: left; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e35; font-size: 13px; }
  .result-row:last-child { border-bottom: none; }
  .result-q { color: #aaa; flex: 1; margin-right: 8px; }
  .result-badge { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
  .badge-correct { background: #0f2d1f; color: #86efac; }
  .badge-wrong { background: #2d0f0f; color: #fca5a5; }
  .share-btn { width: 100%; padding: 0.85rem; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-bottom: 0.75rem; }
  .share-btn:hover { background: #6d28d9; }
  .play-again-btn { width: 100%; padding: 0.75rem; background: transparent; border: 1px solid #2a2a48; border-radius: 10px; color: #888; font-size: 14px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .play-again-btn:hover { border-color: #7c3aed88; color: #c4b5fd; }
  .start-title { font-size: 28px; font-weight: 500; color: #a78bfa; margin-bottom: 0.5rem; }
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2rem; text-align: left; }
  .rule-card { background: #1a1a2e; border: 1px solid #2a2a48; border-radius: 10px; padding: 0.85rem 1rem; font-size: 13px; color: #aaa; }
  .rule-card strong { display: block; color: #c4b5fd; font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .start-btn { width: 100%; max-width: 260px; padding: 0.9rem; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .start-btn:hover { background: #6d28d9; }
  .hs-banner { background: #1a1a2e; border: 1px solid #2a2a48; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .hs-label { font-size: 12px; color: #666; margin-bottom: 2px; }
  .hs-value { font-size: 20px; font-weight: 500; color: #a78bfa; }
  .hs-date { font-size: 11px; color: #444; margin-top: 2px; }
  .new-record-badge { background: #2d1a4e; border: 1px solid #7c3aed44; border-radius: 20px; padding: 4px 14px; font-size: 12px; color: #c4b5fd; font-weight: 500; }
  .crown { font-size: 28px; }
  .hs-block { background: #1a1a2e; border: 1px solid #2a2a48; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .hs-block-title { font-size: 12px; color: #666; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .hs-row { display: flex; justify-content: space-between; align-items: center; }
  .hs-score-big { font-size: 32px; font-weight: 500; color: #a78bfa; }
  .hs-meta { font-size: 12px; color: #555; margin-top: 2px; }
  .hs-compare { font-size: 13px; color: #666; }
  .hs-compare span { color: #a78bfa; font-weight: 500; }
  .fade-in { animation: fadeUp 0.35s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div id="app">
  <h2 style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">Daily Trivia — Answer 5 questions, earn up to 75 points</h2>
  <div id="root"></div>
</div>

<!-- Add this in your <head>, replacing nothing else -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
let QUESTIONS = [
  { q: "Which planet has the most moons in our solar system?", opts: ["Jupiter", "Saturn", "Uranus", "Neptune"], ans: 1, cat: "Science" },
  { q: "What year did the Berlin Wall fall?", opts: ["1987", "1989", "1991", "1993"], ans: 1, cat: "History" },
  { q: "Which element has the chemical symbol 'Au'?", opts: ["Silver", "Copper", "Gold", "Aluminum"], ans: 2, cat: "Chemistry" },
  { q: "Who painted the Sistine Chapel ceiling?", opts: ["Leonardo da Vinci", "Raphael", "Donatello", "Michelangelo"], ans: 3, cat: "Art" },
  { q: "What is the largest ocean on Earth?", opts: ["Atlantic", "Indian", "Arctic", "Pacific"], ans: 3, cat: "Geography" }
];

const MAX_TIME = 15, BASE = 10, MAX_BONUS = 5;
const TOTAL_MAX = QUESTIONS.length * (BASE + MAX_BONUS);
const now = new Date();
const TODAY = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
const DATE_STR = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
const STORAGE_KEY = `trivia-hs-${TODAY}`;

let qi = 0, score = 0, timeLeft = MAX_TIME;
let answered = false, results = [], timerInterval = null;
let todayHS = null;

function setHTML(html) { document.getElementById('root').innerHTML = html; }

const SUPABASE_URL = 'https://hfyanydnihumfcsgsxzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmeWFueWRuaWh1bWZjc2dzeHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDI5MTIsImV4cCI6MjA5MjExODkxMn0.LimVOp7XksHiCSxAA_Bil7ruw8Vm0YRdOvuOQy03Gdc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadOrGenerateQuestions() {
  // Check Supabase first — reuse today's questions if already generated
  const { data, error } = await sb
    .from('highscores')
    .select('*')
    .eq('date', TODAY)
    .maybeSingle();

  if (data && data.questions) {
    todayHS = data.score ? { score: data.score, date: DATE_STR, setAt: data.set_at } : null;
    return data.questions;
  }

  // Not generated yet — call our serverless function (API key stays server-side)
  const res = await fetch(`/api/questions?t=${Date.now()}`);
  const { questions } = await res.json();

  // Save to Supabase so all players share the same questions today
  await sb.from('highscores').upsert(
    { date: TODAY, score: 0, set_at: '', questions, updated_at: new Date().toISOString() },
    { onConflict: 'date' }
  );

  todayHS = null;
  return questions;
}

function hsBannerHTML() {
  if (!todayHS) return `<div class="hs-banner"><div><div class="hs-label">Today's high score</div><div class="hs-value">—</div><div class="hs-date">No games played yet</div></div><div class="crown">🏆</div></div>`;
  return `<div class="hs-banner"><div><div class="hs-label">Today's high score</div><div class="hs-value">${todayHS.score} / ${TOTAL_MAX}</div><div class="hs-date">Set at ${todayHS.setAt}</div></div><div class="crown">🏆</div></div>`;
}

async function showStart() {
 QUESTIONS = await loadOrGenerateQuestions();
 
  setHTML(`
    <div style="text-align:center;padding:1.5rem 1rem 1rem;" class="fade-in">
      <div class="start-title">Daily Trivia</div>
      <div style="font-size:14px;color:#666;margin-bottom:0.35rem;">5 questions · Speed bonus · Daily challenge</div>
      <div style="font-size:13px;color:#7c3aed;margin-bottom:1.5rem;">${DATE_STR}</div>
      ${hsBannerHTML()}
      <div class="rules-grid">
        <div class="rule-card"><strong>10 pts</strong>Correct answer</div>
        <div class="rule-card"><strong>+5 bonus</strong>Answer fast!</div>
        <div class="rule-card"><strong>15 sec</strong>Per question</div>
        <div class="rule-card"><strong>75 pts</strong>Max score</div>
      </div>
      <button class="start-btn" id="startBtn">Start Quiz</button>
    </div>
  `);
  document.getElementById('startBtn').onclick = startGame;
}

function showQuestion() {
  answered = false;
  const q = QUESTIONS[qi];
  const pct = (qi / QUESTIONS.length) * 100;
  setHTML(`
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="meta-row">
      <span class="q-label">Question ${qi + 1} / ${QUESTIONS.length}</span>
      <span style="color:#666;font-size:12px;">${q.cat}</span>
      <span class="timer-badge ok" id="timerBadge">${timeLeft}s</span>
    </div>
    <div class="question-card fade-in"><div class="question-text">${q.q}</div></div>
    <div class="options-grid fade-in">
      ${q.opts.map((o, i) => `<button class="option-btn" data-i="${i}">${o}</button>`).join('')}
    </div>
    <div class="score-bar">
      <span class="score-chip">Score: ${score}</span>
      <span style="font-size:12px;color:#555;">Max: ${TOTAL_MAX} pts</span>
    </div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  `);
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.onclick = () => handleAnswer(parseInt(btn.dataset.i));
  });
}

function updateTimerDisplay() {
  const el = document.getElementById('timerBadge');
  if (!el) return;
  el.textContent = timeLeft + 's';
  el.className = 'timer-badge ' + (timeLeft > 8 ? 'ok' : timeLeft > 4 ? 'warn' : 'danger');
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = MAX_TIME;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); timeUp(); }
  }, 1000);
}

function lockButtons(chosenIdx) {
  const q = QUESTIONS[qi];
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.i);
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosenIdx && i !== q.ans) btn.classList.add('wrong');
  });
}

function setFeedback(text, bonus) {
  const el = document.getElementById('feedbackMsg');
  if (!el) return;
  el.textContent = text;
  el.className = 'feedback-msg' + (bonus ? ' bonus' : '');
}

function handleAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const q = QUESTIONS[qi];
  const correct = idx === q.ans;
  const elapsed = MAX_TIME - timeLeft;
  let pts = 0;
  if (correct) {
    const bonus = Math.max(0, Math.round(MAX_BONUS * Math.max(0, (10 - elapsed) / 10)));
    pts = BASE + bonus;
    score += pts;
    setFeedback(bonus > 0 ? `Correct! +${pts} pts (includes +${bonus} speed bonus)` : `Correct! +${pts} pts`, true);
  } else {
    setFeedback(`Wrong. The correct answer was: ${q.opts[q.ans]}`, false);
  }
  results.push({ correct, pts });
  lockButtons(idx);
  setTimeout(advance, 1700);
}

function timeUp() {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[qi];
  setFeedback(`Time's up! The answer was: ${q.opts[q.ans]}`, false);
  results.push({ correct: false, pts: 0 });
  lockButtons(-1);
  setTimeout(advance, 1700);
}

function advance() {
  qi++;
  if (qi >= QUESTIONS.length) showSummary();
  else { showQuestion(); startTimer(); }
}

async function saveHighScore(finalScore) {
  const currentHS = todayHS ? todayHS.score : 0;
  const isNewRecord = finalScore > currentHS;
  
  if (isNewRecord) {
    const now = new Date();
    const setAtTime = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    
    // Update Supabase with new high score
    await sb.from('highscores').upsert(
      { date: TODAY, score: finalScore, set_at: setAtTime, questions: QUESTIONS, updated_at: now.toISOString() },
      { onConflict: 'date' }
    );
    
    // Update local cache
    todayHS = { score: finalScore, date: DATE_STR, setAt: setAtTime };
  }
  
  return isNewRecord;
}

async function showSummary() {
  clearInterval(timerInterval);
  const isNewRecord = await saveHighScore(score);
  const pct = Math.round((score / TOTAL_MAX) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '👍' : '💡';
  const msg = pct >= 80 ? 'Outstanding!' : pct >= 60 ? 'Great work!' : pct >= 40 ? 'Good effort!' : 'Keep practising!';

  const rowsHtml = results.map((r, i) => {
    const short = QUESTIONS[i].q.length > 45 ? QUESTIONS[i].q.slice(0, 45) + '…' : QUESTIONS[i].q;
    return (`<div class="result-row">` +
      `<span class="result-q">${short}</span>` +
      `<span class="result-badge ${r.correct ? 'badge-correct' : 'badge-wrong'}">${r.correct ? '+' + r.pts + ' pts' : '0 pts'}</span>` +
    `</div>`);
  }).join('');

  const recordScore = todayHS ? todayHS.score : 0;
  const recordSetAt = todayHS ? todayHS.setAt : 'No game played yet';
  let comparisonHtml = `<div class="hs-compare">Your score: <span>${score}</span></div>`;
  if (todayHS) {
    comparisonHtml = isNewRecord
      ? `<div><div class="new-record-badge">New record!</div></div>`
      : `<div class="hs-compare">Your score: <span>${score}</span><br>Best today: <span>${todayHS.score}</span></div>`;
  }

  const moreHint = todayHS && !isNewRecord && score < todayHS.score
    ? `<div style="font-size:12px;color:#555;margin-top:8px;">You need ${todayHS.score - score + 1} more pts to beat today's record.</div>`
    : '';

  const hsBlockHtml = `
    <div class="hs-block fade-in">
      <div class="hs-block-title">Today's high score</div>
      <div class="hs-row">
        <div>
          <div class="hs-score-big">${recordScore} <span style="font-size:16px;color:#555;">/ ${TOTAL_MAX}</span></div>
          <div class="hs-meta">Set at ${recordSetAt}</div>
        </div>
        ${comparisonHtml}
      </div>
      ${moreHint}
    </div>
  `;

  setHTML(`
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:100%"></div></div>
    <div style="text-align:center;margin-bottom:1.5rem;" class="fade-in">
      <div style="font-size:28px;margin-bottom:0.5rem;">${emoji}</div>
      <div style="font-size:22px;font-weight:500;color:#e8e8f0;margin-bottom:0.5rem;">${msg}</div>
      <div style="font-size:14px;color:#888;margin-bottom:1.5rem;">${DATE_STR}</div>
      <div class="big-score">${score}</div>
      <div class="max-score">out of ${TOTAL_MAX} points</div>
    </div>
    ${hsBlockHtml}
    <div class="result-rows fade-in">${rowsHtml}</div>
    <button class="share-btn" id="shareBtn">Share on X (Twitter)</button>
  `);

  const shareText = encodeURIComponent(`I just scored ${score}/${TOTAL_MAX} on Daily Trivia! ${emoji} Today's record is ${todayHS ? todayHS.score : 0}. Can you beat it? #DailyTrivia`);
  document.getElementById('shareBtn').onclick = () => window.open(`https://twitter.com/intent/tweet?text=${shareText}`, '_blank');
}

function startGame() {
  clearInterval(timerInterval);
  qi = 0; score = 0; results = []; answered = false;
  showQuestion();
  startTimer();
}

showStart();
</script>
