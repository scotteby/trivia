<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Quizzli — Live multiplayer trivia nights. Host from your phone, players join instantly with a room code. Music rounds, live scores, no app needed." />
<meta property="og:type" content="website" />

<meta property="og:title" content="Join a Game — Quizzli" />
<meta property="og:description" content="Enter your room code and join a live trivia night. No app download needed." />
<meta property="og:image" content="https://quizzli.app/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Join a Game — Quizzli" />

<title>Join Game — Quizzli</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5fa; color: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 440px; margin: 0 auto; padding: 1.5rem 1rem; }
.card { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(100,100,200,0.06); }
.badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; }
.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-green { background: #f0fdf4; color: #166534; }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; min-height: 50px; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.btn-outline { background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #9090b8; cursor: pointer; width: 100%; transition: border-color .2s; min-height: 44px; }
.option-btn { background: #ffffff; border: 2px solid #e4e4f0; border-radius: 12px; padding: 18px 16px; font-size: 17px; color: #2a2a4a; width: 100%; text-align: left; cursor: pointer; transition: all .15s; min-height: 58px; display: block; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(100,100,200,0.06); }
.option-btn:active:not([disabled]) { transform: scale(.97); }
.option-btn[disabled] { cursor: default; }
.option-btn.selected { border-color: #7c3aed; color: #5b21b6; background: #f5f3ff; }
.option-btn.correct { border-color: #22c55e; color: #166534; background: #f0fdf4; }
.option-btn.wrong { border-color: #ef4444; color: #991b1b; background: #fef2f2; }
.player-chip { background: #f5f5fa; border: 1px solid #e4e4f0; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.timer-badge { border-radius: 20px; padding: 4px 14px; font-size: 15px; font-weight: 600; display: inline-block; border: 1px solid #e4e4f0; }
.timer-ok { color: #6d28d9; border-color: #c4b5fd; background: #ede9fe; }
.timer-warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
.timer-danger { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
.fade-in { animation: fadeUp .3s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
input { outline: none; }
input:focus { border-color: #7c3aed !important; }
.wave-bar { width: 4px; border-radius: 2px; background: #7c3aed; transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
@keyframes wave { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
</style>
</head>
<body>
<div id="app"><div id="root"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hfyanydnihumfcsgsxzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmeWFueWRuaWh1bWZjc2dzeHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDI5MTIsImV4cCI6MjA5MjExODkxMn0.LimVOp7XksHiCSxAA_Bil7ruw8Vm0YRdOvuOQy03Gdc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const root = document.getElementById('root');
function setHTML(h) { root.innerHTML = h; }

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  view: 'join',
  room: null,
  player: null,
  players: [],
  answers: [],
  localScore: 0,
  subscription: null,
  timerInterval: null,
  roundLeaderboardTimeout: null,
  lobbyPollInterval: null,
  hasAnswered: false,
  selectedAnswer: null,
  audio: null,
  clipTimeout: null,
};

const AVATAR_COLORS = [
  ['#2d1a4e','#c4b5fd'], ['#1a2d1e','#86efac'], ['#2d1a1a','#fca5a5'],
  ['#1a2240','#93c5fd'], ['#2d2000','#fcd34d'], ['#1a2d2d','#5eead4'],
];
function avatarColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// ─── JOIN SCREEN ─────────────────────────────────────────────────────────────
function showJoin(prefill = '', namePrefill = '') {
  state.view = 'join';
  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:28px;margin-top:20px;">
        <div style="font-size:26px;font-weight:500;color:#a78bfa;margin-bottom:6px;">Quizzli</div>
        <div style="font-size:13px;color:#9090b8;">Join a multiplayer game</div>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div style="font-size:12px;color:#9090b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">Room code</div>
        <input id="codeInput" type="text" maxlength="5" placeholder="e.g. PIZZA"
          value="${prefill}"
          autocomplete="off" spellcheck="false"
          style="background:#ffffff;border:1px solid #d0d0e8;border-radius:10px;padding:14px 16px;font-size:24px;color:#1a1a2e;width:100%;text-align:center;letter-spacing:.2em;font-weight:600;text-transform:uppercase;margin-bottom:0;"
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"
          onkeydown="if(event.key==='Enter')document.getElementById('nameInput')?.focus()" />
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div style="font-size:12px;color:#9090b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">Your name</div>
        <input id="nameInput" type="text" maxlength="20" placeholder="Enter your name"
          value="${namePrefill}"
          style="background:#ffffff;border:1px solid #d0d0e8;border-radius:10px;padding:12px 16px;font-size:17px;color:#1a1a2e;width:100%;"
          onkeydown="if(event.key==='Enter')joinGame()" />
      </div>

      <button class="btn-primary" id="joinBtn" onclick="joinGame()">Join room</button>
      <div style="text-align:center;margin-top:10px;"><a href="index.html" style="font-size:12px;color:#9090b8;text-decoration:none;">← Back to home</a></div>
      <div id="joinError" style="margin-top:10px;text-align:center;font-size:13px;color:#ef4444;min-height:20px;"></div>
    </div>
  `);
  if (prefill && namePrefill) document.getElementById('nameInput')?.blur();
  else if (prefill) document.getElementById('nameInput')?.focus();
  else document.getElementById('codeInput')?.focus();
}

async function joinGame() {
  const code = (document.getElementById('codeInput')?.value || '').trim().toUpperCase();
  const name = (document.getElementById('nameInput')?.value || '').trim();
  const errEl = document.getElementById('joinError');
  const btn = document.getElementById('joinBtn');

  if (!code || code.length < 3) { if (errEl) errEl.textContent = 'Enter a valid room code.'; return; }
  if (!name) { if (errEl) errEl.textContent = 'Enter your name.'; return; }

  if (btn) { btn.disabled = true; btn.textContent = 'Joining...'; }
  if (errEl) errEl.textContent = '';

  try {
    // Fetch room
    const { data: rooms, error } = await sb.from('game_rooms').select('*').eq('room_code', code).maybeSingle();
    if (error || !rooms) throw new Error('Room not found. Check the code and try again.');
    if (rooms.status === 'finished') throw new Error('This game has already ended.');

    state.room = rooms;

    // Create player
    const { data: playerData, error: playerError } = await sb.from('players').insert({
      room_id: rooms.id,
      name,
      score: 0,
      answers: [],
    }).select().single();

    if (playerError) throw new Error('Failed to join room.');
    state.player = playerData;
    state.answers = [];
    state.localScore = 0;

    // Cache for refresh recovery and rejoin
    localStorage.setItem('trivia_player_id', playerData.id);
    localStorage.setItem('trivia_room_code', code);
    localStorage.setItem('trivia_player_name', name);
    localStorage.setItem(PLAYER_NAME_KEY, name);

    subscribeAsPlayer();

    if (rooms.status === 'active') {
      showIngame();
    } else {
      showLobby();
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Join room'; }
    if (errEl) errEl.textContent = e.message;
  }
}

// ─── LOBBY SCREEN ─────────────────────────────────────────────────────────────
function showLobby() {
  state.view = 'lobby';
  const room = state.room;
  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:24px;margin-top:20px;">
        <div style="font-size:26px;font-weight:500;color:#a78bfa;margin-bottom:6px;">Quizzli</div>
        <div style="font-size:13px;color:#9090b8;">Room <strong style="color:#1a1a2e;letter-spacing:.05em;">${room.room_code}</strong></div>
      </div>

      <div class="card" style="text-align:center;margin-bottom:16px;">
        <div style="font-size:11px;color:#9090b8;margin-bottom:8px;">You're in!</div>
        <div style="font-size:42px;font-weight:500;color:#a78bfa;" id="lobbyCount">…</div>
        <div style="font-size:12px;color:#9090b8;">players in lobby</div>
      </div>

      <div id="lobbyList" style="margin-bottom:16px;"></div>

      <div style="background:#f0f0fa;border-radius:10px;padding:12px 16px;text-align:center;">
        <div style="font-size:13px;color:#9090b8;">Waiting for host to start…</div>
        <div style="margin-top:8px;display:flex;justify-content:center;gap:4px;">
          <div style="width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .0s infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .4s infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .8s infinite;"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    </style>
  `);
  fetchLobbyPlayers();
  startLobbyPoll();
}

async function fetchFullRoom() {
  const { data } = await sb.from('game_rooms')
    .select('*')
    .eq('id', state.room.id)
    .maybeSingle();
  if (data) state.room = data;
  return data;
}

function startLobbyPoll() {
  clearInterval(state.lobbyPollInterval);
  state.lobbyPollInterval = setInterval(async () => {
    if (state.view !== 'lobby') { clearInterval(state.lobbyPollInterval); return; }
    try {
      const { data } = await sb.from('game_rooms')
        .select('status')
        .eq('id', state.room.id).maybeSingle();
      if (!data || data.status !== 'active') return;
      clearInterval(state.lobbyPollInterval);
      setHTML(`<div style="text-align:center;padding:80px 20px;">
        <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Game starting…</div>
        <div style="font-size:13px;color:#9090b8;">Loading questions</div>
      </div>`);
      fetchFullRoom().then(() => {
        state.hasAnswered = false;
        state.selectedAnswer = null;
        showIngame();
      });
    } catch(e) {}
  }, 2000);
}

async function fetchLobbyPlayers() {
  const { data } = await sb.from('players').select('id,name').eq('room_id', state.room.id).order('joined_at');
  if (data) {
    state.players = data;
    renderLobbyList();
  }
}

function renderLobbyList() {
  const countEl = document.getElementById('lobbyCount');
  const listEl = document.getElementById('lobbyList');
  if (countEl) countEl.textContent = state.players.length;
  if (listEl) {
    listEl.innerHTML = state.players.map(p => {
      const isMe = p.id === state.player?.id;
      const [bg, fg] = avatarColor(p.name);
      const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return `<div class="player-chip" style="${isMe ? 'border-color:#7c3aed44;' : ''}">
        <div class="avatar" style="background:${bg};color:${fg};">${initials}</div>
        <div style="flex:1;font-size:13px;color:${isMe ? '#c4b5fd' : '#1a1a2e'};">${p.name}</div>
        ${isMe ? '<div style="font-size:10px;color:#7c3aed;">you</div>' : ''}
      </div>`;
    }).join('');
  }
}

// ─── REALTIME SUBSCRIPTION ────────────────────────────────────────────────────
function subscribeAsPlayer() {
  if (state.subscription) state.subscription.unsubscribe();
  const roomId = state.room.id;

  state.subscription = sb.channel('player_room_' + roomId + '_' + Date.now())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms', filter: `id=eq.${roomId}` }, payload => {
      const updated = payload.new;
      const prev = state.room;
      // Merge rather than replace — Supabase Realtime may omit large JSONB fields
      // (like questions) from the payload due to size limits. Preserve them from state.
      state.room = { ...state.room, ...updated };
      if (!state.room.questions?.length && prev.questions?.length) {
        state.room.questions = prev.questions;
      }

      if (updated.status === 'finished') {
        clearInterval(state.timerInterval);
        showPlayerResults();
        return;
      }

      if (updated.status === 'active') {
        if (prev.status === 'lobby' || prev.status !== 'active') {
          // Game just started
          clearInterval(state.lobbyPollInterval);
          clearTimeout(state.roundLeaderboardTimeout);
          state.hasAnswered = false;
          state.selectedAnswer = null;
          setHTML(`<div style="text-align:center;padding:80px 20px;">
            <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Game starting…</div>
            <div style="font-size:13px;color:#9090b8;">Loading questions</div>
          </div>`);
          fetchFullRoom().then(() => showIngame());
        } else if (state.view === 'roundleaderboard' && updated.question_start_time !== prev.question_start_time) {
          // Host clicked "Start round X" — same question_index but new start time
          clearTimeout(state.roundLeaderboardTimeout);
          state.hasAnswered = false;
          state.selectedAnswer = null;
          fetchFullRoom().then(() => showIngame());
        } else if (updated.current_question_index !== prev.current_question_index) {
          clearTimeout(state.roundLeaderboardTimeout);
          state.hasAnswered = false;
          state.selectedAnswer = null;
          const newIdx = updated.current_question_index;
          const crossedRound = newIdx > 0 && newIdx % 5 === 0;
          if (crossedRound) {
            const completedRound = Math.floor(newIdx / 5);
            setHTML(`<div style="text-align:center;padding:80px 20px;">
              <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Next question…</div>
              <div style="font-size:13px;color:#9090b8;">Loading</div>
            </div>`);
            fetchFullRoom().then(() => showRoundLeaderboard(completedRound));
          } else {
            setHTML(`<div style="text-align:center;padding:80px 20px;">
              <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Next question…</div>
              <div style="font-size:13px;color:#9090b8;">Loading</div>
            </div>`);
            fetchFullRoom().then(() => showIngame());
          }
        }
      }
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` }, payload => {
      if (payload.eventType === 'INSERT' && state.view === 'lobby') {
        state.players = [...state.players.filter(p => p.id !== payload.new.id), { id: payload.new.id, name: payload.new.name }];
        renderLobbyList();
      }
    })
    .subscribe();
}

// ─── IN-GAME SCREEN ───────────────────────────────────────────────────────────
const CLIP_DURATION = 10;
const QUESTION_REVEAL_SECS = 3;
const PLAYER_NAME_KEY = 'quizzli-player-name';

function stopClip() {
  clearTimeout(state.clipTimeout);
  state.clipTimeout = null;
  if (state.audio) {
    state.audio.pause();
    state.audio.src = '';
    state.audio = null;
  }
}

function playClip(url) {
  stopClip();
  if (!url) return;
  state.audio = new Audio(url);
  state.audio.volume = 1;
  state.audio.play().catch(() => {
    const cs = document.getElementById('clipStatus');
    if (cs) cs.textContent = 'Tap to play';
  });
  state.clipTimeout = setTimeout(() => stopClip(), 10 * 1000);
}

function waveformHTML() {
  const heights = [8, 18, 12, 24, 10, 20, 14, 22, 8, 16];
  return heights.map((h, i) =>
    `<div class="wave-bar" style="height:${h}px;animation-delay:${(i * 0.12).toFixed(2)}s;"></div>`
  ).join('');
}

function showIngame() {
  clearInterval(state.timerInterval);
  stopClip();
  state.view = 'ingame';
  const room = state.room;
  const qi = room.current_question_index;
  const q = room.questions?.[qi];

  if (!q) {
    setHTML(`<div style="text-align:center;padding:80px 20px;">
      <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Game starting…</div>
      <div style="font-size:13px;color:#9090b8;">Loading questions</div>
    </div>`);
    fetchFullRoom().then(() => showIngame());
    return;
  }

  const timerDuration = room.config?.timer || 15;
  const questionsPerRound = 5;
  const roundNum = Math.floor(qi / questionsPerRound) + 1;
  const qInRound = (qi % questionsPerRound) + 1;
  const isMusic = !!(q.preview_url);

  const musicBanner = isMusic ? `
    <div style="background:#f5f3ff;border-radius:10px;padding:12px 14px;margin-bottom:12px;text-align:center;">
      <div style="display:flex;align-items:center;justify-content:center;gap:3px;height:28px;margin-bottom:6px;">
        ${waveformHTML()}
      </div>
      <div style="font-size:12px;color:#7c3aed;" id="clipStatus">Clip playing…</div>
    </div>` : '';

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="font-size:12px;color:#7c3aed;">Round ${roundNum} · Q${qInRound}</div>
        <span class="timer-badge timer-ok" id="timerBadge" style="${isMusic ? '' : 'display:none;'}">${isMusic ? '♫' : ''}</span>
        <div style="font-size:12px;color:#9090b8;" id="scoreDisplay">${state.localScore} pts</div>
      </div>

      ${musicBanner}

      <div style="background:#ede9fe;border-radius:8px;padding:6px 12px;margin-bottom:10px;display:inline-block;">
        <span style="font-size:12px;color:#6d28d9;font-weight:500;text-transform:uppercase;letter-spacing:.06em;">${q.cat}</span>
      </div>

      <div class="card" style="margin-bottom:14px;">
        <div style="font-size:17px;font-weight:500;color:#1a1a2e;line-height:1.5;">${q.q}</div>
      </div>

      <div id="optionGrid" style="${!isMusic ? 'visibility:hidden;' : ''}">
        ${q.opts.map((o, i) => `<button class="option-btn" id="opt${i}" onclick="submitAnswer(${i})">${String.fromCharCode(65+i)} &nbsp; ${o}</button>`).join('')}
      </div>

      <div id="statusMsg" style="background:#f5f5fa;border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;color:#9090b8;margin-top:4px;display:none;"></div>
    </div>
  `);

  if (isMusic) playClip(q.preview_url);
  startPlayerTimer(timerDuration, isMusic);

  // If player already answered this question (e.g. after a reload), restore their answer state
  if (state.hasAnswered && state.selectedAnswer !== null) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    const grid = document.getElementById('optionGrid');
    if (grid) grid.style.visibility = 'visible';
    const selectedEl = document.getElementById('opt' + state.selectedAnswer);
    if (selectedEl) selectedEl.classList.add('selected');
    const statusEl = document.getElementById('statusMsg');
    if (statusEl) {
      statusEl.style.display = 'block';
      statusEl.style.color = '#a78bfa';
      statusEl.textContent = 'Locked in — waiting for others…';
    }
  }
}


function startPlayerTimer(duration, isMusic = false) {
  clearInterval(state.timerInterval);
  const startTime = new Date(state.room.question_start_time).getTime();

  state.timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const clipPhase = isMusic && elapsed < CLIP_DURATION;
    const revealPhase = !isMusic && elapsed < QUESTION_REVEAL_SECS;
    const countdownElapsed = isMusic
      ? Math.max(0, elapsed - CLIP_DURATION)
      : Math.max(0, elapsed - QUESTION_REVEAL_SECS);
    const left = Math.max(0, duration - countdownElapsed);
    const badge = document.getElementById('timerBadge');

    if (clipPhase) {
      if (badge) { badge.textContent = '♫'; badge.className = 'timer-badge timer-ok'; }
    } else if (revealPhase) {
      if (badge) { badge.textContent = ''; badge.style.display = 'none'; }
    } else {
      if (badge) badge.style.display = '';
      const grid = document.getElementById('optionGrid');
      if (grid) grid.style.visibility = 'visible';
      const clipStatus = document.getElementById('clipStatus');
      if (clipStatus) clipStatus.style.display = 'none';
      if (badge) {
        badge.textContent = Math.ceil(left) + 's';
        badge.className = 'timer-badge ' + (left > 8 ? 'timer-ok' : left > 4 ? 'timer-warn' : 'timer-danger');
      }
      if (left <= 0) {
        clearInterval(state.timerInterval);
        if (!state.hasAnswered) timeUp();
      }
    }
  }, 100);
}

async function submitAnswer(idx) {
  if (state.hasAnswered) return;
  const _q = state.room.questions?.[state.room.current_question_index];
  const _isMusic = !!(_q?.preview_url);
  if (!_isMusic) {
    const _elapsed = (Date.now() - new Date(state.room.question_start_time).getTime()) / 1000;
    if (_elapsed < QUESTION_REVEAL_SECS) return;
  }
  state.hasAnswered = true;
  state.selectedAnswer = idx;
  clearInterval(state.timerInterval);

  const room = state.room;
  const qi = room.current_question_index;
  const q = room.questions[qi];
  const timerDuration = room.config?.timer || 15;
  const isMusic = !!(q.preview_url);
  const startTime = new Date(room.question_start_time).getTime();
  const totalElapsed = (Date.now() - startTime) / 1000;
  // Speed bonus counts from when countdown started (after clip for music questions)
  const elapsed = isMusic ? Math.max(0, totalElapsed - CLIP_DURATION) : totalElapsed;
  const correct = idx === q.ans;

  let pts = 0;
  if (correct) {
    const bonus = Math.round(5 * Math.max(0, (timerDuration - elapsed) / timerDuration));
    pts = 10 + bonus;
    state.localScore += pts;
  }

  const answerEntry = { question_index: qi, answer_index: idx, correct, pts, time_taken: elapsed };
  state.answers = [...state.answers, answerEntry];

  // Highlight selected option
  const optEl = document.getElementById('opt' + idx);
  if (optEl) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    optEl.classList.add('selected');
  }

  // Show waiting message
  const statusEl = document.getElementById('statusMsg');
  if (statusEl) {
    statusEl.style.display = 'block';
    statusEl.style.color = '#a78bfa';
    statusEl.textContent = 'Locked in — waiting for others…';
  }

  // Update score display
  const scoreEl = document.getElementById('scoreDisplay');
  if (scoreEl) scoreEl.textContent = state.localScore + ' pts';

  // Save to Supabase
  try {
    await sb.from('players').update({
      score: state.localScore,
      answers: state.answers,
    }).eq('id', state.player.id);
  } catch(e) {
    console.warn('Failed to save answer:', e);
  }

  // Show reveal after brief delay
  setTimeout(() => revealPlayerAnswer(idx, correct, pts), 600);
}

function timeUp() {
  state.hasAnswered = true;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  // Reveal correct answer
  const q = state.room.questions[state.room.current_question_index];
  const correctEl = document.getElementById('opt' + q.ans);
  if (correctEl) correctEl.classList.add('correct');

  const statusEl = document.getElementById('statusMsg');
  if (statusEl) {
    statusEl.style.display = 'block';
    statusEl.style.color = '#9090b8';
    statusEl.textContent = `Time's up! Correct answer: ${q.opts[q.ans]}`;
  }
  // Still save a "no answer" entry so host can count responses
  const qi = state.room.current_question_index;
  state.answers = [...state.answers, { question_index: qi, answer_index: -1, correct: false, pts: 0, time_taken: state.room.config?.timer || 15 }];
  sb.from('players').update({ answers: state.answers }).eq('id', state.player.id).catch(() => {});
}

function revealPlayerAnswer(idx, correct, pts) {
  const q = state.room.questions[state.room.current_question_index];
  q.opts.forEach((_, i) => {
    const el = document.getElementById('opt' + i);
    if (!el) return;
    el.classList.remove('selected');
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && !correct) el.classList.add('wrong');
  });

  const statusEl = document.getElementById('statusMsg');
  if (statusEl) {
    if (correct) {
      statusEl.style.color = '#166534';
      statusEl.textContent = `Correct! +${pts} pts`;
    } else {
      statusEl.style.color = '#991b1b';
      statusEl.textContent = `Wrong — the answer was: ${q.opts[q.ans]}`;
    }
  }
}

    <div class="fade-in">

        <div style="font-size:11px;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;">Round ${completedRound} complete</div>
        <div style="font-size:22px;font-weight:500;color:#1a1a2e;">${isLastRound ? 'Final scores' : 'Leaderboard'}</div>

      </div>

  localStorage.removeItem('trivia_player_id');
  localStorage.removeItem('trivia_room_code');

  const { data: allPlayers } = await sb.from('players').select('id,name,score').eq('room_id', state.room.id).order('score', { ascending: false });
  const sorted = allPlayers || [];
  const myRank = sorted.findIndex(p => p.id === state.player?.id) + 1;

  const emoji = myRank === 1 ? '🏆' : myRank <= 3 ? '⭐' : '👍';
  const msg = myRank === 1 ? 'You won!' : myRank <= 3 ? 'Great work!' : 'Good game!';

      <div class="avatar" style="width:26px;height:26px;font-size:9px;background:${bg};color:${fg};">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
      <div style="flex:1;font-size:13px;color:${isMe?'#c4b5fd':'#1a1a2e'};font-weight:${isMe?500:400};">${isMe ? 'You ('+p.name+')' : p.name}</div>

        <div style="font-size:22px;font-weight:500;color:#1a1a2e;margin-bottom:4px;">${msg}</div>
        <div style="font-size:12px;color:#9090b8;">Room ${state.room.room_code}</div>
      </div>

      <div class="card" style="text-align:center;margin-bottom:14px;">
        <div style="font-size:54px;font-weight:500;color:#a78bfa;line-height:1;">${state.localScore}</div>
        <div style="font-size:13px;color:#9090b8;margin-top:4px;">out of ${maxScore} points · ${myRank > 0 ? myRank + ordinal(myRank) + ' place' : 'unranked'}</div>
      </div>

      <div class="card" style="margin-bottom:16px;">

        <div style="font-size:12px;color:#9090b8;margin-bottom:10px;">Rejoin with the same code or share with someone new</div>
        <button class="btn-primary" style="font-size:13px;padding:10px;margin-bottom:8px;" onclick="rejoinRoom()">Rejoin room ${state.room?.room_code || ''}</button>
        <button class="btn-outline" style="font-size:13px;padding:10px;" onclick="shareRoom()">Share join link</button>
      </div>

      <a href="index.html" style="display:block;text-align:center;font-size:12px;color:#9090b8;text-decoration:none;padding:8px;">← Back to home</a>

async function rejoinRoom() {
  const code = state.room?.room_code || localStorage.getItem('trivia_room_code') || '';
  const name = state.player?.name || localStorage.getItem('trivia_player_name') || '';

  if (state.subscription) { state.subscription.unsubscribe(); state.subscription = null; }
  state.player = null;
  state.answers = [];
  state.localScore = 0;
  state.hasAnswered = false;
  state.selectedAnswer = null;

  if (!name || !code) { showJoin(code, name); return; }

  try {
    const { data: room } = await sb.from('game_rooms').select('*').eq('room_code', code).maybeSingle();
    if (!room) { showJoin(code, name); return; }
    state.room = room;

    if (room.status === 'finished') {
      // Host hasn't clicked "Play again" yet — wait for room to reset
      showWaitingForHost(code, name);
      return;
    }

    await doRejoinInsert(room, name, code);
  } catch(e) {
    showJoin(code, name);
  }
}

function showWaitingForHost(code, name) {
  state.view = 'waiting';
  setHTML(`
    <div class="fade-in" style="text-align:center;padding:80px 20px;">
      <div style="font-size:22px;color:#a78bfa;margin-bottom:8px;">Almost there…</div>
      <div style="font-size:14px;color:#1a1a2e;margin-bottom:4px;">Waiting for host to start a new game</div>
      <div style="font-size:12px;color:#9090b8;margin-bottom:28px;">Room <strong style="color:#1a1a2e;">${code}</strong> · ${name}</div>
      <div style="display:flex;justify-content:center;gap:4px;">
        <div style="width:7px;height:7px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .0s infinite;"></div>
        <div style="width:7px;height:7px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .4s infinite;"></div>
        <div style="width:7px;height:7px;border-radius:50%;background:#7c3aed;animation:dot 1.2s .8s infinite;"></div>
      </div>
    </div>
    <style>@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
  `);

  const roomId = state.room.id;
  const waitSub = sb.channel('rejoin_wait_' + roomId + '_' + Date.now())
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'game_rooms', filter: `id=eq.${roomId}` }, async payload => {
      if (payload.new?.status === 'lobby' || payload.new?.status === 'active') {
        waitSub.unsubscribe();
        state.room = payload.new;
        await doRejoinInsert(state.room, name, code);
      }
    })
    .subscribe();
}

async function doRejoinInsert(room, name, code) {
  const { data: playerData, error } = await sb.from('players').insert({
    room_id: room.id, name, score: 0, answers: [],
  }).select().single();

  if (error || !playerData) { showJoin(code, name); return; }

  state.player = playerData;
  localStorage.setItem('trivia_player_id', playerData.id);
  localStorage.setItem('trivia_room_code', code);
  localStorage.setItem('trivia_player_name', name);
  localStorage.setItem(PLAYER_NAME_KEY, name);

  subscribeAsPlayer();
  if (room.status === 'active') showIngame();
  else showLobby();
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return s[(v-20)%10] || s[v] || s[0];
}

function shareRoom() {
  const code = state.room?.room_code;
  const url = `${window.location.origin}/join.html?code=${code}`;
  const doShare = () => {
    if (navigator.share) {
      navigator.share({ title: 'Join our Quizzli game!', text: `Join room ${code}`, url }).catch(() => doCopy());
    } else {
      doCopy();
    }
  };
  const doCopy = () => {
    navigator.clipboard?.writeText(url).then(() => {
      const btn = document.querySelector('button[onclick="shareRoom()"]');
      if (btn) { const t = btn.textContent; btn.textContent = '✓ Link copied!'; setTimeout(() => btn.textContent = t, 2000); }
    }).catch(() => {});
  };
  doShare();
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const urlCode = new URLSearchParams(window.location.search).get('code') || '';
  const savedPlayerId = localStorage.getItem('trivia_player_id');
  const savedRoomCode = localStorage.getItem('trivia_room_code');
  const savedName = localStorage.getItem('trivia_player_name');

  if (savedPlayerId && savedRoomCode && !urlCode) {
    try {
      const { data: player } = await sb.from('players')
        .select('*')
        .eq('id', savedPlayerId)
        .maybeSingle();

      if (player) {
        const { data: room } = await sb.from('game_rooms')
          .select('*')
          .eq('room_code', savedRoomCode)
          .maybeSingle();

        if (room && room.status !== 'finished') {
          state.player = player;
          state.room = room;
          state.localScore = player.score || 0;
          state.answers = player.answers || [];

          // Restore answered state for the current question
          const currentQIdx = room.current_question_index;
          const alreadyAnswered = player.answers?.some(a => a.question_index === currentQIdx);
          if (alreadyAnswered) {
            state.hasAnswered = true;
            const prevAnswer = player.answers.find(a => a.question_index === currentQIdx);
            state.selectedAnswer = prevAnswer?.answer_index ?? null;
          }

          subscribeAsPlayer();
          if (room.status === 'active') {
            setHTML(`<div style="text-align:center;padding:80px 20px;">
              <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Rejoining game…</div>
              <div style="font-size:13px;color:#9090b8;">Loading your session</div>
            </div>`);
            await fetchFullRoom();
            showIngame();
          } else {
            showLobby();
          }
          return;
        }
      } else {
        // Player record gone — host may have removed them; clear stale session
        localStorage.removeItem('trivia_player_id');
        localStorage.removeItem('trivia_room_code');
      }
    } catch(e) {
      // Fall through to normal join screen
    }
  }

  showJoin(urlCode.toUpperCase(), localStorage.getItem(PLAYER_NAME_KEY) || '');
}

init();
</script>
