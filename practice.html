<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Quizzli — Live multiplayer trivia nights. Host from your phone, players join instantly with a room code. Music rounds, live scores, no app needed." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://quizzli.app/practice.html" />
<meta property="og:title" content="Practice Mode — Quizzli" />
<meta property="og:description" content="Solo trivia practice with AI-generated questions. Pick your categories, set your difficulty, and sharpen your trivia skills." />
<meta property="og:image" content="https://quizzli.app/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Practice Mode — Quizzli" />
<meta name="twitter:description" content="Solo trivia practice with AI-generated questions. Pick your categories, set your difficulty, and sharpen your trivia skills." />
<meta name="twitter:image" content="https://quizzli.app/og-image.png" />
<title>Practice Mode — Quizzli</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5fa; color: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.card { background: #ffffff; border: 1px solid #e4e4f0; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(100,100,200,0.06); }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-outline { background: transparent; border: 1px solid #e4e4f0; border-radius: 10px; padding: 11px 16px; font-size: 13px; color: #9090b8; cursor: pointer; width: 100%; transition: border-color .2s, color .2s; }
.btn-outline:hover { border-color: #7c3aed88; color: #7c3aed; }
.option-btn { background: #ffffff; border: 2px solid #e4e4f0; border-radius: 12px; padding: 14px; font-size: 16px; color: #2a2a4a; width: 100%; text-align: left; cursor: pointer; transition: all .15s; min-height: 52px; display: block; margin-bottom: 10px; line-height: 1.4; box-shadow: 0 1px 3px rgba(100,100,200,0.05); }
.option-btn:active:not([disabled]) { transform: scale(.98); }
.option-btn[disabled] { cursor: default; }
.option-btn.correct { border-color: #22c55e; color: #166534; background: #f0fdf4; }
.option-btn.wrong { border-color: #ef4444; color: #991b1b; background: #fef2f2; }
.rt-btn { background: #f0f0fa; border: 1px solid #d0d0e8; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #9090b8; cursor: pointer; transition: background .2s, border-color .2s, color .2s; text-align: center; flex: 1; }
.rt-btn.sel { background: #ede9fe; border-color: #7c3aed; color: #6d28d9; }
.sub-label { font-size: 12px; color: #9090b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.fade-in { animation: fadeUp .3s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.timer-badge { border-radius: 20px; padding: 4px 14px; font-size: 14px; font-weight: 600; display: inline-block; border: 1px solid transparent; }
.timer-ok { color: #6d28d9; border-color: #c4b5fd; background: #ede9fe; }
.timer-warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
.timer-danger { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
.timer-music { color: #6d28d9; border-color: #c4b5fd; background: #f5f3ff; animation: musicPulse 1.4s ease-in-out infinite; }
@keyframes musicPulse { 0%,100% { opacity:1; } 50% { opacity:.55; } }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.toggle-track { width: 44px; height: 24px; border-radius: 12px; position: relative; flex-shrink: 0; cursor: pointer; transition: background .2s; }
.toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 3px; transition: left .2s; }
.progress-track { height: 3px; background: #e4e4f0; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: #7c3aed; border-radius: 3px; transition: width .4s; }
.explanation-card { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
/* Category accordion */
.cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, background .15s; margin-bottom: 4px; }
.cat-row.has-sel { border-color: #7c3aed44; }
.cat-row.direct-sel { border-color: #7c3aed; }
.cat-subs { padding: 6px 10px 10px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.sub-pill { border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; border: 1px solid #d0d0e8; color: #9090b8; background: #f5f5fa; transition: border-color .15s, color .15s, background .15s; }
.sub-pill.sel { border-color: #7c3aed; color: #6d28d9; background: #ede9fe; }
/* Music waveform */
.music-banner { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.wave-bar { width: 4px; border-radius: 2px; background: #7c3aed; transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
@keyframes wave { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
.wave-bar.stopped { animation: none; transform: scaleY(0.25); opacity: .4; }
/* Custom categories */
.custom-suggestion { padding: 9px 12px; font-size: 13px; color: #1a1a2e; cursor: pointer; border-bottom: 1px solid #e4e4f0; transition: background .1s; }
.custom-suggestion:hover { background: #f5f5fa; }
.custom-suggestion:last-child { border-bottom: none; }
</style>
</head>
<body>
<div id="app"><div id="root"></div></div>
<script>
const root = document.getElementById('root');
function setHTML(h) { root.innerHTML = h; }

const CLIP_DURATION = 10;

const CUSTOM_CATS_KEY = 'trivia-custom-cats';
const SUGGESTIONS = ['Taylor Swift', 'Eagles trivia', 'Philly sports', 'Harry Potter', 'Lord of the Rings', 'Marvel movies', 'Seinfeld', 'The Office', 'Friends', 'Disney', 'Star Wars', 'Game of Thrones', '90s commercials', 'Christmas movies', 'Halloween trivia', 'Super Bowl history', 'World Cup soccer', 'NBA legends', 'Beatles songs', 'Elvis Presley'];
const MUSIC_SUGGESTIONS = new Set(['Taylor Swift', 'Beatles songs', 'Elvis Presley', 'Beyoncé', 'Michael Jackson']);
let _customInput = '';
let _customMusicFlag = false;
let _customMusicType = 'genre'; // 'genre' | 'artist' | 'soundtrack'

const CATEGORY_DATA = [
  { name: 'General Knowledge', icon: '🧠', color: '#7c3aed', border: '#7c3aed', bg: '#f5f3ff', music: false, subs: null },
  { name: 'Music',             icon: '🎵', color: '#2563eb', border: '#3b82f6', bg: '#eff6ff', music: true,
    subs: ['80s hits', '90s pop', 'Current hits', '60s & 70s classics', '2000s bangers', 'Classic rock', 'Hip hop', 'R&B & soul', 'Country'] },
  { name: 'Sports',            icon: '🏆', color: '#16a34a', border: '#22c55e', bg: '#f0fdf4', music: false,
    subs: ['General sports', 'NFL Football', 'NBA Basketball', 'MLB Baseball', 'NHL Hockey', 'Soccer / World Cup', 'Olympics'] },
  { name: 'History',           icon: '📜', color: '#b45309', border: '#f59e0b', bg: '#fffbeb', music: false,
    subs: ['World history', 'US history', 'Ancient history', '20th century'] },
  { name: 'Science',           icon: '🔬', color: '#7c3aed', border: '#a78bfa', bg: '#f5f3ff', music: false,
    subs: ['General science', 'Space & astronomy', 'Biology & nature', 'Tech & computers'] },
  { name: 'Pop Culture',       icon: '🎬', color: '#be185d', border: '#f472b6', bg: '#fdf4ff', music: false,
    subs: ['Movies & film', 'TV shows', 'Music & celebrities', 'Video games'] },
  { name: 'Geography',         icon: '🌍', color: '#0f766e', border: '#2dd4bf', bg: '#f0fdfa', music: false,
    subs: ['World geography', 'US geography', 'Capital cities'] },
  { name: 'Food & Drink',      icon: '🍕', color: '#c2410c', border: '#fb923c', bg: '#fff7ed', music: false, subs: null },
];

function findCatData(name) {
  const direct = CATEGORY_DATA.find(c => c.name === name);
  if (direct) return direct;
  return CATEGORY_DATA.find(c => c.subs && c.subs.some(s => s.toLowerCase() === name.toLowerCase()));
}

let state = {
  view: 'setup',
  categories: [],
  expandedCat: null,
  count: 10,
  difficulty: 'mixed',
  timerEnabled: false,
  timerSecs: 15,
  explainEnabled: true,
  questions: [],
  currentIdx: 0,
  answers: [],
  askedSongs: [],
  hasAnswered: false,
  timerInterval: null,
  clipPhaseTimeout: null,
  clipTimeout: null,
  audio: null,
  fetching: false,
  totalAnswered: 0,
  customCats: [],
};

// ─── Audio ───────────────────────────────────────────────────────────────────
function stopClip() {
  if (state.audio) { state.audio.pause(); state.audio = null; }
  clearTimeout(state.clipTimeout);
  clearTimeout(state.clipPhaseTimeout);
  state.clipTimeout = null;
  state.clipPhaseTimeout = null;
  document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('stopped'));
}

function playClip(url) {
  stopClip();
  try {
    const audio = new Audio(url);
    audio.volume = 0.85;
    audio.play().catch(() => {});
    state.audio = audio;
    state.clipTimeout = setTimeout(() => stopClip(), (CLIP_DURATION + 5) * 1000);
  } catch {}
}

function waveformHTML() {
  const delays = [0, 0.15, 0.3, 0.45, 0.6];
  const heights = [14, 20, 26, 20, 14];
  return delays.map((d, i) =>
    `<div class="wave-bar" style="height:${heights[i]}px;animation-delay:${d}s;"></div>`
  ).join('');
}

// ─── Custom categories ────────────────────────────────────────────────────────
function loadCustomCats() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_CATS_KEY) || '[]').filter(c => c.name && typeof c.music === 'boolean'); }
  catch { return []; }
}
function saveCustomCats() {
  localStorage.setItem(CUSTOM_CATS_KEY, JSON.stringify(state.customCats));
}
function addCustomCat(name, music) {
  const n = name.trim();
  if (n.length < 2 || state.customCats.length >= 10) return;
  if (state.customCats.find(c => c.name.toLowerCase() === n.toLowerCase())) return;
  state.customCats.push({ name: n, music, musicType: music ? _customMusicType : null });
  saveCustomCats();
  if (!state.categories.includes(n)) state.categories.push(n);
  _customInput = '';
  _customMusicFlag = false;
  _customMusicType = 'genre';
  renderSetup();
}
function removeCustomCat(name) {
  state.customCats = state.customCats.filter(c => c.name !== name);
  state.categories = state.categories.filter(c => c !== name);
  saveCustomCats();
  renderSetup();
}
function toggleCustomCatSel(name) {
  state.categories = state.categories.includes(name)
    ? state.categories.filter(c => c !== name)
    : [...state.categories, name];
  renderSetup();
}
function onCustomInput(val) {
  _customInput = val;
  const len = val.trim().length;
  const addBtn = document.getElementById('customAddBtn');
  if (addBtn) { addBtn.style.opacity = len >= 2 ? '1' : '.4'; addBtn.style.pointerEvents = len >= 2 ? '' : 'none'; }
  const toggleRow = document.getElementById('musicToggleRow');
  if (toggleRow) toggleRow.style.display = len >= 2 ? 'block' : 'none';
  if (len >= 2 && MUSIC_SUGGESTIONS.has(val.trim())) { _customMusicFlag = true; updateMusicToggleUI(); }
  updateMusicHint(val.trim());
  const el = document.getElementById('customSuggestions');
  if (!el) return;
  if (len === 0) { el.style.display = 'none'; return; }
  const lower = val.trim().toLowerCase();
  const filtered = SUGGESTIONS.filter(s => s.toLowerCase().includes(lower) && !state.customCats.find(c => c.name.toLowerCase() === s.toLowerCase())).slice(0, 6);
  if (!filtered.length) { el.style.display = 'none'; return; }
  el.innerHTML = filtered.map(s => `<div class="custom-suggestion" onclick="selectSuggestion('${s.replace(/'/g,"\\'")}');">${s}</div>`).join('');
  el.style.display = 'block';
}
function selectSuggestion(name) {
  _customInput = name;
  _customMusicFlag = MUSIC_SUGGESTIONS.has(name);
  const input = document.getElementById('customCatInput');
  if (input) input.value = name;
  const el = document.getElementById('customSuggestions');
  if (el) el.style.display = 'none';
  const toggleRow = document.getElementById('musicToggleRow');
  if (toggleRow) toggleRow.style.display = 'block';
  updateMusicToggleUI();
  updateMusicHint(name);
  const addBtn = document.getElementById('customAddBtn');
  if (addBtn) { addBtn.style.opacity = '1'; addBtn.style.pointerEvents = ''; }
}
function tryAddCustomCat() {
  addCustomCat(_customInput, _customMusicFlag);
}
function toggleMusicFlag() {
  _customMusicFlag = !_customMusicFlag;
  if (!_customMusicFlag) _customMusicType = 'genre';
  updateMusicToggleUI();
  updateMusicHint(_customInput.trim());
  const typeRow = document.getElementById('musicTypeRow');
  if (typeRow) typeRow.style.display = _customMusicFlag ? 'block' : 'none';
}
function setCustomMusicType(t) {
  _customMusicType = t;
  ['artist', 'genre', 'soundtrack'].forEach(type => {
    const el = document.getElementById('customType_' + type);
    if (!el) return;
    const sel = type === t;
    el.style.background = sel ? '#ede9fe' : '#f5f5fa';
    el.style.borderColor = sel ? '#7c3aed' : '#d0d0e8';
    el.querySelector('.type-label').style.color = sel ? '#6d28d9' : '#9090b8';
  });
}
function updateMusicToggleUI() {
  const track = document.getElementById('musicToggleTrack');
  const thumb = document.getElementById('musicToggleThumb');
  if (track) track.style.background = _customMusicFlag ? '#378add' : '#d0d0e8';
  if (thumb) thumb.style.left = _customMusicFlag ? '23px' : '3px';
}
function updateMusicHint(name) {
  const el = document.getElementById('musicHint');
  if (el) el.textContent = _customMusicFlag && name ? `iTunes will search for "${name}" clips` : '';
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function showSetup() {
  state.view = 'setup';
  renderSetup();
}

function getSelectedSubs(cat) {
  if (!cat.subs) return [];
  return cat.subs.filter(s => state.categories.includes(s));
}

function buildCustomSection() {
  const TYPE_ICONS = { artist: '🎤', genre: '🎵', soundtrack: '🎬' };

  const chips = state.customCats.map(c => {
    const sel = state.categories.includes(c.name);
    const en = c.name.replace(/'/g, "\\'");
    const icon = c.music ? (TYPE_ICONS[c.musicType] || '🎵') : '';
    const chipBg = c.music ? '#eff6ff' : (sel ? '#ede9fe' : '#f5f5fa');
    const chipBorder = c.music ? (sel ? '#93c5fd' : '#93c5fd66') : (sel ? '#a78bfa' : '#d0d0e8');
    const chipColor = c.music ? (sel ? '#1d4ed8' : '#6090c8') : (sel ? '#6d28d9' : '#9090b8');
    return `<div onclick="toggleCustomCatSel('${en}');event.stopPropagation();"
      style="display:flex;align-items:center;gap:4px;background:${chipBg};border:1px solid ${chipBorder};border-radius:20px;padding:5px 10px 5px 8px;cursor:pointer;transition:border-color .15s;">
      ${icon ? `<span style="font-size:10px;">${icon}</span>` : ''}
      <span style="font-size:12px;color:${chipColor};">${c.name}</span>
      ${sel ? '<span style="font-size:10px;color:#7c3aed;margin-left:2px;">✓</span>' : ''}
      <button onclick="event.stopPropagation();removeCustomCat('${en}')"
        style="background:none;border:none;color:#9090b8;cursor:pointer;font-size:12px;padding:0 0 0 4px;line-height:1;flex-shrink:0;">✕</button>
    </div>`;
  }).join('');

  const addBtnActive = _customInput.trim().length >= 2;
  const showToggle = _customInput.trim().length >= 2;
  const hintText = _customMusicFlag && _customInput.trim() ? `iTunes will search for "${_customInput.trim()}" clips` : '';
  const escapedVal = _customInput.replace(/"/g, '&quot;');

  const typeSelector = `
    <div id="musicTypeRow" style="display:${_customMusicFlag ? 'block' : 'none'};margin-top:10px;padding-top:10px;border-top:1px solid #c4b5fd44;">
      <div style="font-size:12px;color:#9090b8;margin-bottom:6px;">Category type:</div>
      <div style="display:flex;gap:6px;">
        ${[
          { type: 'artist',     icon: '🎤', label: 'Artist',     ex: 'e.g. Taylor Swift' },
          { type: 'genre',      icon: '🎵', label: 'Genre',      ex: 'e.g. 80s pop'      },
          { type: 'soundtrack', icon: '🎬', label: 'Soundtrack', ex: 'e.g. Grease'       },
        ].map(({ type, icon, label, ex }) => {
          const sel = _customMusicType === type;
          return `<div id="customType_${type}" onclick="setCustomMusicType('${type}')"
            style="flex:1;background:${sel ? '#ede9fe' : '#f5f5fa'};border:1px solid ${sel ? '#7c3aed' : '#d0d0e8'};border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;">
            <div style="font-size:16px;">${icon}</div>
            <div class="type-label" style="font-size:12px;color:${sel ? '#6d28d9' : '#9090b8'};margin-top:2px;">${label}</div>
            <div style="font-size:10px;color:#9090b8;margin-top:1px;">${ex}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  const inputSection = state.customCats.length < 10 ? `
    <div style="position:relative;">
      <div style="display:flex;gap:8px;">
        <input id="customCatInput" type="text" value="${escapedVal}" placeholder="Type a category… e.g. Taylor Swift"
          style="flex:1;background:#ffffff;border:1px solid #d0d0e8;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a1a2e;outline:none;"
          oninput="onCustomInput(this.value)" onkeydown="if(event.key==='Enter')tryAddCustomCat()" maxlength="50">
        <button id="customAddBtn" onclick="tryAddCustomCat()"
          style="background:#ffffff;border:1px solid #7c3aed44;border-radius:8px;padding:9px 14px;font-size:13px;color:#7c3aed;white-space:nowrap;${addBtnActive ? 'cursor:pointer;' : 'cursor:default;opacity:.4;pointer-events:none;'}">+ Add</button>
      </div>
      <div id="customSuggestions" style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:68px;background:#ffffff;border:1px solid #e4e4f0;border-radius:8px;z-index:10;overflow:hidden;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(100,100,200,0.12);"></div>
    </div>
    <div id="musicToggleRow" style="display:${showToggle ? 'block' : 'none'};margin-top:6px;">
      <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:10px 12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="flex:1;">
            <div style="font-size:12px;color:#6d28d9;">🎵 Music category — find a clip and identify the artist or song</div>
            <div id="musicHint" style="font-size:11px;color:#6d28d966;margin-top:3px;">${hintText}</div>
          </div>
          <div onclick="toggleMusicFlag()" class="toggle-track" id="musicToggleTrack" style="background:${_customMusicFlag ? '#378add' : '#d0d0e8'};">
            <div class="toggle-thumb" id="musicToggleThumb" style="left:${_customMusicFlag ? '23px' : '3px'};"></div>
          </div>
        </div>
        ${typeSelector}
      </div>
    </div>` : `<div style="font-size:12px;color:#9090b8;text-align:center;padding:8px 0;">Maximum 10 custom categories saved</div>`;

  return `
    <div style="margin-bottom:20px;">
      <div class="sub-label" style="margin-bottom:8px;">Custom categories</div>
      ${chips ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">${chips}</div>` : ''}
      ${inputSection}
    </div>`;
}

function renderSetup() {
  const catList = CATEGORY_DATA.map(c => {
    const expanded = state.expandedCat === c.name;
    const hasSubs = !!(c.subs && c.subs.length);
    const selectedSubs = hasSubs ? getSelectedSubs(c) : [];
    const directSel = !hasSubs && state.categories.includes(c.name);
    const hasAnySel = directSel || selectedSubs.length > 0;

    const chevron = hasSubs
      ? `<div style="color:#9090b8;font-size:12px;transition:transform .2s;transform:rotate(${expanded ? 90 : 0}deg);">▶</div>`
      : '';
    const check = directSel
      ? `<div style="width:18px;height:18px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;color:#fff;">✓</div>`
      : '';
    const selCount = hasSubs && selectedSubs.length > 0
      ? `<div style="background:#ede9fe;color:#6d28d9;border-radius:12px;padding:1px 8px;font-size:12px;white-space:nowrap;">${selectedSubs.length} selected</div>`
      : '';

    const onclick = hasSubs
      ? `toggleExpand('${c.name}')`
      : `toggleDirectCat('${c.name}')`;

    const subPills = expanded && hasSubs ? `
      <div class="cat-subs">
        <div class="sub-pill${c.subs.every(s => state.categories.includes(s)) ? ' sel' : ''}" onclick="event.stopPropagation();toggleAllSubs('${c.name}')">All ${c.name.toLowerCase()}</div>
        ${c.subs.map(s => {
          const isSel = state.categories.includes(s);
          return `<div class="sub-pill${isSel ? ' sel' : ''}" onclick="event.stopPropagation();toggleSub('${s.replace(/'/g, "\\'")}','${c.name}')">${s}</div>`;
        }).join('')}
      </div>` : '';

    return `
      <div style="background:${c.bg};border:2px solid ${hasAnySel ? c.border : 'transparent'};border-radius:10px;margin-bottom:4px;">
        <div class="cat-row" onclick="${onclick}" style="background:transparent;border:none;margin-bottom:0;">
          <span style="font-size:20px;">${c.icon}</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:${c.color};">${c.name}</div>
            ${hasSubs ? `<div style="font-size:12px;color:#9090b8;">${c.subs.length} subcategories</div>` : ''}
          </div>
          ${selCount}${check}${chevron}
        </div>
        ${subPills}
      </div>`;
  }).join('');

  const countBtns = [5, 10, 20, 'Endless'].map(c =>
    `<div class="rt-btn${state.count === c ? ' sel' : ''}" onclick="setCount(${typeof c === 'number' ? c : "'endless'"})">
      ${c}
    </div>`
  ).join('');

  const timerOn = state.timerEnabled;
  const timerSecBtns = timerOn ? `
    <div style="display:flex;gap:6px;margin-top:10px;">
      ${[10,15,20,30].map(s => `<div class="rt-btn${state.timerSecs===s?' sel':''}" onclick="setTimerSecs(${s})">${s}s</div>`).join('')}
    </div>` : '';

  const canStart = state.categories.length > 0;

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
        <a href="index.html" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:6px 12px;font-size:12px;color:#9090b8;text-decoration:none;">← Home</a>
        <div>
          <div style="font-size:20px;font-weight:500;color:#1a1a2e;">Practice Mode</div>
          <div style="font-size:12px;color:#9090b8;margin-top:2px;">Solo · no account needed · session only</div>
        </div>
      </div>

      <div class="sub-label">Pick your categories</div>
      <div style="margin-bottom:6px;">${catList}</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button class="btn-outline" style="font-size:12px;padding:7px;" onclick="selectAll()">Select all</button>
        <button class="btn-outline" style="font-size:12px;padding:7px;" onclick="clearAll()">Clear</button>
      </div>

      ${buildCustomSection()}

      <div class="card" style="margin-bottom:12px;">
        <div class="sub-label">How many questions?</div>
        <div style="display:flex;gap:8px;">${countBtns}</div>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="sub-label">Difficulty</div>
        <div style="display:flex;gap:8px;">
          ${[
            { key: 'easy',  label: 'Easy',  sub: 'well-known facts' },
            { key: 'mixed', label: 'Mixed', sub: 'balanced' },
            { key: 'hard',  label: 'Hard',  sub: 'obscure details' },
          ].map(d => `<div class="rt-btn${state.difficulty===d.key?' sel':''}" onclick="setDifficulty('${d.key}')" style="flex:1;text-align:center;">
            ${d.label}<div style="font-size:11px;color:${state.difficulty===d.key?'#7c3aed':'#9090b8'};margin-top:2px;">${d.sub}</div>
          </div>`).join('')}
        </div>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="toggle-row" onclick="toggleTimer()" style="cursor:pointer;">
          <div>
            <div style="font-size:13px;color:#1a1a2e;font-weight:500;">Timer</div>
            <div style="font-size:12px;color:#9090b8;">Adds time pressure to each question</div>
          </div>
          <div class="toggle-track" style="background:${timerOn ? '#7c3aed' : '#d0d0e8'};">
            <div class="toggle-thumb" style="left:${timerOn ? '23px' : '3px'};"></div>
          </div>
        </div>
        ${timerSecBtns}
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="toggle-row" onclick="toggleExplain()" style="cursor:pointer;">
          <div>
            <div style="font-size:13px;color:#1a1a2e;font-weight:500;">Show explanations</div>
            <div style="font-size:12px;color:#9090b8;">Brief fact after each answer</div>
          </div>
          <div class="toggle-track" style="background:${state.explainEnabled ? '#7c3aed' : '#d0d0e8'};">
            <div class="toggle-thumb" style="left:${state.explainEnabled ? '23px' : '3px'};"></div>
          </div>
        </div>
      </div>

      <button class="btn-primary" ${canStart ? '' : 'disabled'} onclick="startPractice()">
        ${canStart ? 'Start practice →' : 'Pick at least one category'}
      </button>
    </div>
  `);
  // Restore live input state (suggestions, toggle) without re-render
  if (_customInput) onCustomInput(_customInput);
}

function toggleExpand(name) {
  state.expandedCat = state.expandedCat === name ? null : name;
  renderSetup();
}

function toggleSub(sub, parentCat) {
  state.categories = state.categories.includes(sub)
    ? state.categories.filter(c => c !== sub)
    : [...state.categories, sub];
  renderSetup();
}

function toggleAllSubs(catName) {
  const cat = CATEGORY_DATA.find(c => c.name === catName);
  if (!cat?.subs) return;
  const allSelected = cat.subs.every(s => state.categories.includes(s));
  if (allSelected) {
    state.categories = state.categories.filter(c => !cat.subs.includes(c));
  } else {
    const toAdd = cat.subs.filter(s => !state.categories.includes(s));
    state.categories = [...state.categories, ...toAdd];
  }
  renderSetup();
}

function toggleDirectCat(name) {
  state.categories = state.categories.includes(name)
    ? state.categories.filter(c => c !== name)
    : [...state.categories, name];
  renderSetup();
}

function selectAll() {
  state.categories = [
    ...CATEGORY_DATA.flatMap(c => c.subs ? c.subs : [c.name]),
    ...state.customCats.map(c => c.name),
  ];
  renderSetup();
}

function clearAll() { state.categories = []; renderSetup(); }
function setCount(c) { state.count = c; renderSetup(); }
function setDifficulty(d) { state.difficulty = d; renderSetup(); }
function setTimerSecs(s) { state.timerSecs = s; renderSetup(); }
function toggleTimer()   { state.timerEnabled = !state.timerEnabled; renderSetup(); }
function toggleExplain() { state.explainEnabled = !state.explainEnabled; renderSetup(); }

// ─── FETCH QUESTIONS ─────────────────────────────────────────────────────────
async function fetchQuestions() {
  state.fetching = true;
  const count = state.count === 'endless' ? 10 : state.count;
  const params = new URLSearchParams({
    practice: 'true',
    categories: state.categories.join(','),
    count,
    difficulty: state.difficulty,
    explain: state.explainEnabled ? 'true' : 'false',
  });
  const avoidItems = [
    ...state.questions.map(q => q.q),
    ...state.askedSongs,
  ];
  if (avoidItems.length) params.set('avoid', avoidItems.join('||'));
  const customMusicCats = state.customCats.filter(c => c.music && state.categories.includes(c.name));
  if (customMusicCats.length) {
    params.set('customMusicCats', customMusicCats.map(c => c.name).join(','));
    const meta = {};
    customMusicCats.forEach(c => { meta[c.name] = { musicType: c.musicType || 'genre' }; });
    params.set('customCatsMeta', JSON.stringify(meta));
  }
  const res = await fetch(`/api/questions?${params}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to load questions');
  state.questions = [...state.questions, ...(data.questions || [])];
  state.fetching = false;
}

function unlockAudio() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    window._audioCtx = ctx;
  } catch(e) {}
}

async function startPractice() {
  if (!state.categories.length) return;
  unlockAudio(); // must be first, before any await
  state.questions = [];
  state.currentIdx = 0;
  state.answers = [];
  state.askedSongs = [];
  state.hasAnswered = false;
  state.totalAnswered = 0;

  showLoading();
  try {
    await fetchQuestions();
    showQuestion();
  } catch(e) {
    setHTML(`<div style="text-align:center;padding:60px 20px;">
      <div style="color:#ef4444;margin-bottom:16px;">Failed to load questions.<br><span style="font-size:12px;color:#9090b8;">${e.message}</span></div>
      <button class="btn-outline" onclick="showSetup()">← Back</button>
    </div>`);
  }
}

function showLoading() {
  setHTML(`<div style="text-align:center;padding:80px 20px;">
    <div style="font-size:16px;font-weight:500;color:#7c3aed;margin-bottom:8px;">Generating questions…</div>
    <div style="font-size:12px;color:#9090b8;">Personalised just for you</div>
  </div>`);
}

// ─── QUESTION ────────────────────────────────────────────────────────────────
function showQuestion() {
  clearInterval(state.timerInterval);
  stopClip();
  state.view = 'question';
  state.hasAnswered = false;

  if (state.count === 'endless' && !state.fetching &&
      state.questions.length - state.currentIdx <= 3) {
    fetchQuestions().catch(() => {});
  }

  const q = state.questions[state.currentIdx];
  if (!q) { showResults(); return; }

  const total = state.count === 'endless' ? null : state.questions.length;
  const progress = total ? (state.currentIdx / total * 100) : null;
  const catData = findCatData(q.cat) || CATEGORY_DATA[0];
  const isMusic = q.type === 'music' && !!(q.artist || q.song);
  const hasClip = isMusic && !!(q.preview_url);
  const timerDuration = state.timerEnabled ? state.timerSecs : null;

  const musicBanner = isMusic ? `
    <div class="music-banner">
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;">${hasClip ? waveformHTML() : '<div style="font-size:22px;opacity:.4;">♪</div>'}</div>
      <div id="musicInfo">
        ${hasClip
          ? `<div style="font-size:13px;font-weight:500;color:#6d28d9;">Playing audio clip…</div>
             <div style="font-size:12px;color:#6d28d9;margin-top:2px;">Listen and pick your answer</div>`
          : `<div style="font-size:13px;color:#9090b8;">No preview available</div>`}
      </div>
    </div>` : '';

  const timerHTML = timerDuration
    ? `<span class="timer-badge ${isMusic && hasClip ? 'timer-music' : 'timer-ok'}" id="timerBadge">${isMusic && hasClip ? '♫' : timerDuration + 's'}</span>`
    : (isMusic && hasClip ? `<span class="timer-badge timer-music" id="timerBadge">♫</span>` : `<div></div>`);

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:12px;color:#9090b8;">
          ${total ? `Question ${state.currentIdx + 1} of ${total}` : `Question ${state.currentIdx + 1}`}
        </div>
        ${timerHTML}
        ${state.count === 'endless'
          ? `<button onclick="showResults()" style="background:transparent;border:1px solid #e4e4f0;border-radius:8px;padding:5px 10px;font-size:12px;color:#9090b8;cursor:pointer;">End session</button>`
          : `<div></div>`}
      </div>

      ${progress !== null ? `<div class="progress-track"><div class="progress-fill" style="width:${progress}%;"></div></div>` : ''}

      ${musicBanner}

      <div style="display:inline-block;background:#ede9fe;border-radius:8px;padding:5px 12px;margin-bottom:10px;">
        <span style="font-size:12px;color:#6d28d9;font-weight:500;text-transform:uppercase;letter-spacing:.06em;">${q.cat}</span>
      </div>

      <div class="card" style="margin-bottom:14px;">
        <div style="font-size:17px;font-weight:500;color:#1a1a2e;line-height:1.5;">${q.q}</div>
      </div>

      <div id="optionGrid">
        ${q.opts.map((o, i) => `<button class="option-btn" id="opt${i}" onclick="submitAnswer(${i})">${String.fromCharCode(65+i)} &nbsp; ${o}</button>`).join('')}
      </div>

      <div id="feedback" style="display:none;"></div>
    </div>
  `);

  if (hasClip) {
    playClip(q.preview_url);
    if (timerDuration) {
      state.clipPhaseTimeout = setTimeout(() => {
        state.clipPhaseTimeout = null;
        if (!state.hasAnswered) startPracticeTimer(timerDuration);
      }, CLIP_DURATION * 1000);
    }
  } else {
    if (timerDuration) startPracticeTimer(timerDuration);
  }
}

function startPracticeTimer(duration) {
  let left = duration;
  const badge = document.getElementById('timerBadge');
  if (badge) {
    badge.textContent = left + 's';
    badge.className = 'timer-badge timer-ok';
  }
  state.timerInterval = setInterval(() => {
    left--;
    const b = document.getElementById('timerBadge');
    if (b) {
      b.textContent = left + 's';
      b.className = 'timer-badge ' + (left > 8 ? 'timer-ok' : left > 4 ? 'timer-warn' : 'timer-danger');
    }
    if (left <= 0) {
      clearInterval(state.timerInterval);
      if (!state.hasAnswered) timeUp();
    }
  }, 1000);
}

function revealMusicInfo(q) {
  const el = document.getElementById('musicInfo');
  if (!el || !q.artist) return;
  el.innerHTML = `<div style="font-size:13px;font-weight:500;color:#6d28d9;">${q.artist}</div>
    <div style="font-size:12px;color:#6d28d9;margin-top:2px;">${q.song || ''}${q.year ? ' · ' + q.year : ''}</div>`;
}

function submitAnswer(idx) {
  if (state.hasAnswered) return;
  clearInterval(state.timerInterval);
  clearTimeout(state.clipPhaseTimeout);
  state.clipPhaseTimeout = null;
  state.hasAnswered = true;

  const q = state.questions[state.currentIdx];
  const correct = idx === q.ans;
  revealMusicInfo(q);

  state.answers.push({ cat: q.cat, correct, q: q.q, yourAnswer: q.opts[idx], correctAnswer: q.opts[q.ans] });
  if (q.artist && q.song) state.askedSongs.push(`${q.artist} - ${q.song}`);
  state.totalAnswered++;

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const el = document.getElementById('opt' + idx);
  if (el) el.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    const correctEl = document.getElementById('opt' + q.ans);
    if (correctEl) correctEl.classList.add('correct');
  }

  showFeedback(correct, q);
}

function timeUp() {
  state.hasAnswered = true;
  clearTimeout(state.clipPhaseTimeout);
  state.clipPhaseTimeout = null;
  const q = state.questions[state.currentIdx];
  revealMusicInfo(q);
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const correctEl = document.getElementById('opt' + q.ans);
  if (correctEl) correctEl.classList.add('correct');
  state.answers.push({ cat: q.cat, correct: false, q: q.q, yourAnswer: null, correctAnswer: q.opts[q.ans] });
  if (q.artist && q.song) state.askedSongs.push(`${q.artist} - ${q.song}`);
  state.totalAnswered++;
  showFeedback(false, q, true);
}

function showFeedback(correct, q, timedOut = false) {
  const feedbackEl = document.getElementById('feedback');
  if (!feedbackEl) return;

  const isLast = state.count !== 'endless' && state.currentIdx + 1 >= state.questions.length;
  const nextLabel = isLast ? 'See results →' : 'Next →';

  const explanationHTML = state.explainEnabled && q.explanation
    ? `<div class="explanation-card">
        <div style="font-size:12px;color:#7c3aed;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Did you know</div>
        <div style="font-size:14px;color:#5b21b6;line-height:1.5;">${q.explanation}</div>
      </div>`
    : '';

  const statusColor = correct ? '#166534' : '#991b1b';
  const statusText = timedOut
    ? `Time's up! The answer was: ${q.opts[q.ans]}`
    : correct ? 'Correct!' : `Wrong — the answer was: ${q.opts[q.ans]}`;

  feedbackEl.style.display = 'block';
  feedbackEl.innerHTML = `
    <div style="font-size:15px;font-weight:500;color:${statusColor};text-align:center;margin-bottom:8px;">${statusText}</div>
    ${explanationHTML}
    <button class="btn-primary" onclick="nextQuestion()" style="margin-top:12px;">${nextLabel}</button>
  `;
}

function nextQuestion() {
  state.currentIdx++;
  if (state.count !== 'endless' && state.currentIdx >= state.questions.length) {
    showResults();
  } else if (state.count === 'endless' && state.currentIdx >= state.questions.length) {
    if (state.fetching) {
      setHTML(`<div style="text-align:center;padding:60px 20px;font-size:14px;color:#7c3aed;">Loading more questions…</div>`);
      const wait = setInterval(() => {
        if (!state.fetching) { clearInterval(wait); showQuestion(); }
      }, 300);
    } else {
      showResults();
    }
  } else {
    showQuestion();
  }
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function showResults() {
  clearInterval(state.timerInterval);
  stopClip();
  state.view = 'results';

  const total = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  const catMap = {};
  state.answers.forEach(a => {
    if (!catMap[a.cat]) catMap[a.cat] = { correct: 0, total: 0 };
    catMap[a.cat].total++;
    if (a.correct) catMap[a.cat].correct++;
  });

  const catRows = Object.entries(catMap).map(([cat, s]) => {
    const catPct = Math.round(s.correct / s.total * 100);
    const isWeak = catPct < 60;
    const barColor = catPct >= 80 ? '#22c55e' : catPct >= 60 ? '#7c3aed' : '#ef4444';
    const catData = findCatData(cat);
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <div style="font-size:13px;color:${catData?.color || '#7c3aed'};">${catData?.icon || ''} ${cat}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-size:12px;color:#9090b8;">${s.correct}/${s.total}</div>
            <div style="font-size:13px;font-weight:600;color:${barColor};">${catPct}%</div>
            ${isWeak ? `<span style="background:#fef2f2;color:#dc2626;border-radius:12px;padding:1px 8px;font-size:12px;">Weak spot</span>` : ''}
          </div>
        </div>
        <div style="height:5px;background:#e4e4f0;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${catPct}%;background:${barColor};border-radius:3px;transition:width .6s;"></div>
        </div>
      </div>`;
  }).join('');

  const weakSpots = Object.entries(catMap).filter(([, s]) => Math.round(s.correct / s.total * 100) < 60).map(([c]) => c);
  const weakMsg = weakSpots.length > 0
    ? `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
        <div style="font-size:12px;color:#dc2626;font-weight:500;margin-bottom:4px;">Keep practising</div>
        <div style="font-size:13px;color:#9090b8;">${weakSpots.join(', ')}</div>
      </div>`
    : '';

  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '⭐' : pct >= 50 ? '👍' : '📚';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great work!' : pct >= 50 ? 'Good effort!' : 'Keep practising!';

  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:24px;margin-top:8px;">
        <div style="font-size:36px;margin-bottom:8px;">${emoji}</div>
        <div style="font-size:22px;font-weight:500;color:#1a1a2e;margin-bottom:4px;">${msg}</div>
        <div style="font-size:13px;color:#9090b8;">Practice session complete</div>
      </div>

      <div class="card" style="text-align:center;margin-bottom:16px;">
        <div style="font-size:12px;color:#9090b8;margin-bottom:4px;">Overall accuracy</div>
        <div style="font-size:52px;font-weight:500;color:#7c3aed;line-height:1;margin-bottom:4px;">${pct}%</div>
        <div style="font-size:12px;color:#9090b8;">${correct} correct out of ${total} questions</div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">By category</div>
        ${catRows || '<div style="font-size:13px;color:#9090b8;">No answers recorded</div>'}
      </div>

      ${weakMsg}

      <button class="btn-primary" onclick="practiceAgain()" style="margin-bottom:10px;">Practice again</button>
      <button class="btn-outline" onclick="showSetup()">Change settings</button>
      <div style="text-align:center;margin-top:12px;"><a href="index.html" style="font-size:12px;color:#9090b8;text-decoration:none;">← Back to home</a></div>
    </div>
  `);
}

async function practiceAgain() {
  unlockAudio();
  state.questions = [];
  state.currentIdx = 0;
  state.answers = [];
  state.hasAnswered = false;
  state.totalAnswered = 0;
  showLoading();
  try {
    await fetchQuestions();
    showQuestion();
  } catch(e) {
    showSetup();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
state.customCats = loadCustomCats();
showSetup();
</script>
</body>
</html>
