<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Practice Mode — Trivia Night</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; color: #e8e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.card { background: #16162a; border: 1px solid #2a2a48; border-radius: 12px; padding: 14px 16px; }
.btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #fff; width: 100%; cursor: pointer; transition: background .2s; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-outline { background: transparent; border: 1px solid #2a2a48; border-radius: 10px; padding: 11px 16px; font-size: 13px; color: #888; cursor: pointer; width: 100%; transition: border-color .2s, color .2s; }
.btn-outline:hover { border-color: #7c3aed88; color: #c4b5fd; }
.option-btn { background: #16162a; border: 2px solid #2a2a48; border-radius: 12px; padding: 14px; font-size: 15px; color: #c8c8e0; width: 100%; text-align: left; cursor: pointer; transition: all .15s; min-height: 52px; display: block; margin-bottom: 10px; line-height: 1.4; }
.option-btn:active:not([disabled]) { transform: scale(.98); }
.option-btn[disabled] { cursor: default; }
.option-btn.correct { border-color: #22c55e; color: #86efac; background: #0f2d1f; }
.option-btn.wrong { border-color: #ef4444; color: #fca5a5; background: #2d0f0f; }
.rt-btn { background: #16162a; border: 1px solid #2a2a48; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #888; cursor: pointer; transition: background .2s, border-color .2s, color .2s; text-align: center; flex: 1; }
.rt-btn.sel { background: #2d1a4e; border-color: #7c3aed; color: #c4b5fd; }
.sub-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.fade-in { animation: fadeUp .3s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.timer-badge { border-radius: 20px; padding: 4px 14px; font-size: 14px; font-weight: 600; display: inline-block; border: 1px solid #2a2a48; }
.timer-ok { color: #7c3aed; border-color: #7c3aed44; background: #1e1e35; }
.timer-warn { color: #f59e0b; border-color: #f59e0b44; background: #1e1e35; }
.timer-danger { color: #ef4444; border-color: #ef444444; background: #1e1e35; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.toggle-track { width: 44px; height: 24px; border-radius: 12px; position: relative; flex-shrink: 0; cursor: pointer; transition: background .2s; }
.toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 3px; transition: left .2s; }
.cat-chip { border-radius: 10px; padding: 12px 14px; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, background .15s; display: flex; align-items: center; gap: 8px; }
.cat-chip.sel { border-color: #7c3aed; }
.progress-track { height: 3px; background: #1e1e35; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: #7c3aed; border-radius: 3px; transition: width .4s; }
.explanation-card { background: #1a1535; border: 1px solid #7c3aed44; border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
</style>
</head>
<body>
<div id="app"><div id="root"></div></div>
<script>
const root = document.getElementById('root');
function setHTML(h) { root.innerHTML = h; }

const CATEGORIES = [
  { name: 'General Knowledge', icon: '🧠', color: '#a78bfa', border: '#7c3aed', bg: '#1a1535' },
  { name: 'Music',             icon: '🎵', color: '#60a5fa', border: '#378add', bg: '#0f1a2e' },
  { name: 'Sports',            icon: '🏆', color: '#86efac', border: '#22c55e', bg: '#0f2d1a' },
  { name: 'History',           icon: '📜', color: '#fcd34d', border: '#f59e0b', bg: '#1e1500' },
  { name: 'Science',           icon: '🔬', color: '#c4b5fd', border: '#a78bfa', bg: '#1e1535' },
  { name: 'Pop Culture',       icon: '🎬', color: '#f9a8d4', border: '#f472b6', bg: '#2d0f20' },
  { name: 'Geography',         icon: '🌍', color: '#5eead4', border: '#2dd4bf', bg: '#0f2d2a' },
  { name: 'Food & Drink',      icon: '🍕', color: '#fdba74', border: '#fb923c', bg: '#2d1500' },
];

let state = {
  view: 'setup',
  categories: [],
  count: 10,
  timerEnabled: false,
  timerSecs: 15,
  explainEnabled: true,
  questions: [],
  currentIdx: 0,
  answers: [],
  hasAnswered: false,
  timerInterval: null,
  fetching: false,
  totalAnswered: 0,
};

// ─── SETUP ──────────────────────────────────────────────────────────────────
function showSetup() {
  state.view = 'setup';
  renderSetup();
}

function renderSetup() {
  const catGrid = CATEGORIES.map(c => {
    const sel = state.categories.includes(c.name);
    return `<div class="cat-chip" onclick="toggleCat('${c.name}')"
      style="background:${c.bg};border-color:${sel ? c.border : 'transparent'};">
      <span style="font-size:20px;">${c.icon}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;color:${c.color};">${c.name}</div>
      </div>
      ${sel ? `<div style="width:18px;height:18px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">✓</div>` : ''}
    </div>`;
  }).join('');

  const countBtns = [5, 10, 20, 'Endless'].map(c =>
    `<div class="rt-btn${state.count === c ? ' sel' : ''}" onclick="setCount(${typeof c === 'number' ? c : "'endless'"})">
      ${c}${typeof c === 'number' ? ' Qs' : ''}
    </div>`
  ).join('');

  const timerOn = state.timerEnabled;
  const timerSecBtns = timerOn ? `
    <div style="display:flex;gap:6px;margin-top:10px;">
      ${[10,15,20,30].map(s => `<div class="rt-btn${state.timerSecs===s?' sel':''}" onclick="setTimerSecs(${s})">${s}s</div>`).join('')}
    </div>` : '';

  const canStart = state.categories.length > 0;

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
        <a href="index.html" style="background:transparent;border:1px solid #2a2a48;border-radius:8px;padding:6px 12px;font-size:12px;color:#555;text-decoration:none;">← Home</a>
        <div>
          <div style="font-size:20px;font-weight:500;color:#e8e8f0;">Practice Mode</div>
          <div style="font-size:12px;color:#555;margin-top:2px;">Solo · no account needed · session only</div>
        </div>
      </div>

      <div class="sub-label">Pick your categories</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;">${catGrid}</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button class="btn-outline" style="font-size:12px;padding:7px;" onclick="selectAll()">Select all</button>
        <button class="btn-outline" style="font-size:12px;padding:7px;" onclick="clearAll()">Clear</button>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="sub-label">How many questions?</div>
        <div style="display:flex;gap:8px;">${countBtns}</div>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="toggle-row" onclick="toggleTimer()" style="cursor:pointer;">
          <div>
            <div style="font-size:13px;color:#e8e8f0;font-weight:500;">Timer</div>
            <div style="font-size:11px;color:#555;">Adds time pressure to each question</div>
          </div>
          <div class="toggle-track" style="background:${timerOn ? '#7c3aed' : '#2a2a48'};">
            <div class="toggle-thumb" style="left:${timerOn ? '23px' : '3px'};"></div>
          </div>
        </div>
        ${timerSecBtns}
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="toggle-row" onclick="toggleExplain()" style="cursor:pointer;">
          <div>
            <div style="font-size:13px;color:#e8e8f0;font-weight:500;">Show explanations</div>
            <div style="font-size:11px;color:#555;">Brief fact after each answer</div>
          </div>
          <div class="toggle-track" style="background:${state.explainEnabled ? '#7c3aed' : '#2a2a48'};">
            <div class="toggle-thumb" style="left:${state.explainEnabled ? '23px' : '3px'};"></div>
          </div>
        </div>
      </div>

      <button class="btn-primary" ${canStart ? '' : 'disabled'} onclick="startPractice()">
        ${canStart ? 'Start practice →' : 'Pick at least one category'}
      </button>
    </div>
  `);
}

function toggleCat(name) {
  state.categories = state.categories.includes(name)
    ? state.categories.filter(c => c !== name)
    : [...state.categories, name];
  renderSetup();
}
function selectAll() { state.categories = CATEGORIES.map(c => c.name); renderSetup(); }
function clearAll()  { state.categories = []; renderSetup(); }
function setCount(c) { state.count = c; renderSetup(); }
function setTimerSecs(s) { state.timerSecs = s; renderSetup(); }
function toggleTimer()   { state.timerEnabled = !state.timerEnabled; renderSetup(); }
function toggleExplain() { state.explainEnabled = !state.explainEnabled; renderSetup(); }

// ─── FETCH QUESTIONS ─────────────────────────────────────────────────────────
async function fetchQuestions() {
  state.fetching = true;
  const count = state.count === 'endless' ? 10 : state.count;
  const params = new URLSearchParams({
    practice: 'true',
    categories: state.categories.join(','),
    count,
    explain: state.explainEnabled ? 'true' : 'false',
  });
  const res = await fetch(`/api/questions?${params}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to load questions');
  state.questions = [...state.questions, ...(data.questions || [])];
  state.fetching = false;
}

async function startPractice() {
  if (!state.categories.length) return;
  state.questions = [];
  state.currentIdx = 0;
  state.answers = [];
  state.hasAnswered = false;
  state.totalAnswered = 0;

  showLoading();
  try {
    await fetchQuestions();
    showQuestion();
  } catch(e) {
    setHTML(`<div style="text-align:center;padding:60px 20px;">
      <div style="color:#ef4444;margin-bottom:16px;">Failed to load questions.<br><span style="font-size:12px;color:#555;">${e.message}</span></div>
      <button class="btn-outline" onclick="showSetup()">← Back</button>
    </div>`);
  }
}

function showLoading() {
  setHTML(`<div style="text-align:center;padding:80px 20px;">
    <div style="font-size:16px;font-weight:500;color:#a78bfa;margin-bottom:8px;">Generating questions…</div>
    <div style="font-size:12px;color:#555;">Personalised just for you</div>
  </div>`);
}

// ─── QUESTION ────────────────────────────────────────────────────────────────
function showQuestion() {
  clearInterval(state.timerInterval);
  state.view = 'question';
  state.hasAnswered = false;

  // Endless: pre-fetch more when 3 left
  if (state.count === 'endless' && !state.fetching &&
      state.questions.length - state.currentIdx <= 3) {
    fetchQuestions().catch(() => {});
  }

  const q = state.questions[state.currentIdx];
  if (!q) { showResults(); return; }

  const total = state.count === 'endless' ? null : state.questions.length;
  const progress = total ? ((state.currentIdx) / total * 100) : null;

  const catData = CATEGORIES.find(c => c.name === q.cat) || CATEGORIES[0];
  const timerDuration = state.timerEnabled ? state.timerSecs : null;

  setHTML(`
    <div class="fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:12px;color:#555;">
          ${total ? `Question ${state.currentIdx + 1} of ${total}` : `Question ${state.currentIdx + 1}`}
        </div>
        ${timerDuration
          ? `<span class="timer-badge timer-ok" id="timerBadge">${timerDuration}s</span>`
          : `<div></div>`}
        ${state.count === 'endless'
          ? `<button onclick="showResults()" style="background:transparent;border:1px solid #2a2a48;border-radius:8px;padding:5px 10px;font-size:11px;color:#555;cursor:pointer;">End session</button>`
          : `<div></div>`}
      </div>

      ${progress !== null ? `<div class="progress-track"><div class="progress-fill" style="width:${progress}%;"></div></div>` : ''}

      <div style="display:inline-block;background:#1e1e35;border-radius:8px;padding:5px 12px;margin-bottom:10px;">
        <span style="font-size:11px;color:${catData.color};font-weight:500;text-transform:uppercase;letter-spacing:.06em;">${q.cat}</span>
      </div>

      <div class="card" style="margin-bottom:14px;">
        <div style="font-size:17px;font-weight:500;color:#e8e8f0;line-height:1.5;">${q.q}</div>
      </div>

      <div id="optionGrid">
        ${q.opts.map((o, i) => `<button class="option-btn" id="opt${i}" onclick="submitAnswer(${i})">${String.fromCharCode(65+i)} &nbsp; ${o}</button>`).join('')}
      </div>

      <div id="feedback" style="display:none;"></div>
    </div>
  `);

  if (timerDuration) startPracticeTimer(timerDuration);
}

function startPracticeTimer(duration) {
  let left = duration;
  state.timerInterval = setInterval(() => {
    left--;
    const badge = document.getElementById('timerBadge');
    if (badge) {
      badge.textContent = left + 's';
      badge.className = 'timer-badge ' + (left > 8 ? 'timer-ok' : left > 4 ? 'timer-warn' : 'timer-danger');
    }
    if (left <= 0) {
      clearInterval(state.timerInterval);
      if (!state.hasAnswered) timeUp();
    }
  }, 1000);
}

function submitAnswer(idx) {
  if (state.hasAnswered) return;
  clearInterval(state.timerInterval);
  state.hasAnswered = true;

  const q = state.questions[state.currentIdx];
  const correct = idx === q.ans;

  state.answers.push({ cat: q.cat, correct, q: q.q, yourAnswer: q.opts[idx], correctAnswer: q.opts[q.ans] });
  state.totalAnswered++;

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const el = document.getElementById('opt' + idx);
  if (el) el.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    const correctEl = document.getElementById('opt' + q.ans);
    if (correctEl) correctEl.classList.add('correct');
  }

  showFeedback(correct, q);
}

function timeUp() {
  state.hasAnswered = true;
  const q = state.questions[state.currentIdx];
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const correctEl = document.getElementById('opt' + q.ans);
  if (correctEl) correctEl.classList.add('correct');
  state.answers.push({ cat: q.cat, correct: false, q: q.q, yourAnswer: null, correctAnswer: q.opts[q.ans] });
  state.totalAnswered++;
  showFeedback(false, q, true);
}

function showFeedback(correct, q, timedOut = false) {
  const feedbackEl = document.getElementById('feedback');
  if (!feedbackEl) return;

  const isLast = state.count !== 'endless' && state.currentIdx + 1 >= state.questions.length;
  const nextLabel = isLast ? 'See results →' : 'Next →';

  const explanationHTML = state.explainEnabled && q.explanation
    ? `<div class="explanation-card">
        <div style="font-size:10px;color:#7c3aed;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Did you know</div>
        <div style="font-size:13px;color:#c4b5fd;line-height:1.5;">${q.explanation}</div>
      </div>`
    : '';

  const statusColor = correct ? '#86efac' : '#fca5a5';
  const statusText = timedOut
    ? `Time's up! The answer was: ${q.opts[q.ans]}`
    : correct ? 'Correct!' : `Wrong — the answer was: ${q.opts[q.ans]}`;

  feedbackEl.style.display = 'block';
  feedbackEl.innerHTML = `
    <div style="font-size:14px;font-weight:500;color:${statusColor};text-align:center;margin-bottom:8px;">${statusText}</div>
    ${explanationHTML}
    <button class="btn-primary" onclick="nextQuestion()" style="margin-top:12px;">${nextLabel}</button>
  `;
}

function nextQuestion() {
  state.currentIdx++;
  if (state.count !== 'endless' && state.currentIdx >= state.questions.length) {
    showResults();
  } else if (state.count === 'endless' && state.currentIdx >= state.questions.length) {
    if (state.fetching) {
      setHTML(`<div style="text-align:center;padding:60px 20px;font-size:14px;color:#a78bfa;">Loading more questions…</div>`);
      const wait = setInterval(() => {
        if (!state.fetching) { clearInterval(wait); showQuestion(); }
      }, 300);
    } else {
      showResults();
    }
  } else {
    showQuestion();
  }
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function showResults() {
  clearInterval(state.timerInterval);
  state.view = 'results';

  const total = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  // Per-category breakdown
  const catMap = {};
  state.answers.forEach(a => {
    if (!catMap[a.cat]) catMap[a.cat] = { correct: 0, total: 0 };
    catMap[a.cat].total++;
    if (a.correct) catMap[a.cat].correct++;
  });

  const catRows = Object.entries(catMap).map(([cat, s]) => {
    const catPct = Math.round(s.correct / s.total * 100);
    const isWeak = catPct < 60;
    const barColor = catPct >= 80 ? '#22c55e' : catPct >= 60 ? '#7c3aed' : '#ef4444';
    const catData = CATEGORIES.find(c => c.name === cat);
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <div style="font-size:13px;color:${catData?.color || '#aaa'};">${catData?.icon || ''} ${cat}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-size:12px;color:#666;">${s.correct}/${s.total}</div>
            <div style="font-size:13px;font-weight:600;color:${barColor};">${catPct}%</div>
            ${isWeak ? `<span style="background:#2d0f0f;color:#fca5a5;border-radius:12px;padding:1px 8px;font-size:10px;">Weak spot</span>` : ''}
          </div>
        </div>
        <div style="height:5px;background:#1e1e35;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${catPct}%;background:${barColor};border-radius:3px;transition:width .6s;"></div>
        </div>
      </div>`;
  }).join('');

  const weakSpots = Object.entries(catMap).filter(([, s]) => Math.round(s.correct / s.total * 100) < 60).map(([c]) => c);
  const weakMsg = weakSpots.length > 0
    ? `<div style="background:#2d0f0f;border:1px solid #ef444444;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
        <div style="font-size:12px;color:#fca5a5;font-weight:500;margin-bottom:4px;">Keep practising</div>
        <div style="font-size:13px;color:#888;">${weakSpots.join(', ')}</div>
      </div>`
    : '';

  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '⭐' : pct >= 50 ? '👍' : '📚';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great work!' : pct >= 50 ? 'Good effort!' : 'Keep practising!';

  setHTML(`
    <div class="fade-in">
      <div style="text-align:center;margin-bottom:24px;margin-top:8px;">
        <div style="font-size:36px;margin-bottom:8px;">${emoji}</div>
        <div style="font-size:22px;font-weight:500;color:#e8e8f0;margin-bottom:4px;">${msg}</div>
        <div style="font-size:13px;color:#555;">Practice session complete</div>
      </div>

      <div class="card" style="text-align:center;margin-bottom:16px;">
        <div style="font-size:11px;color:#555;margin-bottom:4px;">Overall accuracy</div>
        <div style="font-size:52px;font-weight:500;color:#a78bfa;line-height:1;margin-bottom:4px;">${pct}%</div>
        <div style="font-size:13px;color:#555;">${correct} correct out of ${total} questions</div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="sub-label">By category</div>
        ${catRows || '<div style="font-size:13px;color:#555;">No answers recorded</div>'}
      </div>

      ${weakMsg}

      <button class="btn-primary" onclick="practiceAgain()" style="margin-bottom:10px;">Practice again</button>
      <button class="btn-outline" onclick="showSetup()">Change settings</button>
      <div style="text-align:center;margin-top:12px;"><a href="index.html" style="font-size:12px;color:#555;text-decoration:none;">← Back to home</a></div>
    </div>
  `);
}

async function practiceAgain() {
  state.questions = [];
  state.currentIdx = 0;
  state.answers = [];
  state.hasAnswered = false;
  state.totalAnswered = 0;
  showLoading();
  try {
    await fetchQuestions();
    showQuestion();
  } catch(e) {
    showSetup();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
showSetup();
</script>
</body>
</html>
